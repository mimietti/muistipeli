<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waiting Room</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .shell {
            width: min(720px, calc(100% - 32px));
            margin: 32px auto 0;
            padding: 0 0 32px;
        }
        body.compact-lobby .shell {
            margin-top: 18px;
        }
        #languagePicker {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }
        .flag-toggle {
            display: inline-flex;
            gap: 8px;
            padding: 5px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .flag-btn {
            width: 44px;
            height: 33px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        }
        .flag-btn:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.05);
        }
        .flag-btn.is-active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.16);
        }
        .flag-svg { width: 26px; height: 18px; display: block; }
        .card-mode-btn {
            padding: 6px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .card-mode-btn.active {
            background: rgba(124,245,138,0.15);
            border-color: rgba(124,245,138,0.4);
            color: #7cf58a;
            font-weight: 700;
        }
        .lang-select {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 15px;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            min-width: 160px;
            text-align: center;
        }
        .lang-select:focus {
            border-color: rgba(255,255,255,0.3);
        }
        .lang-select option {
            background: #1a1a1a;
            color: #fff;
        }

        h1 {
            margin-top: 24px;
            font-size: 36px;
        }
        body.compact-lobby h1 {
            margin-top: 12px;
            margin-bottom: 10px;
            font-size: 30px;
        }
        #introText {
            max-width: 560px;
            margin: 0 auto 20px;
            color: #d4ddd4;
            font-size: 16px;
            line-height: 1.6;
        }
        body.compact-lobby #introText,
        body.compact-lobby #playerRole,
        body.compact-lobby #hint {
            display: none !important;
        }

        #players {
            margin: 20px 0;
            font-size: 24px;
        }
        body.compact-lobby #players {
            margin: 10px 0 14px;
            font-size: 20px;
        }
        #playerRole {
            margin: 6px 0 14px;
            color: #9fe5a8;
            font-size: 18px;
            font-weight: 700;
        }

        #changeNameBtn {
            display: none;
            background-color: limegreen;
            color: black;
            font-size: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #changeNameBtn:hover { background-color: green; }

        #startOptions {
            display: none;
            margin-top: 20px;
        }

        .option-group {
            margin: 0 auto 14px;
            max-width: 480px;
            text-align: left;
        }
        .option-group-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a7a6a;
            margin-bottom: 7px;
            padding-left: 2px;
        }
        .option-group-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .opt-btn {
            padding: 9px 18px;
            border-radius: 999px;
            border: 1.5px solid rgba(255,255,255,0.13);
            background: rgba(255,255,255,0.05);
            color: #bbb;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
        }
        .opt-btn:hover {
            background: rgba(255,255,255,0.09);
            color: #ddd;
        }
        .opt-btn.active {
            background: rgba(124,245,138,0.15);
            border-color: rgba(124,245,138,0.5);
            color: #7cf58a;
        }
        #langPicker {
            display: none;
        }
        .lang-flag-btn {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1.5px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #ccc;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
        }
        .lang-flag-btn:hover {
            background: rgba(255,255,255,0.09);
        }
        .lang-flag-btn.active {
            background: rgba(124,245,138,0.15);
            border-color: rgba(124,245,138,0.5);
            color: #fff;
        }
        #startRoundBtn {
            display: block;
            margin: 18px auto 0;
            padding: 13px 38px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(180deg, #7cf58a, #47d45c);
            color: #0d2211;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(71,212,92,0.22);
            transition: filter 0.12s;
        }
        #startRoundBtn:hover { filter: brightness(1.05); }
        #setupStatus {
            display: none;
            margin-top: 24px;
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        #setupStatusTitle {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff4a8;
        }
        #setupStatusText {
            color: #d4ddd4;
            line-height: 1.6;
        }
        #setupProgress {
            display: none;
            max-width: 460px;
            margin: 14px auto 0;
        }
        #setupProgressCount {
            color: #eef2ee;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        #setupProgressBar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.18);
        }
        #setupProgressFill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #89ef9d, #d9ff8b);
            transition: width 0.25s ease;
        }
        #themeSelection {
            display: none;
            margin-top: 26px;
            padding: 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        #themeSelectionTitle {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        #themeSelectionHelp,
        #themeSelectionTurn,
        #themeSelectionMessage {
            color: #d4ddd4;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        #themeSelectionHelp.compact {
            margin-bottom: 2px;
            color: #cfd6cf;
        }
        #themeSelectionMessage {
            min-height: 24px;
            color: #ffe28c;
        }
        #themeSelectionProgress,
        #themeSelectionCounts,
        #selectedWords {
            margin: 12px 0;
            color: #eef2ee;
        }
        .theme-section-label {
            margin: 12px 0 8px;
            color: #fff4a8;
            font-size: 18px;
            font-weight: 700;
        }
        .theme-section-subtitle {
            margin: 0 0 10px;
            color: #bfc8bf;
            font-size: 14px;
        }
        #themeReadyStatus {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0;
        }
        .ready-status-chip {
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 700;
            background: #4c4c4c;
            color: #f1f1f1;
        }
        .ready-status-chip.is-ready {
            background: #89ef9d;
            color: #10361a;
        }
        .ready-status-chip.is-waiting {
            background: #6b5a27;
            color: #fff0b3;
        }
        #selectedWords {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .selected-words-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .theme-selection-panel {
            margin-top: 12px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .selected-word-chip {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
            background: #f2d46d;
            color: #111;
            font-weight: 700;
        }
        .selected-word-chip.active {
            background: #ffd24d;
            color: #111;
            box-shadow: 0 0 0 3px rgba(255, 210, 77, 0.35);
        }
        .selected-word-chip:disabled {
            background: #8c7a3f;
            color: #231d0b;
            cursor: not-allowed;
        }
        #themeCandidates {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }
        #themeSelectionActions {
            display: flex;
            justify-content: center;
            margin: 12px 0 10px;
        }
        .theme-action-btn {
            background: linear-gradient(180deg, #7cf58a, #47d45c);
            color: #0d2211;
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(71, 212, 92, 0.22);
        }
        .theme-action-btn.ready {
            background: linear-gradient(180deg, #ffd86c, #efb73f);
            color: #211400;
            box-shadow: 0 8px 22px rgba(239, 183, 63, 0.2);
        }
        .theme-action-btn:hover {
            filter: brightness(1.03);
        }
        .footer-credit {
            margin-top: 28px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
        .secondaryBtn {
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 18px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            margin-top: 14px;
        }
        .secondaryBtn:hover {
            background: rgba(255,255,255,0.12);
        }
        .theme-word-chip {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
            background: #4b4f56;
            color: #f3f3f3;
        }
        .theme-word-chip:hover {
            background: #5c7d63;
        }
        .theme-word-chip.available {
            background: #4b4f56;
            color: #f3f3f3;
        }
        .theme-word-chip.selected {
            background: #7ccf8d;
            color: #0d1b11;
            cursor: default;
        }
        .theme-word-chip.rejected,
        .theme-word-chip:disabled {
            background: #555;
            color: #ddd;
            cursor: not-allowed;
        }
        #playModeSelect {
            display: none;
            margin-top: 28px;
        }
        #playModeText {
            color: #d4ddd4;
            font-size: 17px;
            margin-bottom: 18px;
        }
        .play-mode-btn {
            display: block;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 14px;
            padding: 18px 20px;
            border-radius: 16px;
            border: none;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.15s;
        }
        .play-mode-btn.bot-btn {
            background: linear-gradient(180deg, #7cf58a, #47d45c);
            color: #0d2211;
        }
        .play-mode-btn.human-btn {
            background: linear-gradient(180deg, #7ab8f5, #4a8fd4);
            color: #0a1a2e;
        }
        .play-mode-btn:hover { filter: brightness(1.05); }
        #queueStatus {
            display: none;
            margin-top: 32px;
            text-align: center;
        }
        .queue-spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #7cf58a;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #queueText {
            font-size: 18px;
            color: #d4ddd4;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div id="languagePicker">
            <div class="flag-toggle" role="group" aria-label="UI language">
                <button type="button" class="flag-btn" data-ui-lang="fi" aria-label="Suomi" title="Suomi">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="18" height="11" fill="#fff"/>
                        <rect x="5" width="3" height="11" fill="#003580"/>
                        <rect y="4" width="18" height="3" fill="#003580"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-ui-lang="en" aria-label="English" title="English">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="18" height="11" fill="#012169"/>
                        <path d="M0 0l18 11M18 0L0 11" stroke="#fff" stroke-width="2.4"/>
                        <path d="M0 0l18 11M18 0L0 11" stroke="#C8102E" stroke-width="1.2"/>
                        <path d="M9 0v11M0 5.5h18" stroke="#fff" stroke-width="3.6"/>
                        <path d="M9 0v11M0 5.5h18" stroke="#C8102E" stroke-width="2"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-ui-lang="sv" aria-label="Svenska" title="Svenska">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="18" height="11" fill="#006AA7"/>
                        <rect x="5" width="3" height="11" fill="#FECC02"/>
                        <rect y="4" width="18" height="3" fill="#FECC02"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-ui-lang="de" aria-label="Deutsch" title="Deutsch">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="18" height="3.67" fill="#000"/>
                        <rect y="3.67" width="18" height="3.67" fill="#DD0000"/>
                        <rect y="7.33" width="18" height="3.67" fill="#FFCE00"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-ui-lang="fr" aria-label="Français" title="Français">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="6" height="11" fill="#002395"/>
                        <rect x="6" width="6" height="11" fill="#fff"/>
                        <rect x="12" width="6" height="11" fill="#ED2939"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-ui-lang="es" aria-label="Español" title="Español">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="18" height="11" fill="#c60b1e"/>
                        <rect y="2.5" width="18" height="6" fill="#ffc400"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-ui-lang="it" aria-label="Italiano" title="Italiano">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="6" height="11" fill="#009246"/>
                        <rect x="6" width="6" height="11" fill="#fff"/>
                        <rect x="12" width="6" height="11" fill="#CE2B37"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-ui-lang="pt" aria-label="Português" title="Português">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="7" height="11" fill="#006600"/>
                        <rect x="7" width="11" height="11" fill="#FF0000"/>
                        <circle cx="7" cy="5.5" r="2.2" fill="#FFD700" stroke="#006600" stroke-width="0.5"/>
                    </svg>
                </button>
            </div>
        </div>
        <h1 id="pageTitle">Waiting Room</h1>
        <p id="introText"></p>
        <div id="players"></div>
        <div id="playModeSelect">
            <p id="playModeText"></p>
            <button class="play-mode-btn bot-btn" id="botModeBtn"></button>
            <button class="play-mode-btn human-btn" id="humanModeBtn"></button>
        </div>
        <div id="queueStatus">
            <div class="queue-spinner"></div>
            <div id="queueText"></div>
            <button class="secondaryBtn" id="leaveQueueBtn"></button>
        </div>
        <div id="playerRole"></div>
        <div id="hint" style="margin:10px 0; color:#ccc; font-size:14px;">
            Tip: only the second player to join can start the game.
        </div>
        <div id="startOptions">
            <div class="option-group">
                <div class="option-group-label" id="labelWordSource">Words</div>
                <div class="option-group-btns">
                    <button class="opt-btn active" data-source="manual" id="srcManualBtn">Own words</button>
                    <button class="opt-btn" data-source="theme" id="srcThemeBtn">Theme</button>
                </div>
            </div>
            <div class="option-group">
                <div class="option-group-label" id="labelCardMode">Cards</div>
                <div class="option-group-btns">
                    <button class="opt-btn active" data-mode="image_word" id="cardModeImageWord">🖼 + 📝</button>
                    <button class="opt-btn" data-mode="images" id="cardModeImages">🖼 Images</button>
                    <button class="opt-btn" data-mode="words" id="cardModeWords">📝 + 📝</button>
                </div>
            </div>
            <div class="option-group" id="langPicker">
                <div class="option-group-label" id="labelLang">Language</div>
                <div class="option-group-btns">
                    <button class="lang-flag-btn active" data-lang="es">🇪🇸 Spanish</button>
                    <button class="lang-flag-btn" data-lang="sv">🇸🇪 Swedish</button>
                    <button class="lang-flag-btn" data-lang="de">🇩🇪 German</button>
                    <button class="lang-flag-btn" data-lang="fr">🇫🇷 French</button>
                    <button class="lang-flag-btn" data-lang="it">🇮🇹 Italian</button>
                    <button class="lang-flag-btn" data-lang="pt">🇵🇹 Portuguese</button>
                </div>
            </div>
            <button id="startRoundBtn">Start</button>
        </div>
        <div id="setupStatus">
            <div id="setupStatusTitle"></div>
            <div id="setupStatusText"></div>
            <div id="setupProgress">
                <div id="setupProgressCount"></div>
                <div id="setupProgressBar"><div id="setupProgressFill"></div></div>
            </div>
        </div>
        <div id="themeSelection">
            <div id="themeSelectionTitle"></div>
            <div id="themeSelectionHelp"></div>
            <div id="themeSelectionTurn"></div>
            <div id="themeSelectionMessage"></div>
            <div id="themeSelectionProgress"></div>
            <div id="themeSelectionCounts"></div>
            <div id="themeReadyStatus"></div>
            <div id="themeSelectionActions">
                <button id="themeReadyBtn" class="theme-action-btn">Ready</button>
            </div>
            <div id="selectedWords"></div>
            <div id="themeCandidatesLabel" class="theme-section-label"></div>
            <div id="themeCandidates"></div>
        </div>
        <button id="changeNameBtn" style="margin-top: 20px;">Change name</button>
        <div>
            <button id="exitGameBtn" class="secondaryBtn">Exit game</button>
        </div>
        <div class="footer-credit">© Michael Miettinen • {{ app_version }}</div>
    </div>

    <script>
        const translations = {
            en: {
                page_title: "Waiting Room",
                language: "Language",
                intro_text: "The game starts from the waiting room once two players are connected. The second player can choose the word source and card type for the round.",
                welcome_player: "Welcome, {name}!",
                spectator_player: "Welcome, {name}!",
                status_waiting_for_player: "Status: waiting for another player.",
                status_choose_round: "Status: choose how the next round starts.",
                status_room_full: "Status: both player slots are full.",
                start_options: "Choose how words are provided for this round.",
                enter_words: "Enter your own words",
                enter_theme: "Enter theme",
                study_spanish: "Study Spanish",
                exit_game: "Exit game",
                change_name: "Change name",
                reconnect_missing_alert: "Reconnect token missing! The page cannot be loaded, please try again.",
                prompt_name: "Enter your name:",
                reconnect_empty_alert: "Reconnect token is missing or empty! Reloading the page.",
                enter_theme_prompt: "Enter theme:",
                enter_lang_theme_prompt: "Enter theme (in English):",
                card_mode_image_word: "Image + word",
                card_mode_words: "Word + word",
                setup_failed: "Game setup failed.",
                disconnect_alert: "Connection to the server was lost. Trying again...",
                game_aborted: "The round was cancelled because the other player left.",
                game_full: "The game is full. Wait for the next round or open a new game.",
                theme_missing: "Theme is missing.",
                pixabay_config_error: "Pixabay setup is invalid. Check PIXABAY_API_KEY in Render and .env.",
                theme_not_enough: 'Not enough usable words were found for theme "{theme}". Try another theme.',
                setup_status_title: "Preparing next round",
                setup_status_finding_words: 'Finding words that match "{theme}"...',
                setup_status_drawing_cards: 'Drawing cards for "{theme}"...',
                setup_status_manual: '{name} is entering words for the next round...',
                setup_status_chosen_theme: '{name} chose the theme "{theme}".',
                setup_status_chosen_spanish: '{name} chose Spanish study with theme "{theme}".',
                setup_progress_pairs: "{count}/{total} pairs ready",
                theme_selection_title: 'Theme: "{theme}"',
                theme_selection_help: "We preselected 8 usable words. Each player can swap up to 4 of them before the round starts.",
                theme_selection_turn_you: "Choose one of the selected words to replace.",
                theme_selection_turn_other: "{name} is editing the shared word set.",
                theme_selection_progress: "Selections: {count}/8",
                theme_selection_counts: "{name}: {count}/{limit} swaps used",
                theme_selection_selected_none: "No selected words.",

        const UI_LANGS = ["en","fi","sv","de","fr","es","it","pt"];

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return UI_LANGS.includes(stored) ? stored : "en";
        }

        function setLanguage(lang) {
            const next = UI_LANGS.includes(lang) ? lang : "en";
            localStorage.setItem("ui_language", next);
            document.documentElement.lang = next;
            const sel = document.getElementById("uiLangSelect");
            if (sel) sel.value = next;
            return next;
        }

        function t(key, vars = {}) {
            const lang = getLanguage();
            const langTable = translations[lang] || {};
            const enTable = translations.en || {};
            let value;
            if (Object.prototype.hasOwnProperty.call(langTable, key)) {
                value = langTable[key];
            } else if (Object.prototype.hasOwnProperty.call(enTable, key)) {
                value = enTable[key];
            } else {
                value = key;
            }
            Object.entries(vars).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, String(replacement));
            });
            return value;
        }

        function localizeServerMessage(message) {
            if (!message) return t("setup_failed");
            if (message === "Teema puuttuu." || message === "Theme is missing.") return t("theme_missing");
            if (message === "Pixabay API key is missing. Check PIXABAY_API_KEY." || message === "Pixabay rejected the request. Check PIXABAY_API_KEY in Render and .env.") {
                return t("pixabay_config_error");
            }
            const themed = message.match(/Teemasta '(.+)' ei löytynyt tarpeeksi käyttökelpoisia sanoja\. Kokeile toista teemaa\./)
                || message.match(/Not enough usable words were found for theme "(.+)". Try another theme\./);
            if (themed) return t("theme_not_enough").replace("{theme}", themed[1]);
            if (message === "Toinen pelaaja poistui. Peli keskeytetty.") return t("game_aborted");
            if (message === "Peli on täynnä. Odota seuraavaa erää tai avaa uusi peli.") return t("game_full");
            return message;
        }

        function renderPlayerRole(playersInfo) {
            window.latestPlayersInfo = Array.isArray(playersInfo) ? playersInfo : [];
            const roleDiv = document.getElementById("playerRole");
            const hintDiv = document.getElementById("hint");
            if (!roleDiv) return;
            const playMode = localStorage.getItem("play_mode") || "";
            const isSoloOrBot = playMode === "solo" || playMode === "bot";
            const myToken = getReconnectToken();
            const myName = (localStorage.getItem("username") || "").trim();
            roleDiv.textContent = t("welcome_player", { name: myName || "Player" });
            if (hintDiv) {
                if (isSoloOrBot) {
                    hintDiv.textContent = "";
                } else {
                    const myIndex = window.latestPlayersInfo.findIndex(p => p && p.reconnect_token === myToken);
                    if (myIndex === 1) {
                        hintDiv.textContent = t("status_choose_round");
                    } else if (window.latestPlayersInfo.length >= 2) {
                        hintDiv.textContent = t("status_room_full");
                    } else {
                        hintDiv.textContent = t("status_waiting_for_player");
                    }
                }
            }
        }

        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
                return v.toString(16);
            });
        }
        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) { try { window.name = `reconnect_token=${tok}`; } catch (_) {} }

        // Luo reconnect_token ennen socket.io:n latausta
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try { t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token"); } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        // DEBUG: reconnect_token ennen socket.io-client latausta
        console.log("DEBUG: reconnect_token before socket.io load:", getReconnectToken());
        console.log("DEBUG: localStorage reconnect_token:", localStorage.getItem("reconnect_token"));
        console.log("DEBUG: sessionStorage reconnect_token:", sessionStorage.getItem("reconnect_token"));
        console.log("DEBUG: window._reconnect_token:", window._reconnect_token);
        console.log("DEBUG: localStorage username:", localStorage.getItem("username"));

        // Yleinen window.onerror-debuggaus
        window.onerror = function(msg, url, line, col, error) {
            console.error("[DEBUG] window.onerror:", msg, url, line, col, error);
        };

        if (!getReconnectToken()) {
            alert(t("reconnect_missing_alert"));
            throw new Error("Reconnect_token puuttuu!");
        }

        // Kysy nimi synkronisesti ennen mitään muuta!
        (function ensureUsername() {
            if (!localStorage.getItem("username")) {
                let name = prompt(t("prompt_name"), "");
                while (!name || name.trim().length === 0) {
                    name = prompt(t("prompt_name"), "");
                }
                localStorage.setItem("username", name.trim());
            }
        })();

        // Poista mahdollinen vanha window.io ennen uuden socket.io-clientin latausta
        if (window.io) {
            try { delete window.io; } catch (e) { window.io = undefined; }
        }

        // Lataa socket.io-client vasta kun reconnect_token ja username on varmasti olemassa
        const script = document.createElement('script');
        script.src = "https://cdn.socket.io/4.5.4/socket.io.min.js";
        script.onload = startSocketWhenReady;
        document.body.appendChild(script);

        // Käynnistä socket vasta kun reconnect_token ja username on varmasti olemassa JA window.io on ladattu
        function startSocketWhenReady() {
            if (!window.io) {
                setTimeout(startSocketWhenReady, 50);
                return;
            }
            let myName = localStorage.getItem("username");
            let reconnectToken = getReconnectToken();
            let hasJoined = false;
            let joinEmittedCount = 0;
            let queuedNextRoundHandled = false;
            console.log("DEBUG: startSocketWhenReady, myName:", myName, "reconnectToken:", reconnectToken);
            const socket = window.io();
            try { window.socket = socket; } catch (_) {}
            const themeSelectionEl = document.getElementById("themeSelection");
            const themeSelectionTitleEl = document.getElementById("themeSelectionTitle");
            const themeSelectionHelpEl = document.getElementById("themeSelectionHelp");
            const themeSelectionTurnEl = document.getElementById("themeSelectionTurn");
            const themeSelectionMessageEl = document.getElementById("themeSelectionMessage");
            const themeSelectionProgressEl = document.getElementById("themeSelectionProgress");
            const themeSelectionCountsEl = document.getElementById("themeSelectionCounts");
            const themeReadyStatusEl = document.getElementById("themeReadyStatus");
            const selectedWordsEl = document.getElementById("selectedWords");
            const themeCandidatesEl = document.getElementById("themeCandidates");
            const themeCandidatesLabelEl = document.getElementById("themeCandidatesLabel");
            const themeReadyBtn = document.getElementById("themeReadyBtn");
            const setupStatusEl = document.getElementById("setupStatus");
            const setupStatusTitleEl = document.getElementById("setupStatusTitle");
            const setupStatusTextEl = document.getElementById("setupStatusText");
            const setupProgressEl = document.getElementById("setupProgress");
            const setupProgressCountEl = document.getElementById("setupProgressCount");
            const setupProgressFillEl = document.getElementById("setupProgressFill");
            let selectedReplacementWord = null;

            function navigateTo(path) {
                if (path === "/game") {
                    try { sessionStorage.setItem("pending_game_navigation", String(Date.now())); } catch (_) {}
                }
                try { socket.disconnect(); } catch (_) {}
                window.location.href = path;
            }

            function clearVolatileGameState() {
                [
                    "game_started",
                    "words_given",
                    "last_asked_pair",
                    "game_setup_mode",
                    "game_setup_theme",
                    "last_round_mode",
                    "last_round_theme",
                    "accepted_theme_words",
                    "queued_next_round",
                    "pending_ask",
                    "pending_game_navigation",
                    "players"
                ].forEach((key) => {
                    try { sessionStorage.removeItem(key); } catch (_) {}
                });
                try { localStorage.removeItem("reconnect_token"); } catch (_) {}
                try { localStorage.removeItem("play_mode"); } catch (_) {}
                try { localStorage.removeItem("bot_mode"); } catch (_) {}
            }

            function exitGame() {
                socket.emit("leave_game", {
                    username: myName,
                    reconnect_token: getReconnectToken()
                });
                clearVolatileGameState();
                setTimeout(() => {
                    try { socket.disconnect(); } catch (_) {}
                    window.location.href = "/summary";
                }, 120);
            }

            function decodeThemeSelectionMessage(message) {
                if (!message) return "";
                if (message.startsWith("word_selected:")) {
                    return t("theme_selection_word_selected", { word: message.slice("word_selected:".length) });
                }
                if (message.startsWith("word_swapped:")) {
                    const parts = message.split(":");
                    return t("theme_selection_word_swapped", { old: parts[1] || "", new: parts[2] || "" });
                }
                if (message.startsWith("word_rejected:")) {
                    return t("theme_selection_word_rejected", { word: message.slice("word_rejected:".length) });
                }
                if (message.startsWith("ready:") || message.startsWith("unready:")) {
                    return t("theme_selection_ready_waiting");
                }
                return message;
            }

            function renderSetupStatus(payload) {
                window.currentSetupState = payload && payload.active ? payload : { active: false };
                const state = window.currentSetupState;
                if (!state.active) {
                    setupStatusEl.style.display = "none";
                    setupStatusTitleEl.textContent = "";
                    setupStatusTextEl.textContent = "";
                    setupProgressEl.style.display = "none";
                    setupProgressCountEl.textContent = "";
                    setupProgressFillEl.style.width = "0%";
                    document.body.classList.toggle("compact-lobby", Boolean(window.currentThemeSelectionState && window.currentThemeSelectionState.active));
                    return;
                }
                document.body.classList.add("compact-lobby");
                const theme = state.theme || "";
                const mode = state.mode || "theme";
                const phase = state.phase || "drawing_cards";
                const starterName = state.starter_name || "";
                setupStatusEl.style.display = "block";
                document.getElementById("startOptions").style.display = "none";
                setupStatusTitleEl.textContent = t("setup_status_title");
                let statusText;
                if (mode === "lang_manual") {
                    // Manual language mode: no theme/loading — just "entering words"
                    statusText = starterName ? t("setup_status_manual", { name: starterName }) : t("setup_status_manual", { name: "..." });
                } else {
                    const chosenText = starterName
                        ? (mode === "language" || mode === "spanish"
                            ? t("setup_status_chosen_spanish", { name: starterName, theme })
                            : t("setup_status_chosen_theme", { name: starterName, theme }))
                        : "";
                    const loadingText = phase === "finding_words"
                        ? t("setup_status_finding_words", { theme })
                        : t("setup_status_drawing_cards", { theme });
                    statusText = chosenText ? `${chosenText} ${loadingText}` : loadingText;
                }
                setupStatusTextEl.textContent = statusText;
                const totalPairs = Number(state.total_pairs || 8);
                const progressCount = Number(state.progress_count || 0);
                const showProgress = totalPairs > 0 && (mode === "theme" || mode === "language" || mode === "spanish");
                setupProgressEl.style.display = showProgress ? "block" : "none";
                if (showProgress) {
                    const safeCount = Math.max(0, Math.min(progressCount, totalPairs));
                    setupProgressCountEl.textContent = t("setup_progress_pairs", { count: safeCount, total: totalPairs });
                    setupProgressFillEl.style.width = `${(safeCount / totalPairs) * 100}%`;
                } else {
                    setupProgressCountEl.textContent = "";
                    setupProgressFillEl.style.width = "0%";
                }
            }

            function renderThemeSelection(payload) {
                window.currentThemeSelectionState = payload && payload.active ? payload : { active: false };
                const state = window.currentThemeSelectionState;
                if (!state.active) {
                    themeSelectionEl.style.display = "none";
                    themeSelectionMessageEl.textContent = "";
                    themeCandidatesLabelEl.textContent = "";
                    selectedReplacementWord = null;
                    document.body.classList.toggle("compact-lobby", Boolean(window.currentSetupState && window.currentSetupState.active));
                    return;
                }
                document.body.classList.add("compact-lobby");

                renderSetupStatus({ active: false });
                const myNameNow = (localStorage.getItem("username") || "").trim();
                const selectedWords = Array.isArray(state.selected_words) ? state.selected_words : [];
                const rejectedWords = new Set(Array.isArray(state.rejected_words) ? state.rejected_words : []);
                const counts = state.counts || {};
                const ready = state.ready || {};
                const swapLimit = Number(state.swap_limit || 4);
                const mySwapsUsed = counts[myNameNow] || 0;
                const canChoose = mySwapsUsed < swapLimit;
                const myReady = Boolean(ready[myNameNow]);
                const allSelected = selectedWords.length >= 8;
                const showCandidates = Boolean(selectedReplacementWord) && !myReady;
                if (selectedReplacementWord && !selectedWords.some((item) => item.word === selectedReplacementWord)) {
                    selectedReplacementWord = null;
                }

                themeSelectionEl.style.display = "block";
                document.getElementById("startOptions").style.display = "none";
                themeSelectionTitleEl.textContent = t("theme_selection_title", { theme: state.theme || "" });
                const helpText = allSelected ? t("theme_selection_ready_review") : t("theme_selection_help");
                themeSelectionHelpEl.textContent = helpText;
                themeSelectionHelpEl.style.display = helpText ? "" : "none";
                themeSelectionHelpEl.classList.toggle("compact", allSelected);
                themeSelectionTurnEl.textContent = selectedReplacementWord
                    ? t("theme_selection_pick_replacement")
                    : (myReady ? "" : t("theme_selection_selected_hint"));
                themeSelectionMessageEl.textContent = decodeThemeSelectionMessage(state.message);
                themeSelectionProgressEl.textContent = allSelected ? "" : t("theme_selection_progress", { count: selectedWords.length });
                themeSelectionProgressEl.style.display = allSelected ? "none" : "block";
                themeSelectionCountsEl.textContent = (state.players || [])
                    .map((name) => {
                        const swapPart = t("theme_selection_counts", { name, count: counts[name] || 0, limit: swapLimit });
                        const readyPart = ready[name]
                            ? t("theme_selection_ready_state", { name })
                            : t("theme_selection_not_ready_state", { name });
                        return `${swapPart} • ${readyPart}`;
                    })
                    .join(" | ");
                themeReadyStatusEl.innerHTML = "";
                (state.players || []).forEach((name) => {
                    const badge = document.createElement("div");
                    const isReady = Boolean(ready[name]);
                    badge.className = `ready-status-chip ${isReady ? "is-ready" : "is-waiting"}`;
                    badge.textContent = isReady
                        ? t("theme_selection_ready_badge_ready", { name })
                        : t("theme_selection_ready_badge_waiting", { name });
                    themeReadyStatusEl.appendChild(badge);
                });

                selectedWordsEl.innerHTML = "";
                const selectedLabel = document.createElement("div");
                selectedLabel.className = "theme-section-label";
                selectedLabel.textContent = t("theme_selection_selected_label");
                selectedWordsEl.appendChild(selectedLabel);
                const selectedSubtitleText = state.theme || t("theme_selection_selected_subtitle");
                if (selectedSubtitleText) {
                    const selectedSubtitle = document.createElement("div");
                    selectedSubtitle.className = "theme-section-subtitle";
                    selectedSubtitle.textContent = selectedSubtitleText;
                    selectedWordsEl.appendChild(selectedSubtitle);
                }
                const selectedWrap = document.createElement("div");
                selectedWrap.className = "selected-words-wrap";
                if (!selectedWords.length) {
                    const empty = document.createElement("div");
                    empty.textContent = t("theme_selection_selected_none");
                    selectedWordsEl.appendChild(empty);
                } else {
                    selectedWords.forEach((item) => {
                        const button = document.createElement("button");
                        button.type = "button";
                        button.className = "selected-word-chip";
                        button.textContent = item.display_word || item.word;
                        if (selectedReplacementWord === item.word) {
                            button.classList.add("active");
                        }
                        button.disabled = !canChoose;
                        button.addEventListener("click", () => {
                            selectedReplacementWord = selectedReplacementWord === item.word ? null : item.word;
                            renderThemeSelection(window.currentThemeSelectionState);
                        });
                        selectedWrap.appendChild(button);
                    });
                    selectedWordsEl.appendChild(selectedWrap);
                }

                const selectedSet = new Set(selectedWords.map((item) => item.word));
                themeCandidatesEl.innerHTML = "";
                if (showCandidates) {
                    themeCandidatesLabelEl.textContent = t("theme_selection_candidates_label");
                    themeCandidatesLabelEl.style.display = "";
                    themeCandidatesEl.style.display = "";
                    const candidatesSubtitle = document.createElement("div");
                    candidatesSubtitle.className = "theme-section-subtitle";
                    candidatesSubtitle.textContent = t("theme_selection_candidates_subtitle");
                    themeCandidatesEl.appendChild(candidatesSubtitle);
                    const candidatesPanel = document.createElement("div");
                    candidatesPanel.className = "theme-selection-panel";
                    const candidateWords = Array.isArray(state.candidate_words) && state.candidate_words.length
                        ? state.candidate_words
                        : (state.candidates || []).map((word) => ({ word, display_word: word }));
                    candidateWords.forEach((candidate) => {
                        const word = candidate.word;
                        if (selectedSet.has(word)) {
                            return;
                        }
                        const button = document.createElement("button");
                        button.type = "button";
                        button.className = "theme-word-chip available";
                        button.textContent = candidate.display_word || word;
                        if (rejectedWords.has(word)) {
                            button.classList.add("rejected");
                            button.disabled = true;
                        } else {
                            button.disabled = !canChoose;
                            button.addEventListener("click", () => {
                                socket.emit("select_theme_word", {
                                    word,
                                    replace_word: selectedReplacementWord,
                                    username: myNameNow,
                                    reconnect_token: getReconnectToken()
                                });
                            });
                        }
                        candidatesPanel.appendChild(button);
                    });
                    themeCandidatesEl.appendChild(candidatesPanel);
                } else {
                    themeCandidatesLabelEl.textContent = "";
                    themeCandidatesLabelEl.style.display = "none";
                    themeCandidatesEl.style.display = "none";
                }

                if (myReady) {
                    themeReadyBtn.style.display = "none";
                } else {
                    themeReadyBtn.style.display = "inline-flex";
                    themeReadyBtn.textContent = t("theme_selection_ready");
                    themeReadyBtn.classList.remove("ready");
                    themeReadyBtn.onclick = () => {
                        socket.emit("set_theme_ready", {
                            ready: true,
                            username: myNameNow,
                            reconnect_token: getReconnectToken()
                        });
                    };
                }
            }

            renderSetupStatus(window.currentSetupState || { active: false });
            renderThemeSelection(window.currentThemeSelectionState || { active: false });

            function updateLobbyFromPayload(payload) {
                window.latestLobbyPayload = payload || {};
                const players = (payload && payload.players) || [];
                const playersInfo = (payload && payload.players_info) || [];
                const lastJoinedToken = payload && payload.last_joined_token;
                console.log("[DEBUG] Pelaajat (ordered):", players);
                const playersDiv = document.getElementById("players");
                playersDiv.textContent = players.join(" & ");
                renderPlayerRole(playersInfo);

                // If player chose queue mode and hasn't joined queue yet, do it now
                if (localStorage.getItem("play_mode") === "queue" && !queueJoined && players.length < 2) {
                    socket.emit("join_queue", {
                        username: myName,
                        reconnect_token: reconnectToken
                    });
                }

                const isSolo = localStorage.getItem("play_mode") === "solo";
                const canStart = isSolo
                    ? players.length >= 1
                    : (() => {
                        const myToken = getReconnectToken();
                        return Boolean(myToken && lastJoinedToken && myToken === lastJoinedToken);
                    })();
                if (players.length >= 2 || isSolo) {
                    if ((!window.currentThemeSelectionState || !window.currentThemeSelectionState.active)
                        && (!window.currentSetupState || !window.currentSetupState.active)) {
                        document.getElementById("startOptions").style.display = canStart ? "block" : "none";
                    }
                    if (!isSolo) {
                        console.log("[DEBUG] canStart=", canStart, ", myToken=", getReconnectToken(), ", lastJoined=", lastJoinedToken);
                        maybeStartQueuedNextRound(canStart);
                    }
                } else if ((!window.currentThemeSelectionState || !window.currentThemeSelectionState.active)
                    && (!window.currentSetupState || !window.currentSetupState.active)) {
                    document.getElementById("startOptions").style.display = "none";
                }
            }

            function canCurrentPlayerStartRound() {
                const payload = window.latestLobbyPayload || {};
                const myToken = getReconnectToken();
                const lastJoinedToken = payload && payload.last_joined_token;
                return Boolean(myToken && lastJoinedToken && myToken === lastJoinedToken);
            }

            // --- Play mode selection ---
            let queueJoined = false;
            const playModeSelectEl = document.getElementById("playModeSelect");
            const queueStatusEl = document.getElementById("queueStatus");
            const queueTextEl = document.getElementById("queueText");

            function showPlayModeSelect() {
                document.getElementById("playModeText").textContent = t("play_mode_prompt");
                document.getElementById("botModeBtn").textContent = t("play_vs_bot");
                document.getElementById("humanModeBtn").textContent = t("find_opponent");
                document.getElementById("leaveQueueBtn").textContent = t("queue_leave");
                playModeSelectEl.style.display = "block";
                queueStatusEl.style.display = "none";
            }

            function hidePlayModeSelect() {
                playModeSelectEl.style.display = "none";
            }

            function showQueueStatus(text) {
                queueStatusEl.style.display = "block";
                playModeSelectEl.style.display = "none";
                queueTextEl.textContent = text || t("queue_searching");
            }

            function hideQueueStatus() {
                queueStatusEl.style.display = "none";
            }

            document.getElementById("botModeBtn").addEventListener("click", () => {
                localStorage.setItem("bot_mode", "1");
                localStorage.setItem("play_mode", "bot");
                hidePlayModeSelect();
                if (!hasJoined) { emitJoin(); hasJoined = true; }
            });

            document.getElementById("humanModeBtn").addEventListener("click", () => {
                localStorage.setItem("bot_mode", "0");
                localStorage.setItem("play_mode", "queue");
                hidePlayModeSelect();
                if (!hasJoined) { emitJoin(); hasJoined = true; }
                // join_queue emitted after first lobby event confirms player is registered
            });

            document.getElementById("leaveQueueBtn").addEventListener("click", () => {
                socket.emit("leave_queue", {});
                queueJoined = false;
            });

            socket.on("queue_joined", () => {
                queueJoined = true;
                showQueueStatus(t("queue_searching"));
            });

            socket.on("queue_status", (data) => {
                if (!queueJoined) return;
                showQueueStatus(t("queue_searching"));
            });

            socket.on("match_found", (data) => {
                queueJoined = false;
                localStorage.removeItem("play_mode");
                hideQueueStatus();
                queueTextEl.textContent = t("match_found_msg");
                queueStatusEl.style.display = "block";
                setTimeout(() => { queueStatusEl.style.display = "none"; }, 2000);
            });

            socket.on("queue_left", () => {
                queueJoined = false;
                hideQueueStatus();
                showPlayModeSelect();
            });

            socket.on("queue_error", () => {
                queueJoined = false;
                hideQueueStatus();
                showPlayModeSelect();
            });
            // --- End play mode selection ---

            function emitJoin() {
                // Tarkista reconnect_tokenin arvo ja tyyppi ennen emitointia
                console.log("DEBUG: emitJoin, username:", myName, ", reconnect_token:", reconnectToken, ", typeof reconnect_token:", typeof reconnectToken);
                if (reconnectToken === undefined || reconnectToken === null || reconnectToken === "") {
                    alert(t("reconnect_empty_alert"));
                    location.reload();
                    return;
                }
                const isSolo = localStorage.getItem("play_mode") === "solo";
                const joinPayload = {
                    username: myName,
                    reconnect_token: reconnectToken,
                    bot_mode: localStorage.getItem("bot_mode") === "1",
                    solo_mode: isSolo
                };
                console.log("DEBUG: join-payload:", JSON.stringify(joinPayload));
                socket.emit("join", joinPayload);
            }

            function getQueuedNextRound() {
                try {
                    const raw = sessionStorage.getItem("queued_next_round");
                    return raw ? JSON.parse(raw) : null;
                } catch (_) {
                    return null;
                }
            }

            function clearQueuedNextRound() {
                try { sessionStorage.removeItem("queued_next_round"); } catch (_) {}
            }

            function askName() {
                let name = prompt(t("prompt_name"), myName || "");
                if (name && name.trim().length > 0) {
                    name = name.trim();
                    localStorage.setItem("username", name);
                    myName = name;
                    if (!hasJoined) {
                        if (!localStorage.getItem("play_mode")) {
                            showPlayModeSelect();
                        } else {
                            emitJoin();
                            hasJoined = true;
                        }
                    }
                } else {
                    askName();
                }
            }

            function startManualRound() {
                if (!myName || myName.trim().length === 0) {
                    askName();
                    return;
                }
                console.log("[DEBUG] Aloitetaan peli omilla sanoilla");
                try { sessionStorage.setItem("game_setup_mode", "manual"); } catch (e) {}
                try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
                try { sessionStorage.removeItem("last_asked_pair"); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                socket.emit("start_custom_game", { mode: "manual", ui_language: getLanguage() });
            }

            function startThemeRound(prefill = "") {
                if (!myName || myName.trim().length === 0) {
                    askName();
                    return;
                }
                let theme = prompt(t("enter_theme_prompt"), prefill || "");
                while (theme !== null && theme.trim().length === 0) {
                    theme = prompt(t("enter_theme_prompt"), prefill || "");
                }
                if (theme === null) {
                    return;
                }
                theme = theme.trim();
                console.log("[DEBUG] Aloitetaan peli teemalla:", theme);
                try { sessionStorage.setItem("game_setup_mode", "theme"); } catch (e) {}
                try { sessionStorage.setItem("game_setup_theme", theme); } catch (e) {}
                try { sessionStorage.removeItem("last_asked_pair"); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                renderThemeSelection({ active: false });
                renderSetupStatus({ active: true, mode: "theme", theme });
                socket.emit("start_custom_game", { mode: "theme", theme, ui_language: getLanguage() });
            }

            function startLanguageRound(targetLang, prefill = "", cardMode = "image_word") {
                if (!myName || myName.trim().length === 0) {
                    askName();
                    return;
                }
                let theme = prompt(t("enter_lang_theme_prompt"), prefill || "");
                while (theme !== null && theme.trim().length === 0) {
                    theme = prompt(t("enter_lang_theme_prompt"), prefill || "");
                }
                if (theme === null) {
                    return;
                }
                theme = theme.trim();
                console.log("[DEBUG] Aloitetaan kielipeli, kieli:", targetLang, "teema:", theme);
                try { sessionStorage.setItem("game_setup_mode", "language"); } catch (e) {}
                try { sessionStorage.setItem("game_setup_lang", targetLang); } catch (e) {}
                try { sessionStorage.setItem("game_setup_card_mode", cardMode); } catch (e) {}
                try { sessionStorage.setItem("game_setup_theme", theme); } catch (e) {}
                try { sessionStorage.removeItem("last_asked_pair"); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                renderThemeSelection({ active: false });
                renderSetupStatus({ active: true, mode: "language", theme });
                socket.emit("start_custom_game", { mode: "theme", card_mode: cardMode, target_language: targetLang, theme, ui_language: getLanguage() });
            }

            function startLangManualRound(targetLang, cardMode = "image_word") {
                if (!myName || myName.trim().length === 0) {
                    askName();
                    return;
                }
                const cm = cardMode || "image_word";
                console.log("[DEBUG] Aloitetaan kielimanuaalipeli, kieli:", targetLang, "cardMode:", cm);
                try { sessionStorage.setItem("game_setup_mode", "lang_manual"); } catch (e) {}
                try { sessionStorage.setItem("game_setup_lang", targetLang); } catch (e) {}
                try { sessionStorage.setItem("game_setup_card_mode", cm); } catch (e) {}
                try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
                try { sessionStorage.removeItem("last_asked_pair"); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                renderThemeSelection({ active: false });
                renderSetupStatus({ active: true, mode: "lang_manual" });
                socket.emit("start_custom_game", { mode: "manual", card_mode: cm, target_language: targetLang, ui_language: getLanguage() });
            }

            function maybeStartQueuedNextRound(canStart) {
                if (!canStart || queuedNextRoundHandled) {
                    return;
                }
                const queued = getQueuedNextRound();
                if (!queued || !queued.mode) {
                    return;
                }
                // Only auto-start if all players are actively in the waiting room
                const playersInfo = (window.latestLobbyPayload && window.latestLobbyPayload.players_info) || [];
                if (playersInfo.length >= 2 && !playersInfo.every(p => p.in_waiting)) {
                    return;
                }
                queuedNextRoundHandled = true;
                clearQueuedNextRound();
                if (queued.mode === "manual") {
                    startManualRound();
                    return;
                }
                if (queued.mode === "theme") {
                    startThemeRound(queued.theme || "");
                    return;
                }
                if (queued.mode === "language" || queued.mode === "spanish") {
                    const lang = queued.target_lang || sessionStorage.getItem("game_setup_lang") || "es";
                    const cm = queued.card_mode || sessionStorage.getItem("game_setup_card_mode") || "image_word";
                    startLanguageRound(lang, queued.theme || "", cm);
                }
            }

            socket.on("player_joined", (payload) => {
                updateLobbyFromPayload(payload);
            });
            socket.on("lobby_state", (payload) => {
                console.log("[DEBUG] lobby_state:", payload);
                updateLobbyFromPayload(payload);
            });

            // --- Round options state ---
            let selectedWordSource = "manual"; // "manual" | "theme"
            let selectedCardMode = "image_word"; // "images" | "image_word" | "words"
            let selectedLang = "es";

            function updateLangPickerVisibility() {
                const needsLang = selectedCardMode !== "images";
                document.getElementById("langPicker").style.display = needsLang ? "block" : "none";
            }

            document.querySelectorAll("#srcManualBtn, #srcThemeBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    selectedWordSource = btn.dataset.source;
                    document.querySelectorAll("#srcManualBtn, #srcThemeBtn").forEach(b => b.classList.toggle("active", b === btn));
                });
            });

            document.querySelectorAll("#cardModeImages, #cardModeImageWord, #cardModeWords").forEach(btn => {
                btn.addEventListener("click", () => {
                    selectedCardMode = btn.dataset.mode;
                    document.querySelectorAll("#cardModeImages, #cardModeImageWord, #cardModeWords").forEach(b => b.classList.toggle("active", b === btn));
                    updateLangPickerVisibility();
                });
            });

            updateLangPickerVisibility(); // show lang picker for default image_word

            document.querySelectorAll(".lang-flag-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    selectedLang = btn.dataset.lang;
                    document.querySelectorAll(".lang-flag-btn").forEach(b => b.classList.toggle("active", b === btn));
                });
            });

            document.getElementById("startRoundBtn").addEventListener("click", () => {
                if (selectedCardMode === "images") {
                    if (selectedWordSource === "theme") {
                        startThemeRound();
                    } else {
                        startManualRound();
                    }
                } else {
                    if (selectedWordSource === "theme") {
                        startLanguageRound(selectedLang, "", selectedCardMode);
                    } else {
                        startLangManualRound(selectedLang, selectedCardMode);
                    }
                }
            });

            document.getElementById("exitGameBtn").addEventListener("click", () => {
                exitGame();
            });

            socket.on("start_game", () => {
                console.log("[DEBUG] Vastaanotettiin 'start_game', siirrytään peliin");
                navigateTo("/game");
            });

            // Custom-peli: kun sanat tai ruudukko alkaa, siirry peliin
            socket.on("ask_for_word", (data) => {
                console.log("[DEBUG] Vastaanotettiin 'ask_for_word' odotushuoneessa – talletetaan ja siirrytään peliin");
                const myNameNow = (localStorage.getItem("username") || "").trim();
                try { sessionStorage.setItem("game_setup_mode", "manual"); } catch (e) {}
                try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                if (myNameNow === data.player) {
                    renderSetupStatus({ active: false });
                    try { sessionStorage.setItem("pending_ask", JSON.stringify(data)); } catch (e) {}
                    navigateTo("/game");
                    return;
                }
                try { sessionStorage.removeItem("pending_ask"); } catch (e) {}
                setupStatusEl.style.display = "block";
                setupStatusTitleEl.textContent = t("setup_status_title");
                setupStatusTextEl.textContent = t("setup_status_manual", { name: data.player || "" });
                document.getElementById("startOptions").style.display = "none";
            });
            socket.on("theme_generation_started", (data) => {
                console.log("[DEBUG] Teemapelin generointi aloitettu:", data);
                const mode = (data && data.mode) || "theme";
                try { sessionStorage.setItem("game_setup_mode", mode); } catch (e) {}
                if (data && data.theme) {
                    try { sessionStorage.setItem("game_setup_theme", data.theme); } catch (e) {}
                }
                renderSetupStatus({
                    active: true,
                    mode,
                    theme: (data && data.theme) || "",
                    phase: (data && data.phase) || "drawing_cards",
                    starter_name: (data && data.starter_name) || "",
                    progress_count: Math.max(0, Number(((data && data.pair) || 1)) - 1),
                    total_pairs: Number((data && data.total_pairs) || 8)
                });
                renderThemeSelection({ active: false });
            });
            socket.on("theme_word_accepted", (data) => {
                if (!window.currentSetupState || !window.currentSetupState.active) return;
                const currentState = {
                    ...window.currentSetupState,
                    active: true,
                    phase: "drawing_cards",
                    progress_count: Number((data && data.pair) || 0),
                    total_pairs: Number((data && data.total_pairs) || 8)
                };
                renderSetupStatus(currentState);
            });
            socket.on("theme_selection_updated", (payload) => {
                console.log("[DEBUG] theme_selection_updated:", payload);
                renderThemeSelection(payload);
            });
            socket.on("theme_selection_failed", (payload) => {
                console.log("[DEBUG] theme_selection_failed:", payload);
                const reason = (payload && payload.reason) || "";
                if (reason === "image_missing") {
                    themeSelectionMessageEl.textContent = t("theme_selection_error_image", { word: (payload && payload.word) || "" });
                    return;
                }
                if (reason === "replace_missing") {
                    themeSelectionMessageEl.textContent = t("theme_selection_error_replace");
                    return;
                }
                themeSelectionMessageEl.textContent = t("theme_selection_error_generic");
            });
            socket.on("init_grid", () => {
                console.log("[DEBUG] Vastaanotettiin 'init_grid' odotushuoneessa – siirrytään peliin");
                renderSetupStatus({ active: false });
                navigateTo("/game");
            });
            socket.on("game_setup_error", (data) => {
                const reason = localizeServerMessage((data && data.reason) || t("setup_failed"));
                console.error("[DEBUG] game_setup_error:", reason);
                const failedMode = sessionStorage.getItem("game_setup_mode");
                const failedTheme = sessionStorage.getItem("game_setup_theme") || "";
                try { sessionStorage.removeItem("game_setup_mode"); } catch (e) {}
                try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
                renderSetupStatus({ active: false });
                window.currentThemeSelectionState = { active: false };
                renderThemeSelection(window.currentThemeSelectionState);
                alert(reason);
                updateLobbyFromPayload(window.latestLobbyPayload || {});
                if (canCurrentPlayerStartRound() && (failedMode === "theme" || failedMode === "language" || failedMode === "spanish")) {
                    setTimeout(() => {
                        if (failedMode === "theme") {
                            startThemeRound(failedTheme);
                        } else {
                            const lang = sessionStorage.getItem("game_setup_lang") || "es";
                            const cm = sessionStorage.getItem("game_setup_card_mode") || "image_word";
                            startLanguageRound(lang, failedTheme, cm);
                        }
                    }, 0);
                }
            });
            socket.on("game_aborted", (data) => {
                const reason = localizeServerMessage((data && data.reason) || t("game_aborted"));
                renderSetupStatus({ active: false });
                window.currentThemeSelectionState = { active: false };
                renderThemeSelection(window.currentThemeSelectionState);
                alert(reason);
            });
            socket.on("join_rejected", (data) => {
                const reason = localizeServerMessage((data && data.reason) || t("game_full"));
                alert(reason);
                navigateTo("/");
            });

            // Yhteyden katkeamisen ja uudelleenliittymisen käsittely
            socket.on("disconnect", (reason) => {
                console.warn("[DEBUG] Socket.IO yhteys katkesi:", reason);
                if (reason === "io client disconnect") {
                    return;
                }
                alert(t("disconnect_alert"));
            });

            socket.io.on("reconnect", (attempt) => {
                console.log("[DEBUG] Socket.IO yhteys palautui, reconnect attempt:", attempt);
                myName = localStorage.getItem("username");
                reconnectToken = getReconnectToken();
                if (myName && myName.trim().length > 0) {
                    emitJoin();
                    hasJoined = true;
                }
            });

            socket.io.on("reconnect_error", (err) => {
                console.error("[DEBUG] Socket.IO reconnect error:", err);
            });

            const storedPlayMode = localStorage.getItem("play_mode");
            if (!myName || myName.trim().length === 0) {
                askName();
            } else if (!storedPlayMode) {
                // First visit: show mode selection, don't join yet
                showPlayModeSelect();
            } else {
                emitJoin();
                hasJoined = true;
            }

            document.getElementById("changeNameBtn").onclick = function() {
                localStorage.removeItem("username");
                hasJoined = false;
                askName();
            };

            socket.emit("request_lobby_state");
            console.log("[DEBUG] Socket yhteys OK (waiting_room.html)");
        }
    </script>
</body>
</html>
