<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waiting Room</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .shell {
            width: min(720px, calc(100% - 32px));
            margin: 20px auto 0;
            padding: 0 0 20px;
        }
        body.compact-lobby .shell {
            margin-top: 18px;
        }
        .flag-svg { width: 26px; height: 18px; display: block; }
        .card-mode-btn {
            padding: 6px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .card-mode-btn.active {
            background: rgba(124,245,138,0.15);
            border-color: rgba(124,245,138,0.4);
            color: #7cf58a;
            font-weight: 700;
        }
        .lang-select {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 15px;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            min-width: 160px;
            text-align: center;
        }
        .lang-select:focus {
            border-color: rgba(255,255,255,0.3);
        }
        .lang-select option {
            background: #1a1a1a;
            color: #fff;
        }

        h1 {
            display: none;
        }
        body.compact-lobby h1 {
            display: none;
        }
        #introText {
            max-width: 560px;
            margin: 0 auto 14px;
            color: #d4ddd4;
            font-size: 16px;
            line-height: 1.6;
        }
        body.compact-lobby #introText,
        body.compact-lobby #playerRole,
        body.compact-lobby #hint {
            display: none !important;
        }

        #players {
            margin: 8px 0 14px;
            font-size: 24px;
        }
        body.compact-lobby #players {
            margin: 6px 0 12px;
            font-size: 20px;
        }
        #playerRole {
            margin: 6px 0 14px;
            color: #9fe5a8;
            font-size: 18px;
            font-weight: 700;
        }
        .player-pref-row {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .player-sep {
            opacity: 0.6;
        }
        .pref-badge {
            display: inline-block;
            font-size: 13px;
            padding: 1px 7px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            line-height: 1.5;
        }
        .pref-badge.pref-match {
            background: rgba(124,245,138,0.12);
            border-color: rgba(124,245,138,0.35);
            color: #9fe5a8;
        }
        .pref-badge.pref-mismatch {
            background: rgba(245,180,60,0.12);
            border-color: rgba(245,180,60,0.4);
            color: #f5c060;
        }
        #lobbyBrowser {
            display: none;
            max-width: 620px;
            margin: 14px auto 16px;
            padding: 14px 16px 12px;
            border-radius: 22px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 18px 40px rgba(0,0,0,0.22);
            text-align: left;
        }
        #lobbyBrowserTitle {
            font-size: 18px;
            font-weight: 700;
            color: #f7e7c4;
            margin-bottom: 5px;
        }
        #lobbyBrowserSubtitle {
            font-size: 14px;
            color: #d4c4a4;
            margin-bottom: 12px;
            line-height: 1.45;
        }
        .lobby-entry {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }
        .lobby-entry-main {
            flex: 1;
            min-width: 0;
        }
        .lobby-entry-name {
            display: block;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .lobby-entry-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .lobby-entry-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 13px;
            color: #e6d5b6;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .lobby-join-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid rgba(124,245,138,0.4);
            background: rgba(124,245,138,0.1);
            color: #7cf58a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.12s;
            white-space: nowrap;
        }
        .lobby-join-btn:hover {
            background: rgba(124,245,138,0.2);
        }

        #changeNameBtn {
            display: none;
            background-color: limegreen;
            color: black;
            font-size: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #changeNameBtn:hover { background-color: green; }

        #startOptions {
            display: none;
            margin-top: 20px;
        }

        .option-group {
            margin: 0 auto 14px;
            max-width: 480px;
            text-align: left;
        }
        .option-group-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a7a6a;
            margin-bottom: 7px;
            padding-left: 2px;
        }
        .option-group-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        #wordSourcePicker .option-group-btns {
            flex-wrap: nowrap;
            gap: 6px;
        }
        #wordSourcePicker .opt-btn {
            flex: 1 1 0;
            min-width: 0;
            padding: 9px 12px;
            font-size: 14px;
            white-space: nowrap;
        }
        .opt-btn {
            padding: 10px 16px;
            border-radius: 16px;
            border: 1.5px solid rgba(255,255,255,0.13);
            background: rgba(255,255,255,0.05);
            color: #bbb;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-align: center;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
        }
        .opt-btn-title {
            font-weight: 700;
            line-height: 1.15;
        }
        .opt-btn-desc {
            font-size: 11px;
            line-height: 1.25;
            color: var(--text-soft);
            max-width: 112px;
            font-weight: 500;
        }
        .opt-btn.active .opt-btn-desc {
            color: var(--text-muted);
        }
        .opt-btn:hover {
            background: rgba(255,255,255,0.09);
            color: #ddd;
        }
        .opt-btn.active {
            background: rgba(124,245,138,0.15);
            border-color: rgba(124,245,138,0.5);
            color: #7cf58a;
        }
        #wordFilterPicker {
            margin-top: 20px;
        }
        #langPicker {
            display: none;
        }
        .lang-flag-btn {
            width: 44px;
            height: 33px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1.5px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, transform 0.12s;
        }
        .lang-flag-btn:hover {
            background: rgba(255,255,255,0.09);
            transform: translateY(-1px);
        }
        .lang-flag-btn.active {
            background: rgba(124,245,138,0.22);
            border-color: rgba(124,245,138,0.9);
            box-shadow: 0 0 0 2px rgba(124,245,138,0.18), 0 10px 22px rgba(124,245,138,0.16);
            transform: translateY(-1px) scale(1.04);
        }
        .lang-flag-btn.active .flag-svg {
            filter: saturate(1.18) brightness(1.08);
        }
        #startRoundBtn {
            display: block;
            margin: 18px auto 0;
            padding: 13px 38px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(180deg, #7cf58a, #47d45c);
            color: #0d2211;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(71,212,92,0.22);
            transition: filter 0.12s;
        }
        #startRoundBtn:hover { filter: brightness(1.05); }
        #startRoundBtn:disabled {
            cursor: wait;
            opacity: 0.78;
            filter: saturate(0.78);
        }
        #setupStatus {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        #setupStatusTitle {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff4a8;
        }
        #setupStatusText {
            color: #d4ddd4;
            line-height: 1.6;
        }
        #setupProgress {
            display: none;
            max-width: 460px;
            margin: 14px auto 0;
        }
        #setupProgressCount {
            color: #eef2ee;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        #setupProgressBar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.18);
        }
        #setupProgressFill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #89ef9d, #d9ff8b);
            transition: width 0.25s ease;
        }
        #themeSelection {
            display: none;
            margin-top: 26px;
            padding: 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        #themeSelectionTitle {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        #themeSelectionHelp,
        #themeSelectionTurn,
        #themeSelectionMessage {
            color: #d4ddd4;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        #themeSelectionHelp.compact {
            margin-bottom: 2px;
            color: #cfd6cf;
        }
        #themeSelectionMessage {
            min-height: 24px;
            color: #ffe28c;
        }
        #themeSelectionProgress,
        #themeSelectionCounts,
        #selectedWords {
            margin: 12px 0;
            color: #eef2ee;
        }
        .theme-section-label {
            margin: 12px 0 8px;
            color: #fff4a8;
            font-size: 18px;
            font-weight: 700;
        }
        .theme-section-subtitle {
            margin: 0 0 10px;
            color: #bfc8bf;
            font-size: 14px;
        }
        #themeReadyStatus {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0;
        }
        .ready-status-chip {
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 700;
            background: #4c4c4c;
            color: #f1f1f1;
        }
        .ready-status-chip.is-ready {
            background: #89ef9d;
            color: #10361a;
        }
        .ready-status-chip.is-waiting {
            background: #6b5a27;
            color: #fff0b3;
        }
        #selectedWords {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .selected-words-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .theme-selection-panel {
            margin-top: 12px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .selected-word-chip {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
            background: #f2d46d;
            color: #111;
            font-weight: 700;
        }
        .selected-word-chip.active {
            background: #ffd24d;
            color: #111;
            box-shadow: 0 0 0 3px rgba(255, 210, 77, 0.35);
        }
        .selected-word-chip:disabled {
            background: #8c7a3f;
            color: #231d0b;
            cursor: not-allowed;
        }
        #themeCandidates {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }
        #themeSelectionActions {
            display: flex;
            justify-content: center;
            margin: 12px 0 10px;
        }
        .theme-action-btn {
            background: linear-gradient(180deg, #7cf58a, #47d45c);
            color: #0d2211;
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(71, 212, 92, 0.22);
        }
        .theme-action-btn.ready {
            background: linear-gradient(180deg, #ffd86c, #efb73f);
            color: #211400;
            box-shadow: 0 8px 22px rgba(239, 183, 63, 0.2);
        }
        .theme-action-btn:hover {
            filter: brightness(1.03);
        }
        .footer-credit {
            margin-top: 18px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
        .secondaryBtn {
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 18px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            margin-top: 14px;
        }
        .secondaryBtn:hover {
            background: rgba(255,255,255,0.12);
        }
        .theme-word-chip {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
            background: #4b4f56;
            color: #f3f3f3;
        }
        .theme-word-chip:hover {
            background: #5c7d63;
        }
        .theme-word-chip.available {
            background: #4b4f56;
            color: #f3f3f3;
        }
        .theme-word-chip.selected {
            background: #7ccf8d;
            color: #0d1b11;
            cursor: default;
        }
        .theme-word-chip.rejected,
        .theme-word-chip:disabled {
            background: #555;
            color: #ddd;
            cursor: not-allowed;
        }
        #playModeSelect {
            display: none;
            margin-top: 28px;
        }
        #playModeText {
            color: #d4ddd4;
            font-size: 17px;
            margin-bottom: 18px;
        }
        .play-mode-btn {
            display: block;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 14px;
            padding: 18px 20px;
            border-radius: 16px;
            border: none;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.15s;
        }
        .play-mode-btn.bot-btn {
            background: linear-gradient(180deg, #7cf58a, #47d45c);
            color: #0d2211;
        }
        .play-mode-btn.human-btn {
            background: linear-gradient(180deg, #7ab8f5, #4a8fd4);
            color: #0a1a2e;
        }
        .play-mode-btn:hover { filter: brightness(1.05); }
        #queueStatus {
            display: none;
            margin-top: 32px;
            text-align: center;
        }
        .queue-spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #7cf58a;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #queueText {
            font-size: 18px;
            color: #d4ddd4;
            margin-bottom: 20px;
        }
        #queuePreparedSummary {
            display: none;
            max-width: 520px;
            margin: 0 auto 16px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: left;
        }
        .queue-summary-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9fae9f;
            margin-bottom: 10px;
        }
        .queue-summary-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .queue-summary-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            color: #f0f2d7;
            font-size: 14px;
            font-weight: 600;
        }
        .queue-summary-chip-label {
            color: #b7c2b7;
            font-size: 12px;
            font-weight: 500;
        }
        body {
            --bg-top: #121615;
            --bg-bottom: #0a0d0c;
            --bg-glow: rgba(124, 245, 138, 0.11);
            --text-main: #f4f7f3;
            --text-muted: #d4ddd4;
            --text-soft: #aab7aa;
            --heading-color: #f5f2d2;
            --panel-bg: rgba(255,255,255,0.05);
            --panel-border: rgba(255,255,255,0.08);
            --panel-soft: rgba(255,255,255,0.03);
            --control-bg: rgba(255,255,255,0.06);
            --control-border: rgba(255,255,255,0.12);
            --control-text: #d9e3d9;
            --accent: #89ef9d;
            --accent-strong: #47d45c;
            --accent-soft: rgba(124,245,138,0.14);
            --accent-text: #0d2211;
            --secondary-accent: #7ab8f5;
            --secondary-accent-strong: #4a8fd4;
            --secondary-accent-text: #0a1a2e;
            --warning: #ffe28c;
            --spinner-ring: rgba(255,255,255,0.1);
            --font-body: "Trebuchet MS", "Segoe UI", sans-serif;
            --font-display: "Georgia", "Times New Roman", serif;
            background:
                radial-gradient(circle at top, var(--bg-glow), transparent 36%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
        }
        body[data-ui-style="cozy"] {
            --bg-top: #221912;
            --bg-bottom: #120d09;
            --bg-glow: rgba(255, 190, 120, 0.18);
            --text-main: #fff6ea;
            --text-muted: #ead7c3;
            --text-soft: #cdb49d;
            --heading-color: #ffe5bc;
            --panel-bg: rgba(64, 38, 21, 0.58);
            --panel-border: rgba(255, 214, 156, 0.16);
            --panel-soft: rgba(255, 240, 220, 0.05);
            --control-bg: rgba(255, 244, 230, 0.08);
            --control-border: rgba(255, 214, 156, 0.18);
            --control-text: #f7e7d2;
            --accent: #f2ba74;
            --accent-strong: #de8d47;
            --accent-soft: rgba(242, 186, 116, 0.18);
            --accent-text: #2a1708;
            --secondary-accent: #d7a6ff;
            --secondary-accent-strong: #b17ade;
            --secondary-accent-text: #1f102d;
            --warning: #ffd08d;
            --font-body: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
            --font-display: "Palatino Linotype", "Book Antiqua", serif;
        }
        body[data-ui-style="cabinet"] {
            --bg-top: #171311;
            --bg-bottom: #0c0908;
            --bg-glow: rgba(203, 160, 92, 0.14);
            --text-main: #f3ece2;
            --text-muted: #d8c9b7;
            --text-soft: #b29e8a;
            --heading-color: #f2dfb6;
            --panel-bg: rgba(38, 28, 23, 0.68);
            --panel-border: rgba(214, 182, 122, 0.16);
            --panel-soft: rgba(255, 244, 226, 0.04);
            --control-bg: rgba(255, 248, 235, 0.05);
            --control-border: rgba(214, 182, 122, 0.18);
            --control-text: #eadfce;
            --accent: #d9b36f;
            --accent-strong: #b67d36;
            --accent-soft: rgba(217, 179, 111, 0.18);
            --accent-text: #24170a;
            --secondary-accent: #7ca6b9;
            --secondary-accent-strong: #547f92;
            --secondary-accent-text: #08161d;
            --warning: #f3d18a;
            --font-body: "Book Antiqua", "Palatino Linotype", serif;
            --font-display: "Georgia", "Times New Roman", serif;
        }
        body[data-ui-style="minimal"] {
            --bg-top: #0f1418;
            --bg-bottom: #070a0d;
            --bg-glow: rgba(127, 184, 212, 0.12);
            --text-main: #eef4f8;
            --text-muted: #c4d1da;
            --text-soft: #92a3af;
            --heading-color: #f3f7fb;
            --panel-bg: rgba(255,255,255,0.035);
            --panel-border: rgba(165, 193, 210, 0.12);
            --panel-soft: rgba(255,255,255,0.025);
            --control-bg: rgba(255,255,255,0.04);
            --control-border: rgba(165, 193, 210, 0.16);
            --control-text: #dce7ee;
            --accent: #8fd5ee;
            --accent-strong: #5baaca;
            --accent-soft: rgba(143, 213, 238, 0.16);
            --accent-text: #071820;
            --secondary-accent: #b6c5d6;
            --secondary-accent-strong: #8498ae;
            --secondary-accent-text: #101923;
            --warning: #f2dfa3;
            --font-body: "Verdana", "Geneva", sans-serif;
            --font-display: "Trebuchet MS", "Gill Sans", sans-serif;
        }
        h1 {
            color: var(--heading-color);
            font-family: var(--font-display);
            letter-spacing: 0.03em;
        }
        #introText,
        #queueText,
        #setupStatusText,
        #themeSelectionHelp,
        #themeSelectionTurn,
        #playModeText,
        #hint,
        #themeSelectionCounts,
        .theme-section-subtitle,
        .footer-credit {
            color: var(--text-muted);
        }
        #players,
        #themeSelectionTitle,
        #setupProgressCount,
        #selectedWords,
        #themeSelectionProgress {
            color: var(--text-main);
        }
        #playerRole,
        #setupStatusTitle,
        .theme-section-label,
        #settingsTitle {
            color: var(--heading-color);
        }
        #setupStatus,
        #themeSelection,
        .selected-words-wrap,
        .theme-selection-panel,
        .flag-toggle,
        .settings-panel {
            background: var(--panel-bg);
            border-color: var(--panel-border);
        }
        .option-group-label,
        .settings-group-label,
        #settingsEyebrow {
            color: var(--text-soft);
        }
        .opt-btn,
        .card-mode-btn,
        .lang-flag-btn,
        .secondaryBtn,
        .topbar-btn,
        .settings-chip,
        .lang-select {
            background: var(--control-bg);
            border-color: var(--control-border);
            color: var(--control-text);
        }
        .opt-btn:hover,
        .card-mode-btn:hover,
        .lang-flag-btn:hover,
        .secondaryBtn:hover,
        .topbar-btn:hover,
        .settings-chip:hover {
            background: var(--panel-soft);
        }
        .opt-btn.active,
        .card-mode-btn.active,
        .lang-flag-btn.active,
        .settings-chip.active {
            background: var(--accent-soft);
            border-color: rgba(255,255,255,0.14);
            color: var(--accent);
        }
        #startRoundBtn,
        .theme-action-btn,
        .play-mode-btn.bot-btn {
            background: linear-gradient(180deg, var(--accent), var(--accent-strong));
            color: var(--accent-text);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
        }
        .play-mode-btn.human-btn {
            background: linear-gradient(180deg, var(--secondary-accent), var(--secondary-accent-strong));
            color: var(--secondary-accent-text);
        }
        .ready-status-chip.is-ready,
        .theme-word-chip.selected {
            background: var(--accent-soft);
            color: var(--accent-text);
        }
        .selected-word-chip,
        .selected-word-chip.active {
            background: var(--warning);
            color: #1d1305;
        }
        #themeSelectionMessage {
            color: var(--warning);
        }
        .queue-spinner {
            border-color: var(--spinner-ring);
            border-top-color: var(--accent);
        }
        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }
        .topbar-btn {
            border: 1px solid var(--control-border);
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.16s ease, filter 0.16s ease, background 0.16s ease;
        }
        .topbar-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }
        .settings-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.16s ease;
            z-index: 1000;
        }
        .settings-modal.is-open {
            opacity: 1;
            pointer-events: auto;
        }
        .settings-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(4, 8, 10, 0.62);
            backdrop-filter: blur(8px);
        }
        .settings-panel {
            position: relative;
            width: min(560px, calc(100vw - 28px));
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 24px 60px rgba(0,0,0,0.36);
            text-align: left;
        }
        .settings-panel-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 18px;
        }
        #settingsEyebrow {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }
        #settingsTitle {
            margin: 0;
            font-size: 30px;
        }
        #settingsSubtitle {
            margin: 8px 0 0;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .settings-close-btn {
            border: 1px solid var(--control-border);
            border-radius: 999px;
            background: var(--control-bg);
            color: var(--control-text);
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
        }
        .settings-group {
            margin-top: 18px;
        }
        .settings-group-label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .settings-choice-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .settings-chip {
            border: 1px solid var(--control-border);
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
        }
        .settings-chip:hover {
            transform: translateY(-1px);
        }
        body.settings-open {
            overflow: hidden;
        }
        body[data-ui-motion="reduced"] *,
        body[data-ui-motion="reduced"] *::before,
        body[data-ui-motion="reduced"] *::after {
            animation: none !important;
            transition: none !important;
            scroll-behavior: auto !important;
        }
    </style>
</head>

                        <option value="de">Deutsch</option>
                        <option value="fr">Français</option>

                        <button type="button" class="settings-chip" data-ui-style-choice="cozy">Cozy</button>
                        <button type="button" class="settings-chip" data-ui-style-choice="cabinet">Cabinet</button>
                        <button type="button" class="settings-chip" data-ui-style-choice="minimal">Minimal</button>

                <div class="settings-group">

                        <button type="button" class="settings-chip" data-ui-motion-choice="reduced">Reduced</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="players"></div>
        <h1 id="pageTitle">Waiting Room</h1>
        <p id="introText"></p>

            <button class="play-mode-btn human-btn" id="humanModeBtn"></button>

        <div id="queueStatus">

        </div>
        <div id="lobbyBrowser">
            <div id="lobbyBrowserTitle"></div>
            <div id="lobbyBrowserSubtitle"></div>
            <div id="lobbyBrowserList"></div>
        </div>
        <div id="playerRole"></div>
        <div id="hint" style="margin:10px 0; color:#ccc; font-size:14px;">

        </div>

        const UI_LANGS = ["en","fi","sv","de","fr","es","it","pt"];
        const DIFFICULTY_LABELS = {
            easy:   { en: "Easy",   fi: "Helppo",      sv: "Lätt",        de: "Leicht",      fr: "Facile",      es: "Fácil",       it: "Facile",      pt: "Fácil" },
            medium: { en: "Medium", fi: "Keskitaso",   sv: "Medel",       de: "Mittel",      fr: "Intermédiaire", es: "Intermedio", it: "Medio",       pt: "Médio" },
            hard:   { en: "Hard",   fi: "Vaikea",      sv: "Svår",        de: "Schwer",      fr: "Difficile",   es: "Difícil",     it: "Difficile",   pt: "Difícil" }
        };
        const UI_STYLE_OPTIONS = ["classic", "cozy", "cabinet", "minimal"];
        const UI_MOTION_OPTIONS = ["normal", "reduced"];

        function getUiStyle() {
            const stored = localStorage.getItem("ui_style");
            return UI_STYLE_OPTIONS.includes(stored) ? stored : "classic";
        }

        function setUiStyle(style) {
            const next = UI_STYLE_OPTIONS.includes(style) ? style : "classic";
            localStorage.setItem("ui_style", next);
            document.body.dataset.uiStyle = next;
            syncSettingsControls();
            return next;
        }

        function getUiMotion() {
            const stored = localStorage.getItem("ui_motion");
            return UI_MOTION_OPTIONS.includes(stored) ? stored : "normal";
        }

        function setUiMotion(mode) {
            const next = UI_MOTION_OPTIONS.includes(mode) ? mode : "normal";
            localStorage.setItem("ui_motion", next);
            document.body.dataset.uiMotion = next;
            syncSettingsControls();
            return next;
        }

        function syncSettingsControls() {
            const langSelect = document.getElementById("uiLangSelect");
            if (langSelect) langSelect.value = getLanguage();
            const currentStyle = getUiStyle();
            const currentMotion = getUiMotion();
            document.querySelectorAll("[data-ui-style-choice]").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.uiStyleChoice === currentStyle);
            });
            document.querySelectorAll("[data-ui-motion-choice]").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.uiMotionChoice === currentMotion);
            });
        }

        function applyPersonalSettings() {
            document.body.dataset.uiStyle = getUiStyle();
            document.body.dataset.uiMotion = getUiMotion();
            syncSettingsControls();
        }

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return UI_LANGS.includes(stored) ? stored : "en";
        }

        function setLanguage(lang) {
            const next = UI_LANGS.includes(lang) ? lang : "en";
            localStorage.setItem("ui_language", next);
            document.documentElement.lang = next;
            const sel = document.getElementById("uiLangSelect");
            if (sel) sel.value = next;
            return next;
        }

        function t(key, vars = {}) {
            const lang = getLanguage();
            const langTable = translations[lang] || {};
            const enTable = translations.en || {};
            let value;
            if (Object.prototype.hasOwnProperty.call(langTable, key)) {
                value = langTable[key];
            } else if (Object.prototype.hasOwnProperty.call(enTable, key)) {
                value = enTable[key];
            } else {
                value = key;
            }
            Object.entries(vars).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, String(replacement));
            });
            return value;
        }

        function getDifficultyLabel(code, lang = getLanguage()) {
            const labels = DIFFICULTY_LABELS[code] || DIFFICULTY_LABELS.easy;
            return labels[lang] || labels.en;
        }

        function getQueueWordSourceLabel(mode, cardMode = null) {
            const imagesOnly = (cardMode || window.currentWaitingCardMode || localStorage.getItem("preferred_card_mode") || "image_word") === "images";
            if (mode === "manual") return t(imagesOnly ? "queue_source_manual_images" : "queue_source_manual");
            if (mode === "theme") return t(imagesOnly ? "queue_source_theme_images" : "queue_source_theme");
            return t("queue_source_random");
        }

        function getQueueCardModeLabel(mode) {
            if (mode === "images") return t("card_mode_images");
            if (mode === "words") return t("card_mode_words");
            return t("card_mode_image_word");
        }

        function getQueueLanguageLabel(code) {
            const labels = LANG_NAMES[code] || {};
            return labels[getLanguage()] || labels.en || String(code || "").toUpperCase();
        }

        function getQueueWordFilterLabel(mode, cardMode = null) {
            const imagesOnly = (cardMode || window.currentWaitingCardMode || localStorage.getItem("preferred_card_mode") || "image_word") === "images";
            if (imagesOnly) {
                return mode === "broad" ? t("word_filter_broad_images") : t("word_filter_clear_images");
            }
            return mode === "broad" ? t("word_filter_broad") : t("word_filter_clear");
        }

        function localizeServerMessage(message) {
            if (!message) return t("setup_failed");
            if (message === "Teema puuttuu." || message === "Theme is missing.") return t("theme_missing");
            if (message === "Pixabay API key is missing. Check PIXABAY_API_KEY." || message === "Pixabay rejected the request. Check PIXABAY_API_KEY in Render and .env.") {
                return t("pixabay_config_error");
            }
            const themed = message.match(/Teemasta '(.+)' ei löytynyt tarpeeksi käyttökelpoisia sanoja\. Kokeile toista teemaa\./)
                || message.match(/Not enough usable words were found for theme "(.+)". Try another theme\./);
            if (themed) return t("theme_not_enough").replace("{theme}", themed[1]);
            if (message === "Toinen pelaaja poistui. Peli keskeytetty.") return t("game_aborted");
            if (message === "Peli on täynnä. Odota seuraavaa erää tai avaa uusi peli.") return t("game_full");
            return message;
        }

        function isQueueSearchLobby(payload, playersInfo) {
            const playMode = localStorage.getItem("play_mode") || "";
            const infos = Array.isArray(playersInfo) ? playersInfo : [];
            const myToken = getReconnectToken();
            return playMode === "queue"
                && payload
                && infos.length === 1
                && infos[0]
                && infos[0].reconnect_token === myToken
                && infos.every(p => p && p.in_waiting);
        }

        function renderPlayerRole(playersInfo) {
            window.latestPlayersInfo = Array.isArray(playersInfo) ? playersInfo : [];
            const roleDiv = document.getElementById("playerRole");
            const hintDiv = document.getElementById("hint");
            if (!roleDiv) return;
            const playMode = localStorage.getItem("play_mode") || "";
            const isSoloOrBot = playMode === "solo" || playMode === "bot";
            const myToken = getReconnectToken();
            const queueSearchActive = isQueueSearchLobby(window.latestLobbyPayload, window.latestPlayersInfo);
            const queueRoundPrepared = Boolean(window.latestLobbyPayload && window.latestLobbyPayload.queue_round_prepared);
            roleDiv.style.display = "none";
            if (hintDiv) {
                if (isSoloOrBot) {
                    if (playMode === "bot") {
                        hintDiv.textContent = t("bot_difficulty_summary", { difficulty: getDifficultyLabel(localStorage.getItem("bot_difficulty") || "easy") });
                    } else {
                        hintDiv.textContent = "";
                    }
                } else if (queueSearchActive) {
                    hintDiv.textContent = queueRoundPrepared ? t("queue_round_ready") : t("queue_prepare_round");
                } else {
                    const myIndex = window.latestPlayersInfo.findIndex(p => p && p.reconnect_token === myToken);
                    if (myIndex === 1) {
                        hintDiv.textContent = t("status_choose_round");
                    } else if (window.latestPlayersInfo.length >= 2) {
                        hintDiv.textContent = t("status_room_full");
                    } else {
                        hintDiv.textContent = t("status_waiting_for_player");
                    }
                }
            }
        }

        function renderPreparedQueueSummary(payload) {
            const summaryEl = document.getElementById("queuePreparedSummary");
            const titleEl = document.getElementById("queuePreparedSummaryTitle");
            const gridEl = document.getElementById("queuePreparedSummaryGrid");
            const isPrepared = Boolean(payload && payload.queue_round_prepared);
            const isQueueMode = Boolean(payload && payload.play_mode === "queue");
            if (!summaryEl || !titleEl || !gridEl || !isPrepared || !isQueueMode) {
                if (summaryEl) summaryEl.style.display = "none";
                if (gridEl) gridEl.innerHTML = "";
                return;
            }

            const chips = [];
            chips.push([t("queue_summary_word_source"), getQueueWordSourceLabel(payload.game_mode || "random", payload.card_mode || "image_word")]);
            if (payload.pending_theme) {
                chips.push([t("queue_summary_theme"), payload.pending_theme]);
            }
            chips.push([t("queue_summary_cards"), getQueueCardModeLabel(payload.card_mode || "image_word")]);
            if (payload.card_mode !== "images" && payload.target_language) {
                chips.push([t("queue_summary_language"), getQueueLanguageLabel(payload.target_language)]);
            }
            if (payload.game_mode === "theme" || payload.game_mode === "random") {
                chips.push([t("queue_summary_word_style"), getQueueWordFilterLabel(payload.word_filter_mode || "clear", payload.card_mode || "image_word")]);
            }

            titleEl.textContent = t("queue_summary_title");
            gridEl.innerHTML = chips.map(([label, value]) =>
                `<div class="queue-summary-chip"><span class="queue-summary-chip-label">${label}</span><span>${value}</span></div>`
            ).join("");
            summaryEl.style.display = "block";
        }

        function openSettings() {

            document.body.classList.add("settings-open");

        function closeSettings() {
