<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waiting Room</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 40px;
            font-size: 36px;
        }

        #players {
            margin: 20px 0;
            font-size: 24px;
        }

        #changeNameBtn, .modeBtn {
            background-color: limegreen;
            color: black;
            font-size: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #changeNameBtn {
            display: none;
        }

        .modeBtn:hover, #changeNameBtn:hover {
            background-color: green;
        }

        #startOptions {
            display: none;
            margin-top: 20px;
        }

        #startOptions p {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <h1 id="pageTitle">Waiting Room</h1>
    <div id="players"></div>
    <div id="hint" style="margin:10px 0; color:#ccc; font-size:14px;">
        Tip: only the second player to join can start the game.
    </div>
    <div id="startOptions">
        <p id="startOptionsText">Choose how words are provided for this round.</p>
        <button id="manualStartBtn" class="modeBtn">Enter your own words</button>
        <button id="themeStartBtn" class="modeBtn">Enter theme</button>
    </div>
    <button id="changeNameBtn" style="margin-top: 20px;">Change name</button>

    <script>
        const translations = {
            en: {
                page_title: "Waiting Room",
                hint: "Tip: only the second player to join can start the game.",
                start_options: "Choose how words are provided for this round.",
                enter_words: "Enter your own words",
                enter_theme: "Enter theme",
                change_name: "Change name",
                reconnect_missing_alert: "Reconnect token missing! The page cannot be loaded, please try again.",
                prompt_name: "Enter your name:",
                reconnect_empty_alert: "Reconnect token is missing or empty! Reloading the page.",
                enter_theme_prompt: "Enter theme:",
                setup_failed: "Game setup failed.",
                disconnect_alert: "Connection to the server was lost. Trying again...",
                theme_missing: "Theme is missing.",
                theme_not_enough: 'Not enough usable words were found for theme "{theme}". Try another theme.'
            },
            fi: {
                page_title: "Odotushuone",
                hint: "Vinkki: vain toisena liittynyt voi aloittaa pelin.",
                start_options: "Valitse miten sanat annetaan tähän erään.",
                enter_words: "Syötä omat sanat",
                enter_theme: "Syötä teema",
                change_name: "Vaihda nimi",
                reconnect_missing_alert: "Reconnect_token puuttuu! Sivua ei voi ladata, yritä uudelleen.",
                prompt_name: "Anna nimesi:",
                reconnect_empty_alert: "Reconnect_token puuttuu tai on tyhjä! Sivua ladataan uudelleen.",
                enter_theme_prompt: "Anna teema:",
                setup_failed: "Pelin alustus epäonnistui.",
                disconnect_alert: "Yhteys katkesi palvelimeen. Yritetään uudelleen...",
                theme_missing: "Teema puuttuu.",
                theme_not_enough: 'Teemasta "{theme}" ei löytynyt tarpeeksi käyttökelpoisia sanoja. Kokeile toista teemaa.'
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return stored === "fi" ? "fi" : "en";
        }

        function t(key) {
            const lang = getLanguage();
            return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
        }

        function localizeServerMessage(message) {
            if (!message) return t("setup_failed");
            if (message === "Teema puuttuu." || message === "Theme is missing.") return t("theme_missing");
            const themed = message.match(/Teemasta '(.+)' ei löytynyt tarpeeksi käyttökelpoisia sanoja\. Kokeile toista teemaa\./)
                || message.match(/Not enough usable words were found for theme "(.+)". Try another theme\./);
            if (themed) return t("theme_not_enough").replace("{theme}", themed[1]);
            return message;
        }

        function applyTranslations() {
            document.documentElement.lang = getLanguage();
            document.title = t("page_title");
            document.getElementById("pageTitle").textContent = t("page_title");
            document.getElementById("hint").textContent = t("hint");
            document.getElementById("startOptionsText").textContent = t("start_options");
            document.getElementById("manualStartBtn").textContent = t("enter_words");
            document.getElementById("themeStartBtn").textContent = t("enter_theme");
            document.getElementById("changeNameBtn").textContent = t("change_name");
        }

        applyTranslations();

        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
                return v.toString(16);
            });
        }
        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) { try { window.name = `reconnect_token=${tok}`; } catch (_) {} }

        // Luo reconnect_token ennen socket.io:n latausta
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try { t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token"); } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        // DEBUG: reconnect_token ennen socket.io-client latausta
        console.log("DEBUG: reconnect_token before socket.io load:", getReconnectToken());
        console.log("DEBUG: localStorage reconnect_token:", localStorage.getItem("reconnect_token"));
        console.log("DEBUG: sessionStorage reconnect_token:", sessionStorage.getItem("reconnect_token"));
        console.log("DEBUG: window._reconnect_token:", window._reconnect_token);
        console.log("DEBUG: localStorage username:", localStorage.getItem("username"));

        // Yleinen window.onerror-debuggaus
        window.onerror = function(msg, url, line, col, error) {
            console.error("[DEBUG] window.onerror:", msg, url, line, col, error);
        };

        if (!getReconnectToken()) {
            alert(t("reconnect_missing_alert"));
            throw new Error("Reconnect_token puuttuu!");
        }

        // Kysy nimi synkronisesti ennen mitään muuta!
        (function ensureUsername() {
            if (!localStorage.getItem("username")) {
                let name = prompt(t("prompt_name"), "");
                while (!name || name.trim().length === 0) {
                    name = prompt(t("prompt_name"), "");
                }
                localStorage.setItem("username", name.trim());
            }
        })();

        // Poista mahdollinen vanha window.io ennen uuden socket.io-clientin latausta
        if (window.io) {
            try { delete window.io; } catch (e) { window.io = undefined; }
        }

        // Lataa socket.io-client vasta kun reconnect_token ja username on varmasti olemassa
        const script = document.createElement('script');
        script.src = "https://cdn.socket.io/4.5.4/socket.io.min.js";
        script.onload = startSocketWhenReady;
        document.body.appendChild(script);

        // Käynnistä socket vasta kun reconnect_token ja username on varmasti olemassa JA window.io on ladattu
        function startSocketWhenReady() {
            if (!window.io) {
                setTimeout(startSocketWhenReady, 50);
                return;
            }
            let myName = localStorage.getItem("username");
            let reconnectToken = getReconnectToken();
            let hasJoined = false;
            let joinEmittedCount = 0;
            console.log("DEBUG: startSocketWhenReady, myName:", myName, "reconnectToken:", reconnectToken);
            const socket = window.io();

            function emitJoin() {
                // Tarkista reconnect_tokenin arvo ja tyyppi ennen emitointia
                console.log("DEBUG: emitJoin, username:", myName, ", reconnect_token:", reconnectToken, ", typeof reconnect_token:", typeof reconnectToken);
                if (reconnectToken === undefined || reconnectToken === null || reconnectToken === "") {
                    alert(t("reconnect_empty_alert"));
                    location.reload();
                    return;
                }
                const joinPayload = { username: myName, reconnect_token: reconnectToken };
                console.log("DEBUG: join-payload:", JSON.stringify(joinPayload));
                socket.emit("join", joinPayload);
            }

            function askName() {
                let name = prompt(t("prompt_name"), myName || "");
                if (name && name.trim().length > 0) {
                    name = name.trim();
                    localStorage.setItem("username", name);
                    myName = name;
                    if (!hasJoined) {
                        emitJoin();
                        hasJoined = true;
                    }
                } else {
                    askName();
                }
            }

            if (!myName || myName.trim().length === 0) {
                askName();
            } else {
                emitJoin();
                hasJoined = true;
            }

            document.getElementById("changeNameBtn").onclick = function() {
                localStorage.removeItem("username");
                hasJoined = false;
                askName();
            };

            console.log("[DEBUG] Socket yhteys OK (waiting_room.html)");

            socket.on("player_joined", (payload) => {
                const { players, players_info, last_joined_token } = payload;
                console.log("[DEBUG] Pelaajat (ordered):", players);
                const playersDiv = document.getElementById("players");
                playersDiv.textContent = (players || []).join(" & ");

                // Näytä Aloita-nappi vain toisena liittyneelle
                if ((players || []).length === 2) {
                    const myToken = getReconnectToken();
                    const canStart = myToken && last_joined_token && myToken === last_joined_token;
                    document.getElementById("startOptions").style.display = canStart ? "block" : "none";
                    console.log("[DEBUG] canStart=", canStart, ", myToken=", myToken, ", lastJoined=", last_joined_token);
                } else {
                    document.getElementById("startOptions").style.display = "none";
                }
            });

            document.getElementById("manualStartBtn").addEventListener("click", () => {
                if (!myName || myName.trim().length === 0) {
                    askName();
                    return;
                }
                console.log("[DEBUG] Aloitetaan peli omilla sanoilla");
                try { sessionStorage.setItem("game_setup_mode", "manual"); } catch (e) {}
                try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
                try { sessionStorage.removeItem("last_asked_pair"); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                socket.emit("start_custom_game", { mode: "manual" });
            });

            document.getElementById("themeStartBtn").addEventListener("click", () => {
                if (!myName || myName.trim().length === 0) {
                    askName();
                    return;
                }
                let theme = prompt(t("enter_theme_prompt"), "");
                while (theme !== null && theme.trim().length === 0) {
                    theme = prompt(t("enter_theme_prompt"), "");
                }
                if (theme === null) {
                    return;
                }
                theme = theme.trim();
                console.log("[DEBUG] Aloitetaan peli teemalla:", theme);
                try { sessionStorage.setItem("game_setup_mode", "theme"); } catch (e) {}
                try { sessionStorage.setItem("game_setup_theme", theme); } catch (e) {}
                try { sessionStorage.removeItem("last_asked_pair"); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                socket.emit("start_custom_game", { mode: "theme", theme });
            });

            socket.on("start_game", () => {
                console.log("[DEBUG] Vastaanotettiin 'start_game', siirrytään peliin");
                window.location.href = "/game";
            });

            // Custom-peli: kun sanat tai ruudukko alkaa, siirry peliin
            socket.on("ask_for_word", (data) => {
                console.log("[DEBUG] Vastaanotettiin 'ask_for_word' odotushuoneessa – talletetaan ja siirrytään peliin");
                try { sessionStorage.setItem("game_setup_mode", "manual"); } catch (e) {}
                try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
                try { sessionStorage.setItem("pending_ask", JSON.stringify(data)); } catch (e) {}
                try { sessionStorage.removeItem("words_given"); } catch (e) {}
                window.location.href = "/game";
            });
            socket.on("theme_generation_started", (data) => {
                console.log("[DEBUG] Teemapelin generointi aloitettu:", data);
                try { sessionStorage.setItem("game_setup_mode", "theme"); } catch (e) {}
                if (data && data.theme) {
                    try { sessionStorage.setItem("game_setup_theme", data.theme); } catch (e) {}
                }
                window.location.href = "/game";
            });
            socket.on("init_grid", () => {
                console.log("[DEBUG] Vastaanotettiin 'init_grid' odotushuoneessa – siirrytään peliin");
                window.location.href = "/game";
            });
            socket.on("game_setup_error", (data) => {
                const reason = localizeServerMessage((data && data.reason) || t("setup_failed"));
                console.error("[DEBUG] game_setup_error:", reason);
                try { sessionStorage.removeItem("game_setup_mode"); } catch (e) {}
                try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
                alert(reason);
            });

            // Yhteyden katkeamisen ja uudelleenliittymisen käsittely
            socket.on("disconnect", (reason) => {
                console.warn("[DEBUG] Socket.IO yhteys katkesi:", reason);
                alert(t("disconnect_alert"));
            });

            socket.io.on("reconnect", (attempt) => {
                console.log("[DEBUG] Socket.IO yhteys palautui, reconnect attempt:", attempt);
                myName = localStorage.getItem("username");
                reconnectToken = getReconnectToken();
                if (myName && myName.trim().length > 0) {
                    emitJoin();
                    hasJoined = true;
                }
            });

            socket.io.on("reconnect_error", (err) => {
                console.error("[DEBUG] Socket.IO reconnect error:", err);
            });
        }
    </script>
</body>
</html>
