            const patinaMarks = [
                { x: 0.18, y: 0.18, rx: 34, ry: 12, rotate: -12, opacity: 0.13 },
                { x: 0.72, y: 0.31, rx: 46, ry: 14, rotate: 9, opacity: 0.12 },
                { x: 0.37, y: 0.72, rx: 42, ry: 13, rotate: -7, opacity: 0.1 },
                { x: 0.84, y: 0.82, rx: 28, ry: 10, rotate: 15, opacity: 0.12 },
            ];
            const knots = [
                { x: 0.24, y: 0.38, r: 20, squash: 0.58, rotate: -18, opacity: 0.23 },
                { x: 0.68, y: 0.58, r: 16, squash: 0.66, rotate: 14, opacity: 0.19 },
                { x: 0.47, y: 0.17, r: 12, squash: 0.55, rotate: 5, opacity: 0.14 },
            ];
            let html = '';
            html += `
                <defs>
                    <linearGradient id="gomoku-board-base" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e4b06a"/>

                        <stop offset="78%" stop-color="#8a5124"/>

                    <radialGradient id="gomoku-board-glow" cx="30%" cy="24%" r="82%">

                        <stop offset="43%" stop-color="#b87335" stop-opacity="0.06"/>
                        <stop offset="100%" stop-color="#3c1d09" stop-opacity="0.36"/>
                    </radialGradient>

                    <pattern id="gomoku-board-grain" patternUnits="userSpaceOnUse" width="180" height="180">

                        <path d="M-10 39 C 34 31, 92 35, 150 50 S 244 66, 322 38" fill="none" stroke="#e4ad68" stroke-width="1.05" stroke-opacity="0.18"/>
                        <path d="M-28 68 C 16 56, 80 66, 140 80 S 238 96, 318 69" fill="none" stroke="#3d1f0c" stroke-width="1.5" stroke-opacity="0.24"/>
                        <path d="M-14 94 C 30 86, 96 93, 154 108 S 248 122, 326 96" fill="none" stroke="#d6964e" stroke-width="1.2" stroke-opacity="0.18"/>
                        <path d="M-18 125 C 28 114, 86 122, 146 136 S 242 153, 322 123" fill="none" stroke="#563016" stroke-width="1.8" stroke-opacity="0.23"/>
                        <path d="M-8 153 C 40 142, 102 147, 164 160 S 258 176, 334 149" fill="none" stroke="#f0c98b" stroke-width="0.95" stroke-opacity="0.14"/>
                        <path d="M-22 170 C 36 161, 93 166, 152 175 S 246 184, 326 166" fill="none" stroke="#2c1608" stroke-width="0.8" stroke-opacity="0.16"/>
                    </pattern>
                    <clipPath id="gomoku-board-clip">

                    </clipPath>
                    <filter id="gomoku-board-shadow" x="-10%" y="-10%" width="120%" height="120%">

            `;
            // Board background
            html += `<rect x="3" y="3" width="${dim - 6}" height="${dim - 6}" rx="18" fill="url(#gomoku-board-frame)" stroke="#2b1406" stroke-width="2.2" filter="url(#gomoku-board-shadow)"/>`;
            html += `<rect x="8" y="8" width="${dim - 16}" height="${dim - 16}" rx="14" fill="none" stroke="url(#gomoku-board-edge-wear)" stroke-width="5.5" opacity="0.72"/>`;
            html += `<rect x="${boardInset}" y="${boardInset}" width="${boardSize}" height="${boardSize}" rx="${boardRadius}" fill="url(#gomoku-board-base)" stroke="#5c3214" stroke-width="1.6" filter="url(#gomoku-board-roughen)"/>`;
            html += `<g clip-path="url(#gomoku-board-clip)">`;
            html += `<rect x="${boardInset}" y="${boardInset}" width="${boardSize}" height="${boardSize}" rx="${boardRadius}" fill="url(#gomoku-board-grain)" opacity="1"/>`;
            for (let i = 1; i < 5; i++) {
                const y = boardInset + boardSize * i / 5;
                const shadowY = y + (i % 2 === 0 ? 0.8 : -0.6);
                html += `<path d="M ${boardInset + 4} ${shadowY} C ${boardInset + boardSize * 0.28} ${shadowY + 2.2}, ${boardInset + boardSize * 0.66} ${shadowY - 2.5}, ${boardInset + boardSize - 4} ${shadowY + 1.2}" fill="none" stroke="#3a1d0a" stroke-width="1.4" stroke-opacity="0.22"/>`;
                html += `<path d="M ${boardInset + 8} ${y - 1.4} C ${boardInset + boardSize * 0.3} ${y + 1.2}, ${boardInset + boardSize * 0.68} ${y - 1.8}, ${boardInset + boardSize - 8} ${y - 0.4}" fill="none" stroke="#efc47c" stroke-width="0.8" stroke-opacity="0.16"/>`;
            }
            for (const band of woodBands) {
                const startX = boardInset + 8;
                const endX = boardInset + boardSize - 8;
                const control1X = boardInset + boardSize * 0.26;
                const control2X = boardInset + boardSize * 0.7;
                html += `<path d="M ${startX} ${band.y} C ${control1X} ${band.y + band.drift}, ${control2X} ${band.y - band.drift * 0.65}, ${endX} ${band.y + band.drift * 0.35}" fill="none" stroke="${band.color}" stroke-width="${band.width}" stroke-opacity="${band.opacity}" stroke-linecap="round"/>`;
                html += `<path d="M ${startX} ${band.y - band.width * 0.18} C ${control1X} ${band.y + band.drift * 0.55}, ${control2X} ${band.y - band.drift * 0.45}, ${endX} ${band.y + band.drift * 0.18}" fill="none" stroke="${band.highlight}" stroke-width="${Math.max(2.4, band.width * 0.18)}" stroke-opacity="${band.opacity * 0.55}" stroke-linecap="round"/>`;
            }
            for (const knot of knots) {
                const x = boardInset + boardSize * knot.x;
                const y = boardInset + boardSize * knot.y;
                html += `<g transform="translate(${x} ${y}) rotate(${knot.rotate}) scale(1 ${knot.squash})">`;
                html += `<circle cx="0" cy="0" r="${knot.r}" fill="url(#gomoku-knot-gradient)" opacity="${knot.opacity}"/>`;
                html += `<ellipse cx="0" cy="0" rx="${knot.r * 0.82}" ry="${knot.r * 0.34}" fill="none" stroke="#2e1708" stroke-width="1.1" stroke-opacity="${knot.opacity * 1.5}"/>`;
                html += `<ellipse cx="1" cy="0" rx="${knot.r * 0.42}" ry="${knot.r * 0.16}" fill="none" stroke="#d3954d" stroke-width="0.85" stroke-opacity="${knot.opacity * 0.95}"/>`;
                html += `</g>`;
            }
            for (const mark of patinaMarks) {
                const x = boardInset + boardSize * mark.x;
                const y = boardInset + boardSize * mark.y;
                html += `<ellipse cx="${x}" cy="${y}" rx="${mark.rx}" ry="${mark.ry}" transform="rotate(${mark.rotate} ${x} ${y})" fill="#31402d" opacity="${mark.opacity}"/>`;
                html += `<ellipse cx="${x + 2}" cy="${y - 1}" rx="${mark.rx * 0.58}" ry="${mark.ry * 0.42}" transform="rotate(${mark.rotate} ${x} ${y})" fill="#d8b06e" opacity="${mark.opacity * 0.32}"/>`;
            }
            html += `<rect x="${boardInset}" y="${boardInset}" width="${boardSize}" height="${boardSize}" rx="${boardRadius}" fill="url(#gomoku-board-sheen)"/>`;
            html += `<rect x="${boardInset}" y="${boardInset}" width="${boardSize}" height="${boardSize}" rx="${boardRadius}" fill="url(#gomoku-board-glow)"/>`;
            html += `<rect x="${boardInset + 3}" y="${boardInset + 3}" width="${boardSize - 6}" height="${boardSize - 6}" rx="${boardRadius - 3}" fill="none" stroke="#2d1607" stroke-width="1" stroke-opacity="0.18"/>`;
            html += `</g>`;
            html += `<rect x="${boardInset + 1.5}" y="${boardInset + 1.5}" width="${boardSize - 3}" height="${boardSize - 3}" rx="${boardRadius - 1.5}" fill="none" stroke="#e8b56a" stroke-width="1.1" opacity="0.28"/>`;
            // Grid lines
            for (let i = 0; i <= size; i++) {
                const x = GOMOKU_MARGIN + i * GOMOKU_CELL;
                const y = GOMOKU_MARGIN + i * GOMOKU_CELL;
                html += `<line x1="${x}" y1="${GOMOKU_MARGIN}" x2="${x}" y2="${GOMOKU_MARGIN + size * GOMOKU_CELL}" stroke="#5c3517" stroke-width="0.92" stroke-opacity="0.82"/>`;
                html += `<line x1="${GOMOKU_MARGIN}" y1="${y}" x2="${GOMOKU_MARGIN + size * GOMOKU_CELL}" y2="${y}" stroke="#5c3517" stroke-width="0.92" stroke-opacity="0.82"/>`;
            }
            // Star points aligned to the visible cell centers.
            const stars = gomokuStarPoints(size);
            for (const sr of stars) {
                for (const sc of stars) {
                    const sx = GOMOKU_MARGIN + sc * GOMOKU_CELL + GOMOKU_CELL / 2;
                    const sy = GOMOKU_MARGIN + sr * GOMOKU_CELL + GOMOKU_CELL / 2;
                    html += `<circle cx="${sx}" cy="${sy}" r="3" fill="#4f2d14" opacity="0.94"/>`;
                }
            }
            // Clickable cells (invisible overlay)
            for (let i = 0; i < size * size; i++) {
                const [x, y] = gomokuXY(i, size);
                html += `<rect x="${x - GOMOKU_CELL / 2}" y="${y - GOMOKU_CELL / 2}" width="${GOMOKU_CELL}" height="${GOMOKU_CELL}" data-idx="${i}" class="gomoku-click"/>`;
            }
            // Stones — during play only the latest stone of each color is visible; after a win reveal the whole board.
            if (g.revealTransition && g.board) {
                const transition = g.revealTransition;
                const progress = Math.max(0, Math.min(1, (now - transition.startedAt) / GOMOKU_REVEAL_MS));
                const eased = 1 - Math.pow(1 - progress, 3);
                const hiddenSet = new Set(transition.hiddenIndices || []);
                Object.entries(g.board).forEach(([cellIdx, color]) => {
                    const numericIdx = Number(cellIdx);
                    const isWin = g.winLine && g.winLine.includes(numericIdx);
                    if (!hiddenSet.has(numericIdx)) {
                        renderStone(numericIdx, color, { win: isWin });
                        return;
                    }
                    renderHiddenMarker(numericIdx, 1 - eased);
                    renderStone(numericIdx, color, {
                        win: isWin,
                        radius: 11.2 + 1.8 * eased,
                        opacity: 0.12 + 0.88 * eased,
                    });
                });
            } else if (g.revealBoard && g.board) {
                Object.entries(g.board).forEach(([cellIdx, color]) => {
                    const numericIdx = Number(cellIdx);
                    const isWin = g.winLine && g.winLine.includes(numericIdx);
                    renderStone(numericIdx, color, { win: isWin });
                });
            } else {
                const wh = g.whiteHistory || [];
                const bh = g.blackHistory || [];
                const visibleIndices = new Set([...wh, ...bh]);
                const hiddenOccupied = (g.occupiedIndices || []).filter((idx) => !visibleIndices.has(idx));
                for (const hiddenIdx of hiddenOccupied) {
                    renderHiddenMarker(hiddenIdx);
                }
                // Render older stones first so the newest is on top
                const maxLen = Math.max(wh.length, bh.length);
                for (let i = 0; i < maxLen; i++) {
                    if (i < wh.length) {
                        const widx = wh[i];
                        const isWin = g.winLine && g.winLine.includes(widx);
                        const isLast = widx === g.lastPlacedIdx && g.lastPlacedColor === "white";
                        const stone = renderStone(widx, "white", { win: isWin, opacity: 1 });
                        const { x, y } = stone;
                        if (i === wh.length - 1) html += `<circle cx="${x}" cy="${y}" r="3" fill="#aaa" opacity="1"/>`;
                        if (isLast) html += `<rect x="${x-5}" y="${y-5}" width="10" height="10" fill="none" stroke="#555" stroke-width="1.5" opacity="1"/>`;
                    }
                    if (i < bh.length) {
                        const bidx = bh[i];
                        const isWin = g.winLine && g.winLine.includes(bidx);
                        const isLast = bidx === g.lastPlacedIdx && g.lastPlacedColor === "black";
                        const stone = renderStone(bidx, "black", { win: isWin, opacity: 1 });
                        const { x, y } = stone;
                        if (i === bh.length - 1) html += `<circle cx="${x}" cy="${y}" r="3" fill="#555" opacity="1"/>`;
                        if (isLast) html += `<rect x="${x-5}" y="${y-5}" width="10" height="10" fill="none" stroke="#aaa" stroke-width="1.5" opacity="1"/>`;
                    }
                }
            }
            if (g.capturedFlash) {
                const isWhiteFlash = g.capturedFlash.color === "white";
                const hiddenCapturedSet = new Set(((g.captureRevealTransition || {}).stones || []).map((stone) => stone.idx));
                for (const ci of g.capturedFlash.indices) {
                    if (hiddenCapturedSet.has(ci)) continue;
                    const [x, y] = gomokuXY(ci, size);
                    html += `<circle cx="${x}" cy="${y}" r="13" fill="${isWhiteFlash ? 'white' : '#1a1a1a'}" stroke="${isWhiteFlash ? '#888' : '#444'}" stroke-width="1.5" class="gomoku-stone"/>`;
                    html += `<circle cx="${x}" cy="${y}" r="16" fill="none" stroke="#e85" stroke-width="2.5"/>`;
                    html += `<line x1="${x-6}" y1="${y-6}" x2="${x+6}" y2="${y+6}" stroke="#e85" stroke-width="2.5" stroke-linecap="round"/>`;
                    html += `<line x1="${x+6}" y1="${y-6}" x2="${x-6}" y2="${y+6}" stroke="#e85" stroke-width="2.5" stroke-linecap="round"/>`;
                }
            }
            if (g.captureRevealTransition) {
                const progress = Math.max(0, Math.min(1, (now - g.captureRevealTransition.startedAt) / GOMOKU_CAPTURE_REVEAL_MS));
                const eased = 1 - Math.pow(1 - progress, 3);
                for (const stone of (g.captureRevealTransition.stones || [])) {
                    renderHiddenMarker(stone.idx, 1 - eased);
                    renderStone(stone.idx, stone.color, {
                        radius: 11.2 + 1.8 * eased,
                        opacity: 0.12 + 0.88 * eased,
                    });
                }
            }
            for (const stone of (g.expiringStones || [])) {
                const { idx, color, startedAt } = stone;
                const [x, y] = gomokuXY(idx, size);
                const isW = color === "white";
                const progress = Math.max(0, Math.min(1, (now - (startedAt || now)) / GOMOKU_EXPIRE_MS));
                const flashPhaseEnd = 0.12;
                const blinkPhaseEnd = 0.34;
                const holdProgress = 0.42;
                const attentionProgress = Math.min(1, progress / flashPhaseEnd);
                const morphProgress = progress <= holdProgress ? 0 : (progress - holdProgress) / (1 - holdProgress);
                const fadeProgress = Math.min(1, morphProgress / 0.56);
                const returnProgress = morphProgress <= 0.56 ? 0 : Math.min(1, (morphProgress - 0.56) / 0.44);
                const exitProgress = progress <= 0.9 ? 0 : Math.min(1, (progress - 0.9) / 0.1);
                const exitEased = exitProgress * exitProgress;
                const exitOpacity = 1 - exitEased;
                const fadeEased = 1 - Math.pow(1 - fadeProgress, 3);
                const returnEased = returnProgress * returnProgress * (3 - 2 * returnProgress);
                const flash = Math.sin(attentionProgress * Math.PI);
                const blinkProgress = progress <= flashPhaseEnd
                    ? 0
                    : Math.min(1, (progress - flashPhaseEnd) / (blinkPhaseEnd - flashPhaseEnd));
                const blinkWave = blinkProgress >= 1 ? 0 : Math.sin(blinkProgress * Math.PI * 5);
                const blinkGreyMix = Math.max(0, blinkWave) * (1 - blinkProgress * 0.25);
                const fill = mixColor(
                    isW ? [255, 255, 255] : [26, 26, 26],
                    [119, 122, 118],
                    Math.min(1, blinkGreyMix * 0.82 + 0.35 * fadeEased + 0.75 * returnEased)
                );
                const stroke = mixColor(
                    isW ? [136, 136, 136] : [68, 68, 68],
                    [95, 98, 93],
                    Math.min(1, blinkGreyMix * 0.76 + 0.3 * fadeEased + 0.8 * returnEased)
                );
                const flashFill = isW ? "#f5e8c8" : "#efd8a2";
                const ringStroke = isW ? "#efe4c8" : "#e8c878";
                const stoneRadius = 13 * (1 + 0.05 * flash - 0.42 * fadeEased + 0.28 * returnEased);
                const stoneOpacity = (Math.max(0.04, 1 - 0.96 * fadeEased) + 0.62 * returnEased) * exitOpacity;
                const flashRadius = 13 + 6.5 * flash + 5.5 * fadeEased;
                const flashOpacity = 0.36 * flash * exitOpacity;
                const ringRadius = 13 + 11 * attentionProgress + 18 * fadeEased - 7 * returnEased;
                const ringOpacity = Math.max(0, 0.14 + 0.46 * flash - 0.42 * attentionProgress - 0.38 * fadeEased - 0.14 * returnEased) * exitOpacity;
                html += `<circle cx="${x}" cy="${y}" r="${flashRadius}" fill="${flashFill}" opacity="${Math.max(0, flashOpacity)}" class="stone-expiring"/>`;
                html += `<circle cx="${x}" cy="${y}" r="${stoneRadius}" fill="${fill}" stroke="${stroke}" stroke-width="${1.1 + 0.5 * returnEased}" opacity="${Math.min(1, stoneOpacity)}" class="stone-expiring"/>`;
                html += `<circle cx="${x}" cy="${y}" r="${ringRadius}" fill="none" stroke="${ringStroke}" stroke-width="${2.6 - 0.8 * returnEased}" opacity="${Math.max(0, ringOpacity)}" class="stone-expiring"/>`;
            }
            svg.innerHTML = html;
            svg.onclick = (evt) => {
                if (!gomokuState) {
                    console.warn("[DEBUG] Gomoku move blocked: state missing");
                    showToast(t("gomoku_not_ready"));
                    return;
                }
                const rect = svg.getBoundingClientRect();
                if (!rect.width || !rect.height) return;
                const scaleX = dim / rect.width;
                const scaleY = dim / rect.height;
                const localX = (evt.clientX - rect.left) * scaleX;
                const localY = (evt.clientY - rect.top) * scaleY;
                const col = Math.floor((localX - GOMOKU_MARGIN) / GOMOKU_CELL);
                const row = Math.floor((localY - GOMOKU_MARGIN) / GOMOKU_CELL);
                if (row < 0 || row >= size || col < 0 || col >= size) {
                    console.log("[DEBUG] Gomoku click outside playable board", { localX, localY, row, col });
                    return;
                }
                const idx = row * size + col;
                const debugRoomId = window.roomId || localStorage.getItem("room_id") || null;
                console.log("[DEBUG] Gomoku click", {
                    index: idx,
                    row,
                    col,
                    localX,
                    localY,
                    myName,
                    currentTurn: gomokuState.currentTurn,
                    roomId: debugRoomId,
                    whiteHistory: gomokuState.whiteHistory,
                    blackHistory: gomokuState.blackHistory
                });
                if (gomokuState.currentTurn !== myName) {
                    console.warn("[DEBUG] Gomoku local turn mismatch, forwarding move to server anyway", {
                        myName,
                        currentTurn: gomokuState.currentTurn
                    });
                }
                console.log("[DEBUG] Emitting gomoku_place", { index: idx, row, col });
                socket.emit("gomoku_place", { index: idx });
            };
        }

        function scheduleGomokuExpireAnimation() {
            if (gomokuExpireAnimationFrame !== null) return;
            const tick = () => {
                gomokuExpireAnimationFrame = null;
                if (!gomokuState) return;
                const now = (typeof performance !== "undefined" && typeof performance.now === "function")
                    ? performance.now()
                    : Date.now();
                gomokuState.expiringStones = (gomokuState.expiringStones || []).filter((stone) => {
                    const startedAt = typeof stone.startedAt === "number" ? stone.startedAt : now;
                    return (now - startedAt) < GOMOKU_EXPIRE_MS;
                });
                drawGomokuBoard();
                if ((gomokuState.expiringStones || []).length > 0) {
                    gomokuExpireAnimationFrame = requestAnimationFrame(tick);
                }
            };
            gomokuExpireAnimationFrame = requestAnimationFrame(tick);
        }

        function scheduleGomokuRevealAnimation() {
            if (gomokuRevealAnimationFrame !== null) return;
            const tick = () => {
                gomokuRevealAnimationFrame = null;
                if (!gomokuState || !gomokuState.revealTransition) return;
                const now = (typeof performance !== "undefined" && typeof performance.now === "function")
                    ? performance.now()
                    : Date.now();
                if ((now - gomokuState.revealTransition.startedAt) >= GOMOKU_REVEAL_MS) {
                    gomokuState.revealTransition = null;
                    gomokuState.revealBoard = true;
                    drawGomokuBoard();
                    return;
                }
                drawGomokuBoard();
                gomokuRevealAnimationFrame = requestAnimationFrame(tick);
            };
            gomokuRevealAnimationFrame = requestAnimationFrame(tick);
        }

        function scheduleGomokuCaptureRevealAnimation() {
            if (gomokuCaptureRevealAnimationFrame !== null) return;
            const tick = () => {
                gomokuCaptureRevealAnimationFrame = null;
                if (!gomokuState || !gomokuState.captureRevealTransition) return;
                const now = (typeof performance !== "undefined" && typeof performance.now === "function")
                    ? performance.now()
                    : Date.now();
                if ((now - gomokuState.captureRevealTransition.startedAt) >= GOMOKU_CAPTURE_REVEAL_MS) {
                    const revealedCaptured = (gomokuState.captureRevealTransition.stones || []).map((stone) => ({
                        idx: stone.idx,
                        color: stone.color,
                        startedAt: now,
                    }));
                    gomokuState.captureRevealTransition = null;
                    gomokuState.expiringStones = [
                        ...(gomokuState.expiringStones || []).filter(
                            (stone) => !revealedCaptured.some((capturedStone) => capturedStone.idx === stone.idx && capturedStone.color === stone.color)
                        ),
                        ...revealedCaptured
                    ];
                    scheduleGomokuExpireAnimation();
                    drawGomokuBoard();
                    return;
                }
                drawGomokuBoard();
                gomokuCaptureRevealAnimationFrame = requestAnimationFrame(tick);
            };
            gomokuCaptureRevealAnimationFrame = requestAnimationFrame(tick);
        }

        socket.on("gomoku_update", (data) => {

            const capturedSet = new Set(data.captured || []);
            const now = (typeof performance !== "undefined" && typeof performance.now === "function")
                ? performance.now()
                : Date.now();
            const previousVisibleIndices = new Set([
                ...(gomokuState.whiteHistory || []),
                ...(gomokuState.blackHistory || [])
            ]);
            const vp = gomokuState.visiblePairs || 5;
            const newExpiring = [];
            if (Array.isArray(data.white_history) && gomokuState.whiteHistory.length >= vp) {
                const dropped = gomokuState.whiteHistory[0];
                if (dropped != null && !data.white_history.includes(dropped) && !capturedSet.has(dropped))
                    newExpiring.push({ idx: dropped, color: "white", startedAt: now });
            }
            if (Array.isArray(data.black_history) && gomokuState.blackHistory.length >= vp) {
                const dropped = gomokuState.blackHistory[0];
                if (dropped != null && !data.black_history.includes(dropped) && !capturedSet.has(dropped))
                    newExpiring.push({ idx: dropped, color: "black", startedAt: now });
            }
            if (newExpiring.length > 0) {
                gomokuState.expiringStones = [
                    ...(gomokuState.expiringStones || []).filter(
                        (stone) => !newExpiring.some((nextStone) => nextStone.idx === stone.idx && nextStone.color === stone.color)
                    ),
                    ...newExpiring
                ];
                scheduleGomokuExpireAnimation();
            }
            if (Array.isArray(data.white_history)) gomokuState.whiteHistory = data.white_history;
            if (Array.isArray(data.black_history)) gomokuState.blackHistory = data.black_history;
            if (Array.isArray(data.occupied_indices)) gomokuState.occupiedIndices = data.occupied_indices;
            if (typeof data.visible_pairs === "number" && data.visible_pairs > 0) {
                gomokuState.visiblePairs = data.visible_pairs;
            }
            gomokuState.lastPlacedIdx = data.placed_idx;
            gomokuState.lastPlacedColor = data.color;
            if (data.captured && data.captured.length > 0) {
                gomokuState.capturedFlash = {
                    indices: data.captured,
                    color: data.color === "white" ? "black" : "white",
                };
                setTimeout(() => {
                    if (gomokuState) { gomokuState.capturedFlash = null; drawGomokuBoard(); }
                }, 380);
            } else {
                gomokuState.capturedFlash = null;
            }
            gomokuState.currentTurn = data.next_turn;
            if (data.board) {
                gomokuState.board = data.board;
            }
            if (data.win_line && data.win_line.length > 0) {
                gomokuState.winLine = data.win_line;
            }
            const hiddenCaptured = (data.captured || [])
                .filter((idx) => !previousVisibleIndices.has(idx))
                .map((idx) => ({
                    idx,
                    color: data.color === "white" ? "black" : "white",

                stopGomokuCaptureRevealAnimation();

                scheduleGomokuCaptureRevealAnimation();

            const shouldRevealBoard = Boolean(data.reveal_board);

                    ...(gomokuState.whiteHistory || []),
                    ...(gomokuState.blackHistory || [])
                ]);

            if (data.bot_difficulty) {
                currentBotDifficulty = data.bot_difficulty;
                try { sessionStorage.setItem("bot_difficulty", currentBotDifficulty); } catch (_) {}
            }
            if (isSoloMode) {
                resetSoloStats();
                document.getElementById("players").style.display = "none";
            }
            drawGrid();
            matched.forEach(i => {
                const card = document.getElementById(`card-${i}`);
                if (card) removeMatchedCardElement(card);
            });
            (data.revealed || []).forEach(i => {
                const card = document.getElementById(`card-${i}`);
                if (card && cards[i]) revealCardElement(card, cards[i]);
            });
            if (!isSoloMode) updatePlayers();
            renderImagePairTracker();
            renderTranslationHint();
        });

        // Jos palvelimella ei ole ruudukkoa (esim. peliä ei ole vielä aloitettu), ei tehdä mitään.
        // Aloitus tapahtuu odotushuoneessa, tai käyttäjä voi palata sinne.
        socket.on("no_grid", (data) => {
            const pendingTs = parseInt(sessionStorage.getItem("pending_game_navigation") || "0", 10);
            console.log("[DEBUG] no_grid vastaanotettu:", data && data.reason, "| fresh:", pendingTs ? (Date.now() - pendingTs) + "ms" : "no timestamp");
            const reason = (data && data.reason) || "";
            const setupMode = sessionStorage.getItem("game_setup_mode");
            const hasPendingAsk = Boolean(sessionStorage.getItem("pending_ask"));
            const gameAlreadyStarted = sessionStorage.getItem("game_started") === "1";
            const pendingGameNavigationTs = parseInt(sessionStorage.getItem("pending_game_navigation") || "0", 10);
            const navigationIsFresh = pendingGameNavigationTs && (Date.now() - pendingGameNavigationTs) < 12000;
            const manualSetupInProgress = setupMode === "manual";
            if (reason === "queue_round_prepared") {
                navigateTo("/waiting");
                return;
            }
            if (reason === "Pelaajia liian vähän") {
                if (navigationIsFresh || setupMode || hasPendingAsk) {
                    if (gridRetryTimer) clearTimeout(gridRetryTimer);
                    gridRetryTimer = setTimeout(() => {
                        socket.emit("request_grid", { reconnect_token: getReconnectToken(), username: myName });
                    }, 800);
                    return;
                }
                navigateTo("/waiting");
                return;
            }
            if (!gameAlreadyStarted && (manualSetupInProgress || hasPendingAsk || navigationIsFresh)) {
                if (gridRetryTimer) clearTimeout(gridRetryTimer);
                gridRetryTimer = setTimeout(() => {
                    socket.emit("request_grid", { reconnect_token: getReconnectToken(), username: myName });
                }, 800);
                return;
            }
            if (!gameAlreadyStarted && !setupMode && !hasPendingAsk && !navigationIsFresh) {
                navigateTo("/waiting");
                return;
            }
            if (modeUsesTheme(sessionStorage.getItem("game_setup_mode"))) {
                const theme = sessionStorage.getItem("game_setup_theme") || "theme";
                const phase = sessionStorage.getItem("game_setup_phase") || "drawing_cards";
                showThemeSetupStatus(theme, phase);
                renderThemeProgress();
            }
            updateRoundActionsVisibility();
        });

        socket.on("theme_generation_started", (data) => {
            console.log("[DEBUG] theme_generation_started:", data);
            if (data && data.theme) {
                try { sessionStorage.setItem("game_setup_theme", data.theme); } catch (e) {}
            }
            try { sessionStorage.setItem("game_setup_mode", (data && data.mode) || "theme"); } catch (e) {}
            try { sessionStorage.setItem("game_setup_phase", (data && data.phase) || "drawing_cards"); } catch (e) {}
            navigateTo("/waiting");
        });

        socket.on("theme_word_accepted", (data) => {
            console.log("[DEBUG] theme_word_accepted:", data);
            if (data && data.word) {
                addAcceptedThemeWord(data.word);
            }
        });

        socket.on("theme_selection_updated", (data) => {
            console.log("[DEBUG] theme_selection_updated(game):", data);
            if (!data || !data.active) {
                return;
            }
            try { sessionStorage.setItem("game_setup_mode", (data.mode || sessionStorage.getItem("last_round_mode") || "theme")); } catch (e) {}
            if (data.theme) {
                try { sessionStorage.setItem("game_setup_theme", data.theme); } catch (e) {}
            }
            try { sessionStorage.removeItem("game_started"); } catch (e) {}
            navigateTo("/waiting");
        });

        socket.on("queue_round_prepared", () => {
            try { sessionStorage.removeItem("pending_ask"); } catch (e) {}
            hideSetupStatus();
            clearThemeProgress();
            navigateTo("/waiting");
        });

        socket.on("translation_update", (data) => {
            const { pair_id, native_word, english_word } = data || {};
            if (!pair_id || !native_word) return;
            imagePairTrackerEntries = (imagePairTrackerEntries || []).map((entry) => {
                const pairKey = `pair-${pair_id}`;
                return entry && entry.key === pairKey
                    ? { ...entry, label: native_word }
                    : entry;
            });
            cards.forEach(card => {
                if (!card || card.pair_id !== pair_id) return;
                card.native_word = native_word;
                card.display_word = native_word;
                if (card.card_type === "word" && card.text === english_word) {
                    card.text = native_word;
                }
            });
            renderImagePairTracker();
        });

        socket.on("game_setup_error", (data) => {
            const reason = localizeServerMessage((data && data.reason) || t("game_setup_failed"));
            console.error("[DEBUG] game_setup_error:", reason);
            const failedMode = sessionStorage.getItem("game_setup_mode");
            const failedTheme = sessionStorage.getItem("game_setup_theme") || "";
            if (failedMode === "theme" || failedMode === "language" || failedMode === "spanish") {
                const failedLang = sessionStorage.getItem("game_setup_lang") || "es";
                const failedCardMode = sessionStorage.getItem("game_setup_card_mode") || (window.currentCardMode || "images");
                const failedWordFilter = getCurrentWordFilterMode();
                try {
                    sessionStorage.setItem("queued_next_round", JSON.stringify({
                        mode: failedMode === "spanish" ? "language" : failedMode,
                        theme: failedTheme,
                        target_lang: failedLang,
                        card_mode: failedCardMode,
                        word_filter_mode: failedWordFilter
                    }));
                } catch (e) {}
            } else if (failedMode === "random") {
                try {
                    sessionStorage.setItem("queued_next_round", JSON.stringify({
                        mode: "random",
                        card_mode: window.currentCardMode || "images",
                        target_lang: currentTargetLanguage,
                        word_filter_mode: getCurrentWordFilterMode()
                    }));
                } catch (e) {}
            }
            try { sessionStorage.removeItem("game_setup_mode"); } catch (e) {}
            try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
            hideSetupStatus();
            clearThemeProgress();
            alert(reason);
            navigateTo("/waiting");
        });

        socket.on("update_turn", (data) => {
            console.log("[DEBUG] Vuoro vaihtui:", data.turn);
            currentTurn = data.turn;
            trackerPreviewUsedThisTurn = false;
            updatePlayers();
            renderImagePairTracker();
        });

        socket.on("reveal_card", (data) => {
            console.log("[DEBUG] Paljastetaan kortti:", data);
            const card = document.getElementById(`card-${data.index}`);
            if (card) {
                const cardData = data.card || cards[data.index];
                revealedOrder = revealedOrder.filter((index) => index !== data.index);
                revealedOrder.push(data.index);
                revealedOrder = revealedOrder.slice(-2);
                revealCardElement(card, cardData);
                playChordPreview(cardData, data.index);
                updateRevealedHighlights();
                showTranslationHintForCard(cardData, data.index);
            }
        });

        socket.on("hide_cards", (data) => {
            console.log("[DEBUG] Piilotetaan kortit:", data.indices);
            stopChordPreview();
            trackerPreviewUsedThisTurn = false;
            revealedOrder = revealedOrder.filter((index) => !data.indices.includes(index));
            data.indices.forEach(i => {
                const card = document.getElementById(`card-${i}`);
                if (card && !matched.has(i)) {
                    hideCardElement(card);
                }
            });
            updateRevealedHighlights();
            if (isSoloMode && data.solo_mistakes != null) {
                soloMistakes = data.solo_mistakes;
                soloMistakesEl.textContent = String(soloMistakes);
            }
            clearTranslationHint(data.indices || []);
        });

        socket.on("pair_found", (data) => {
            console.log("[DEBUG] Pari löytyi:", data.word);
            stopChordPreview();
            trackerPreviewUsedThisTurn = false;
            data.indices.forEach(i => matched.add(i));
            revealedOrder = revealedOrder.filter((index) => !data.indices.includes(index));
            const matchedCards = data.indices.map(i => document.getElementById(`card-${i}`)).filter(Boolean);
            requestAnimationFrame(() => {
                matchedCards.forEach(card => {
                    card.classList.remove("revealed-first", "revealed-second");
                    card.classList.add("matched-highlight");
                    setTimeout(() => removeMatchedCardElement(card), 3000);
                });
            });
            renderImagePairTracker();
            showPairFoundInHint(data.indices || [], data.word);
        });

        socket.on("game_over", (data) => {
            stopChordPreview();
            if (gameOverShown) {
                console.log("[DEBUG] game_over ohitettu, tulosnakyma on jo auki.");
                return;
            }
            gameOverShown = true;
            console.log("[DEBUG] Peli päättyi, näytetään tulokset.");
            stopSoloTimer();
            soloStatsEl.classList.remove("active");
            persistSummary(data);
            clearTranslationHint();
            updateRoundActionsVisibility();
            themeProgress.style.display = "none";
            if (window.currentCardMode === "gomoku") {
                document.getElementById("grid").style.display = "none";
                imagePairTracker.style.display = "none";
                document.getElementById("gomoku-wrap").style.display = "block";
                document.getElementById("players").style.display = "";
                showGomokuRematchPanel(data);
                return;
            }
            gomokuState = null;
            document.getElementById("gomoku-wrap").style.display = "none";
            document.getElementById("grid").style.display = "none";
            imagePairTracker.style.display = "none";
            document.getElementById("players").style.display = "none";
            const oldResults = document.getElementById("results");
            if (oldResults) oldResults.remove();

            const results = document.createElement("div");
            results.id = "results";

            const points = data.points || {};
            const wins = data.round_win || {};

            // Solo/bot mode: navigate to leaderboard with highlight
            const isBotMode = (localStorage.getItem("play_mode") || "") === "bot";
            if (isSoloMode) {
                const username = encodeURIComponent(localStorage.getItem("username") || "");
                const cardMode = encodeURIComponent(window.currentCardMode || "images");
                const play = (window.currentGameMode === "random") ? "random" : "solo";
                const targetLang = (window.currentCardMode !== "images") ? encodeURIComponent(currentTargetLanguage || "") : "";
                const langParam = targetLang ? `&lang=${targetLang}` : "";
                let discriminatorParam = "";
                const soloTime = data.solo_time || 0;
                const mistakes = data.solo_mistakes || 0;
                discriminatorParam = `&total=${soloTime + mistakes * 3}`;
                navigateTo(`/leaderboard?highlight=${username}&mode=${cardMode}&play=${play}${langParam}${discriminatorParam}`);
                return;
            }

            try { socket.disconnect(); } catch (_) {}
            navigateTo("/summary");
            return;

            const canChooseNextRound = canQueueNextRound();
            const surrenderedBy = data.surrendered_by;
            const surrenderedLine = surrenderedBy
                ? `<div class="results-section" style="font-size:18px; color:#ffd8d8;">${t("surrendered_round", { name: surrenderedBy })}</div>`
                : "";
            results.innerHTML = `
                <div class="results-section">
                    <div class="results-heading">${t("game_over", { winner: data.winner })}</div>
                    <br>
                    <span style="font-size:20px;">${t("points")}</span><br>
                    ${Object.entries(points).map(([name, pts]) => `${name}: ${pts} ${t("pairs_suffix")}`).join("<br>")}
                </div>
                ${surrenderedLine}
                <div class="results-section results-subheading">
                    ${t("round_wins")}<br>
                    ${Object.entries(wins).map(([name, w]) => `${name}: ${w} ${t("wins_suffix")}`).join("<br>")}
                </div>
                <br>
                <div class="results-cta">
                    ${canChooseNextRound ? t("new_round_with") : t("new_round_waiting")}
                </div>
                <div class="results-actions" style="${canChooseNextRound ? "" : "display:none;"}">
                    <button id="restart-manual-btn" class="results-btn mode">${t("enter_words")}</button>
                    <button id="restart-theme-btn" class="results-btn mode">${t("enter_theme")}</button>
                    <button id="restart-random-btn" class="results-btn mode">${t("enter_random")}</button>
                    <button id="restart-lang-btn" class="results-btn mode">${getTargetLanguageLabel()}</button>
                </div>
                <div class="results-actions">
                    <button id="end-game-btn" class="results-btn end">${t("exit_game")}</button>
                </div>
            `;
            document.body.appendChild(results);
            document.getElementById("restart-manual-btn")?.addEventListener("click", () => queueNextRound("manual"));
            document.getElementById("restart-theme-btn")?.addEventListener("click", () => queueNextRound("theme"));
            document.getElementById("restart-random-btn")?.addEventListener("click", () => queueNextRound("random"));
            document.getElementById("restart-lang-btn")?.addEventListener("click", () => queueNextRound("language"));
            document.getElementById("end-game-btn")?.addEventListener("click", () => {
                // Go to summary for rematch option (don't call leave_game — room stays alive)
                try { socket.disconnect(); } catch (_) {}
                window.location.href = "/summary";
            });

            const winnerMessage = document.getElementById("winner-message");
            if (winnerMessage) winnerMessage.style.display = "none";
        });

        socket.on("round_surrender_failed", () => {
            alert(t("surrender_failed"));
        });

        // Sanojen kysely Pixabayn käyttöön
        socket.on("ask_for_word", (data) => {
            console.log("[DEBUG] ask_for_word vastaanotettu:", data);
            if (sessionStorage.getItem("words_given")) {
                console.log("[DEBUG] Ei näytetä promptia, sanat jo annettu tässä selaimessa.");
                return;
            }
            // Estä duplikaattipromptit samalle parille
            const lastPair = parseInt(sessionStorage.getItem("last_asked_pair") || "0", 10);
            if (Number(data.pair) <= lastPair) {
                console.log("[DEBUG] Ohitetaan duplikaatti ask_for_word. lastPair=", lastPair, "incoming=", data.pair);
                return;
            }
            if (myName !== data.player) {
                hideSetupStatus();
                return;
            }
            if (myName === data.player) {
                let sana = prompt(getWordPrompt(data.pair));
                console.log("[DEBUG] Annettiin sana:", sana);
                if (sana) {
                    socket.emit("word_given", {word: sana});
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] Lähetettiin word_given palvelimelle:", sana);
                }
            }
        });

        socket.on("word_failed", (data) => {
            console.log("[DEBUG] word_failed vastaanotettu:", data);
            if (myName === data.player) {
                const failMsg = data.reason === "invalid_word" ? t("word_invalid") : t("pixabay_retry");
                alert(failMsg);
                let sana = prompt(t("prompt_word_retry", { pair: data.pair }));
                if (sana && sana.trim().length > 0) {
                    socket.emit("word_given", { word: sana.trim() });
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] Lähetettiin word_given uudestaan:", sana);
                } else {
                    // Käyttäjä perui – salli saman parin asken tulla uudelleen (pieni viive 300 ms)
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair - 1)); } catch (e) {}
                    setTimeout(() => {
                        socket.emit("ask_for_word", { player: myName, pair: data.pair });
                        console.log("[DEBUG] Käyttäjä perui, pyydettiin ask_for_word uudestaan parille (300ms viive):", data.pair);
                    }, 300);
                }
            }
        });

        // Jos odotushuoneessa tuli ensimmäinen ask_for_word jo ennen kuin tämä sivu ehti avautua,
        // käsitellään se tässä talletetusta sessionStoragesta.
        (function handlePendingAsk() {
            let raw = null;
            try { raw = sessionStorage.getItem("pending_ask"); } catch (e) {}
            if (!raw) return;
            try { sessionStorage.removeItem("pending_ask"); } catch (e) {}
            let data = null;
            try { data = JSON.parse(raw); } catch (e) {}
            if (!data) return;
            console.log("[DEBUG] Käsitellään pending_ask pelisivulla:", data);
            if (sessionStorage.getItem("words_given")) return; // jos jo merkitty valmiiksi
            if (myName !== data.player) {
                hideSetupStatus();
                return;
            }
            if (myName === data.player) {
                let sana = prompt(getWordPrompt(data.pair));
                console.log("[DEBUG] (pending) Annettiin sana:", sana);
                if (sana) {
                    socket.emit("word_given", {word: sana});
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] (pending) Lähetettiin word_given palvelimelle:", sana);
                }
            }
        })();

        function restartGame() {
            queueNextRound(getLastRoundMode());
        }

        // Tyhjennä front-flag kun peli päättyy tai käyttäjä palaa etusivulle
        function endGame() {
            if (gridRetryTimer) {
                clearTimeout(gridRetryTimer);
                gridRetryTimer = null;
            }
            socket.emit("leave_game", {
                username: myName,
                reconnect_token: getReconnectToken()
            });
            clearVolatileGameState();
            console.log("[DEBUG] Peli lopetetaan.");
            setTimeout(() => {
                try { socket.disconnect(); } catch (_) {}
                window.location.href = "/";
            }, 120);
        }

        surrenderRoundBtn.addEventListener("click", () => {
            const confirmMsg = isSoloMode ? t("cancel_game_confirm") : t("surrender_round_confirm");
            if (!confirm(confirmMsg)) {
                return;
            }
            socket.emit("surrender_round", {
                username: myName,
                reconnect_token: getReconnectToken()
            });
        });
        document.getElementById("majorMinorListenBtn")?.addEventListener("click", () => {
            playMajorMinorSequence();
        });
        exitGameBtn.addEventListener("click", () => {
            endGame();
        });

        socket.on("game_aborted", (data) => {
            stopChordPreview();
            if (gridRetryTimer) {
                clearTimeout(gridRetryTimer);
                gridRetryTimer = null;
            }
            const reason = (data && data.reason) || "Peli keskeytettiin.";
            alert(reason);
            navigateTo("/waiting");
        });

        function drawGrid() {
            console.log("[DEBUG] Piirretään ruudukko...");
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            syncGridLayout();
            updateRoundActionsVisibility();

            cards.forEach((card, index) => {
                const div = document.createElement("div");
                div.classList.add("card", "hidden");
                div.id = `card-${index}`;
                div.dataset.index = String(index);
                div.addEventListener("click", () => {
                    console.log(`[DEBUG] Klikattiin korttia: ${index}`);
                    const cardData = cards[index];
                    // Re-play already-revealed audio card without affecting game state
                    const replayableChordCard = cardData && (
                        cardData.card_type === "audio" ||
                        (cardData.card_type === "word" && cardData.chord_label)
                    );
                    if (isSoloMode && revealedOrder.includes(index) && replayableChordCard && !matched.has(index) && !audioRevealLock) {
                        playChordPreview(cardData, index);
                        return;
                    }
                    if ((isSoloMode || myName === currentTurn) && !matched.has(index) && !audioRevealLock) {
                        if (isSoloMode && !soloTimerStarted) {
                            startSoloTimer();
                        }
                        socket.emit("card_clicked", {
                            index,
                            username: myName,
                            reconnect_token: getReconnectToken()
                        });
                    }
                });
                hideCardElement(div);
                grid.appendChild(div);
            });
        }

        function updatePlayers() {
            const players = JSON.parse(sessionStorage.getItem("players")) || [];
            const playersDiv = document.getElementById("players");
            playersDiv.innerHTML = "";
            const isBotMode = (localStorage.getItem("play_mode") || "") === "bot";
            const isGomokuMode = window.currentCardMode === "gomoku" && gomokuState;

            if (isGomokuMode) {
                const vp = gomokuState.visiblePairs || 5;
                const key = vp === 1 ? "gomoku_pairs_shown" : "gomoku_pairs_shown_plural";
                const label = document.createElement("div");
                label.className = "players-status-label";
                const captureKey = gomokuState.capturePairsEnabled ? "gomoku_capture_pairs_on" : "gomoku_capture_pairs_off";
                label.textContent = `${t(key, { n: vp })} · ${t(captureKey)}`;
                playersDiv.appendChild(label);
            }

            players.forEach(name => {
                const span = document.createElement("span");
                span.className = "player-chip";
                let displayName = name;
                if (isBotMode && name === "Muistibotti") {
                    displayName = `${name} · ${getDifficultyLabel(currentBotDifficulty)}`;
                }
                if (isGomokuMode) {
                    let stoneColor = "";
                    if (name === gomokuState.whitePlayer) stoneColor = "white";
                    if (name === gomokuState.blackPlayer) stoneColor = "black";
                    if (stoneColor) {
                        const stone = document.createElement("span");
                        stone.className = `player-stone ${stoneColor}`;
                        span.appendChild(stone);
                    }
                }
                const nameNode = document.createElement("span");
                nameNode.textContent = displayName;
                span.appendChild(nameNode);
                if (name === currentTurn) {
                    span.classList.add("active");
                }
                playersDiv.appendChild(span);
            });
        }

        function showWordMessage(word) {
            const toast = document.getElementById("toast");
            toast.textContent = t("found_word", { word });
            toast.style.display = "block";
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => {
                toast.style.display = "none";
            }, 5000);
        }

        window.addEventListener("resize", () => {
            syncTabletFitMode();
            syncGomokuBoardLayout();
            document.querySelectorAll(".card-word-text").forEach((textElement) => {
                fitWordText(textElement, textElement.parentElement);
            });
        });
    </script>
</body>
</html>
