<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Memory Game - Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        h1 {
            margin: 8px 0 6px;
            font-size: 30px;
            line-height: 1.1;
        }
        #players {
            margin-top: 4px;
            font-size: 14px;
            line-height: 1.2;
        }
        #roundActions {
            margin-top: 6px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .round-action-btn {
            border: none;
            border-radius: 999px;
            padding: 9px 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.18s ease, transform 0.18s ease;
        }
        .round-action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .round-action-btn.surrender {
            background: #7b2b2b;
            color: #fff6f6;
        }
        .round-action-btn.exit {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .active {
            color: limegreen;
        }
        #grid {
            display: grid;
            width: min(calc(100vw - 18px), 720px);
            margin: 0 auto;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            justify-content: center;
            padding: 12px 8px 10px;
            box-sizing: border-box;
        }
        #translation-hint {
            max-width: 820px;
            margin: 2px auto 12px;
            padding: 10px 12px;
            display: none;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
        }
        #translation-hint-grid {
            display: grid;
            gap: 8px;
        }
        .translation-col {
            min-width: 0;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
        }
        .translation-col-label {
            color: #fff2a8;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .translation-col-value {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }
        @media (max-width: 1180px) {
            #grid {
                width: min(calc(100vw - 16px), 700px);
                gap: 15px;
                padding: 12px 7px 10px;
            }
            .card {
                border-radius: 10px;
            }
            #translation-hint {
                max-width: 640px;
                padding: 9px 10px;
            }
            .translation-col {
                padding: 7px 8px;
            }
            .translation-col-value {
                font-size: 20px;
            }
        }
        @media (max-width: 1024px) and (orientation: portrait) {
            h1 {
                margin: 6px 0 4px;
                font-size: 26px;
            }
            #players {
                margin-top: 2px;
                font-size: 13px;
            }
            #roundActions {
                margin-top: 4px;
                gap: 10px;
            }
            #grid {
                width: min(calc(100vw - 8px), 760px);
                gap: 18px 16px;
                padding: 8px 4px 8px;
            }
            .card {
                border-radius: 12px;
                border-width: 3px;
            }
            .card-word-text {
                padding: 10px;
            }
            #translation-hint {
                max-width: calc(100vw - 12px);
                margin: 0 auto 10px;
                padding: 8px 10px;
            }
            .translation-col-value {
                font-size: 18px;
            }
        }
        @media (max-width: 820px) {
            #translation-hint {
                max-width: calc(100% - 28px);
            }
            .translation-col-value {
                font-size: 16px;
            }
        }
        #theme-progress {
            display: none;
            max-width: 760px;
            margin: 8px auto 12px;
            padding: 0 20px;
            color: #bfc7cf;
            font-size: 13px;
            line-height: 1.7;
        }
        #theme-progress strong {
            color: #fff;
            font-size: 13px;
            margin-right: 8px;
        }
        #theme-progress-list {
            display: inline;
        }
        .card {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #444;
            border: 2px solid #111;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-sizing: border-box;
        }
        .card.word-card {
            background: linear-gradient(160deg, #1f3528, #122018);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-word-text {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            color: #fff;
            font-weight: 700;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card.matched-highlight {
            box-shadow: 0 0 0 4px rgba(113, 240, 161, 0.95), 0 0 24px rgba(113, 240, 161, 0.55);
            transform: scale(1.03);
        }
        .card.removed {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: none;
            box-shadow: none;
        }
        .hidden {
            background-image: none !important;
        }
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 18px;
            border: 1px solid #2ecc71;
            z-index: 9999;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
            display: none;
        }
        #results {
            width: min(760px, calc(100% - 32px));
            margin: 24px auto 0;
            padding: 28px 24px 30px;
            color: #f3f1c7;
            font-size: 24px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(120, 214, 146, 0.12), transparent 45%),
                linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        .results-section {
            margin-bottom: 20px;
        }
        .results-heading {
            color: #fff4a8;
            font-size: 28px;
            font-weight: 700;
        }
        .results-subheading {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }
        .results-cta {
            color: white;
            font-size: 20px;
            margin-bottom: 16px;
        }
        .results-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .results-btn {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease, background-color 0.18s ease;
        }
        .results-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .results-btn.mode {
            background-color: limegreen;
            color: #0c150e;
        }
        .results-btn.end {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .footer-credit {
            margin: 8px 0 16px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <h1 id="pageTitle">Memory Game</h1>
    <div id="players"></div>
    <div id="roundActions">
        <button id="surrenderRoundBtn" class="round-action-btn surrender" style="display:none;">Surrender this round</button>
        <button id="exitGameBtn" class="round-action-btn exit">Exit game</button>
    </div>
    <div id="setup-status" style="display:none; margin-top: 10px; color: #ccc; font-size: 17px;"></div>
    <div id="theme-progress">
        <strong id="themeProgressLabel">Ready:</strong>
        <span id="theme-progress-list"></span>
    </div>
    <div id="grid"></div>
    <div id="translation-hint" style="display:none;">
        <div id="translation-hint-grid"></div>
    </div>
    <div id="winner-message" style="display: none; margin-top: 20px; color: gold; font-size: 24px;"></div>
    <div id="toast"></div>
    <div class="footer-credit">© Michael Miettinen • {{ app_version }}</div>

    <script>
        const translations = {
            en: {
                page_title: "Memory Game",
                page_title_browser: "Memory Game - Game",
                setup_finding_words: 'Finding words that match "{theme}"...',
                setup_drawing_cards: 'Drawing cards for "{theme}"...',
                setup_manual: '{name} is entering words for the next round...',
                ready_label: "Ready:",
                remaining_label: "Remaining:",
                translation_spanish: "Spanish",
                translation_finnish: "Finnish",
                translation_english: "English",
                game_setup_failed: "Game setup failed.",
                game_over: "Game over! Winner: {winner}",
                points: "Points:",
                round_wins: "Round wins",
                pairs_suffix: "pairs",
                wins_suffix: "wins",
                play_new_round: "Play a new round?",
                new_round: "New round",
                new_round_with: "Start the next round with:",
                new_round_waiting: "Waiting for the next round to be chosen.",
                enter_words: "Enter your own words",
                enter_theme: "Enter theme",
                exit_game: "Exit game",
                end_game: "End game",
                surrender_round: "Surrender this round",
                surrender_round_confirm: "Do you really want to surrender this round?",
                surrendered_round: "{name} surrendered this round.",
                surrender_failed: "This round cannot be surrendered right now.",
                prompt_word: "Enter a word for pair {pair}/8 (describe the pair with a common word):",
                prompt_word_retry: "Enter a new word for pair {pair}/8:",
                prompt_theme: "Enter theme:",
                prompt_spanish_theme: "Enter theme in English:",
                pixabay_retry: "Pixabay could not find an image for that word. Try another word.",
                found_word: "Pair found: {word}",
                study_spanish: "Study Spanish",
                theme_missing: "Theme is missing.",
                theme_not_enough: 'Not enough usable words were found for theme "{theme}". Try another theme.',
                pixabay_config_error: "Pixabay setup is invalid. Check PIXABAY_API_KEY in Render and .env."
            },
            fi: {
                page_title: "Muistipeli",
                page_title_browser: "Muistipeli – Peli",
                setup_finding_words: 'Haetaan teemaan sopivia sanoja teemalle "{theme}"...',
                setup_drawing_cards: 'Piirretään kortteja teemalle "{theme}"...',
                setup_manual: '{name} syöttää sanoja seuraavaa kierrosta varten...',
                ready_label: "Valmiina:",
                remaining_label: "Löytämättä:",
                translation_spanish: "Espanja",
                translation_finnish: "Suomi",
                translation_english: "Englanti",
                game_setup_failed: "Pelin alustus epäonnistui.",
                game_over: "Peli päättyi! Voittaja: {winner}",
                points: "Pisteet:",
                round_wins: "Erävoitot",
                pairs_suffix: "paria",
                wins_suffix: "voittoa",
                play_new_round: "Pelataanko uusi erä?",
                new_round: "Uusi erä",
                new_round_with: "Aloita seuraava erä pelimuodolla:",
                new_round_waiting: "Odotetaan seuraavan erän valintaa.",
                enter_words: "Syötä omat sanat",
                enter_theme: "Syötä teema",
                exit_game: "Poistu pelistä",
                end_game: "Lopeta peli",
                surrender_round: "Luovuta tämä kierros",
                surrender_round_confirm: "Haluatko varmasti luovuttaa tämän kierroksen?",
                surrendered_round: "{name} luovutti tämän kierroksen.",
                surrender_failed: "Tätä kierrosta ei voi luovuttaa juuri nyt.",
                prompt_word: "Anna {pair}/8 parin sana (kuvaile paria yhdellä yleisellä sanalla):",
                prompt_word_retry: "Anna {pair}/8 parin sana uudelleen:",
                prompt_theme: "Anna teema:",
                prompt_spanish_theme: "Anna teema englanniksi:",
                pixabay_retry: "Pixabay ei löytänyt kuvaa annetulla sanalla. Kokeile toista sanaa.",
                found_word: "Pari löytyi: {word}",
                study_spanish: "Opiskele espanjaa",
                theme_missing: "Teema puuttuu.",
                theme_not_enough: 'Teemasta "{theme}" ei löytynyt tarpeeksi käyttökelpoisia sanoja. Kokeile toista teemaa.',
                pixabay_config_error: "Pixabayn asetukset ovat virheelliset. Tarkista PIXABAY_API_KEY Renderistä ja .env-tiedostosta."
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return stored === "fi" ? "fi" : "en";
        }

        function t(key, vars = {}) {
            const lang = getLanguage();
            let value = (translations[lang] && translations[lang][key]) || translations.en[key] || key;
            Object.entries(vars).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, String(replacement));
            });
            return value;
        }

        function localizeServerMessage(message) {
            if (!message) return t("game_setup_failed");
            if (message === "Teema puuttuu." || message === "Theme is missing.") return t("theme_missing");
            if (message === "Pixabay API key is missing. Check PIXABAY_API_KEY." || message === "Pixabay rejected the request. Check PIXABAY_API_KEY in Render and .env.") {
                return t("pixabay_config_error");
            }
            const themed = message.match(/Teemasta '(.+)' ei löytynyt tarpeeksi käyttökelpoisia sanoja\. Kokeile toista teemaa\./)
                || message.match(/Not enough usable words were found for theme "(.+)". Try another theme\./);
            if (themed) return t("theme_not_enough", { theme: themed[1] });
            return message;
        }

        function applyTranslations() {
            document.documentElement.lang = getLanguage();
            document.title = t("page_title_browser");
            document.getElementById("pageTitle").textContent = t("page_title");
            document.getElementById("themeProgressLabel").textContent = t("ready_label");
            document.getElementById("surrenderRoundBtn").textContent = t("surrender_round");
            document.getElementById("exitGameBtn").textContent = t("exit_game");
        }

        applyTranslations();

        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
                return v.toString(16);
            });
        }
        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) { try { window.name = `reconnect_token=${tok}`; } catch (_) {} }

        // Luo reconnect_token synkronisesti ennen mitään muuta (iOS-yhteensopiva)
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try { t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token"); } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        const socket = io();
        try { window.socket = socket; } catch (_) {}
        let gameOverShown = false;
        let gridRetryTimer = null;
        const surrenderRoundBtn = document.getElementById("surrenderRoundBtn");
        const exitGameBtn = document.getElementById("exitGameBtn");
        const setupStatus = document.getElementById("setup-status");
        const themeProgress = document.getElementById("theme-progress");
        const themeProgressList = document.getElementById("theme-progress-list");
        const translationHintContainer = document.getElementById("translation-hint");
        const translationHintGrid = document.getElementById("translation-hint-grid");
        let cards = [];
        let matched = new Set();
        let currentTurn = null;
        let currentTranslationHint = null;
        // Varmista että uusi erä voi kysyä sanoja tällä sivulla
        try { sessionStorage.removeItem("words_given"); } catch (e) {}
        let myName = localStorage.getItem("username");
        if (!myName) {
            console.error("[ERROR] Käyttäjänimeä ei löydy localStoragesta.");
            window.location.href = "/";
        }
        const reconnectToken = getReconnectToken();
        if (!reconnectToken) {
            alert("Reconnect_token puuttuu! Lataa sivu uudelleen.");
            location.reload();
        }
        function navigateTo(path) {
            try { socket.disconnect(); } catch (_) {}
            window.location.href = path;
        }

        function persistSummary(data) {
            try {
                localStorage.setItem("memory_summary_round_wins", JSON.stringify((data && data.round_win) || {}));
            } catch (_) {}
        }

        function clearVolatileGameState() {
            sessionStorage.removeItem("game_started");
            sessionStorage.removeItem("words_given");
            sessionStorage.removeItem("last_asked_pair");
            sessionStorage.removeItem("game_setup_mode");
            sessionStorage.removeItem("game_setup_theme");
            sessionStorage.removeItem("last_round_mode");
            sessionStorage.removeItem("last_round_theme");
            sessionStorage.removeItem("accepted_theme_words");
            sessionStorage.removeItem("queued_next_round");
            sessionStorage.removeItem("pending_ask");
            sessionStorage.removeItem("pending_game_navigation");
            sessionStorage.removeItem("players");
            try { localStorage.removeItem("reconnect_token"); } catch (_) {}
        }
        // Liity peliin reconnect_tokenin kanssa
        const joinPayload = {
            username: myName,
            reconnect_token: reconnectToken,
            bot_mode: false
        };
        console.log("DEBUG: join-payload:", JSON.stringify(joinPayload));
        socket.emit("join", joinPayload);

        function updateRoundActionsVisibility() {
            if (!surrenderRoundBtn || !exitGameBtn) return;
            const show = Array.isArray(cards) && cards.length > 0 && !gameOverShown;
            surrenderRoundBtn.style.display = show ? "inline-flex" : "none";
            exitGameBtn.style.display = gameOverShown ? "none" : "inline-flex";
        }

        function showSetupStatus(message) {
            setupStatus.textContent = message;
            setupStatus.style.display = "block";
        }

        function showThemeSetupStatus(theme, phase) {
            const normalizedTheme = theme || "theme";
            const normalizedPhase = phase || "drawing_cards";
            const key = normalizedPhase === "finding_words" ? "setup_finding_words" : "setup_drawing_cards";
            showSetupStatus(t(key, { theme: normalizedTheme }));
        }

        function hideSetupStatus() {
            setupStatus.style.display = "none";
            setupStatus.textContent = "";
        }

        function fitWordText(textElement, cardElement) {
            if (!textElement || !cardElement) return;
            let fontSize = 34;
            const minFontSize = 14;
            const maxWidth = Math.max(cardElement.clientWidth - 28, 40);
            const maxHeight = Math.max(cardElement.clientHeight - 28, 24);
            textElement.style.fontSize = `${fontSize}px`;
            while (
                fontSize > minFontSize &&
                (textElement.scrollWidth > maxWidth || textElement.scrollHeight > maxHeight)
            ) {
                fontSize -= 1;
                textElement.style.fontSize = `${fontSize}px`;
            }
        }

        function hideCardElement(cardElement) {
            cardElement.classList.add("hidden");
            cardElement.classList.remove("matched-highlight", "removed");
            cardElement.classList.remove("word-card");
            cardElement.style.backgroundImage = "none";
            cardElement.replaceChildren();
        }

        function revealCardElement(cardElement, cardData) {
            if (!cardElement || !cardData) return;
            cardElement.classList.remove("hidden", "removed", "matched-highlight");
            cardElement.replaceChildren();
            cardElement.style.backgroundImage = "none";
            cardElement.classList.toggle("word-card", cardData.card_type === "word");
            if (cardData.card_type === "word") {
                const text = document.createElement("div");
                text.className = "card-word-text";
                text.textContent = cardData.text || cardData.word || "";
                cardElement.appendChild(text);
                fitWordText(text, cardElement);
                return;
            }
            cardElement.style.backgroundImage = `url('${cardData.image}')`;
        }

        function getAcceptedThemeWords() {
            try {
                return JSON.parse(sessionStorage.getItem("accepted_theme_words") || "[]");
            } catch (e) {
                return [];
            }
        }

        function setAcceptedThemeWords(words) {
            try { sessionStorage.setItem("accepted_theme_words", JSON.stringify(words)); } catch (e) {}
        }

        function clearThemeProgress() {
            setAcceptedThemeWords([]);
            themeProgress.style.display = "none";
            themeProgressList.textContent = "";
        }

        function renderThemeProgress() {
            const acceptedWords = getAcceptedThemeWords();
            if (!acceptedWords.length) {
                themeProgress.style.display = "none";
                themeProgressList.textContent = "";
                return;
            }
            themeProgressList.textContent = acceptedWords.join(", ");
            themeProgress.style.display = "block";
        }

        function addAcceptedThemeWord(word) {
            if (!word) return;
            const acceptedWords = getAcceptedThemeWords();
            if (acceptedWords.includes(word)) {
                renderThemeProgress();
                return;
            }
            acceptedWords.push(word);
            setAcceptedThemeWords(acceptedWords);
            renderThemeProgress();
        }

        function hideRestartChoices() {
            const oldResults = document.getElementById("results");
            if (oldResults) oldResults.remove();
        }

        function getLastRoundMode() {
            return sessionStorage.getItem("last_round_mode") || "manual";
        }

        function getLastRoundTheme() {
            return sessionStorage.getItem("last_round_theme") || "";
        }

        function modeUsesTheme(mode) {
            return mode === "theme" || mode === "spanish";
        }

        function getThemePromptForMode(mode) {
            return mode === "spanish" ? t("prompt_spanish_theme") : t("prompt_theme");
        }

        function queueNextRound(mode) {
            if (!canQueueNextRound()) {
                return;
            }
            const payload = { mode };
            if (modeUsesTheme(mode)) {
                payload.theme = getLastRoundTheme();
            }
            try { sessionStorage.setItem("queued_next_round", JSON.stringify(payload)); } catch (e) {}
            try { sessionStorage.removeItem("game_setup_mode"); } catch (e) {}
            try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
            navigateTo("/waiting");
        }

        function getStoredPlayers() {
            try {
                return JSON.parse(sessionStorage.getItem("players") || "[]");
            } catch (e) {
                return [];
            }
        }

        function canQueueNextRound() {
            const players = getStoredPlayers();
            return players.length >= 2 && players[1] === myName;
        }

        function updateRemainingWords() {
            return;
        }

        function getTranslationHintWords(card) {
            if (!card || card.card_type !== "word") return null;
            const spanish = card.spanish_word || card.text;
            const english = card.word || "";
            const finnish = (card.finnish_word && String(card.finnish_word).trim()) ? card.finnish_word : "--";
            if (!spanish || !english) return null;
            return { spanish, finnish, english };
        }

        function renderTranslationHint() {
            if (!currentTranslationHint) {
                translationHintContainer.style.display = "none";
                translationHintGrid.replaceChildren();
                return;
            }

            const columns = getLanguage() === "fi"
                ? [
                    { label: t("translation_spanish"), value: currentTranslationHint.spanish },
                    { label: t("translation_finnish"), value: currentTranslationHint.finnish },
                    { label: t("translation_english"), value: currentTranslationHint.english }
                ]
                : [
                    { label: t("translation_spanish"), value: currentTranslationHint.spanish },
                    { label: t("translation_english"), value: currentTranslationHint.english }
                ];

            translationHintGrid.style.gridTemplateColumns = `repeat(${columns.length}, minmax(0, 1fr))`;
            const items = columns.map((column) => {
                const cell = document.createElement("div");
                cell.className = "translation-col";
                const label = document.createElement("div");
                label.className = "translation-col-label";
                label.textContent = column.label;
                const value = document.createElement("div");
                value.className = "translation-col-value";
                value.textContent = column.value;
                cell.appendChild(label);
                cell.appendChild(value);
                return cell;
            });
            translationHintGrid.replaceChildren(...items);
            translationHintContainer.style.display = "block";
        }

        function showTranslationHintForCard(card, index) {
            const words = getTranslationHintWords(card);
            if (!words) return;
            currentTranslationHint = { ...words, index };
            renderTranslationHint();
        }

        function clearTranslationHint(indices = null) {
            if (!currentTranslationHint) return;
            if (!indices || indices.includes(currentTranslationHint.index)) {
                currentTranslationHint = null;
                renderTranslationHint();
            }
        }

        function removeMatchedCardElement(cardElement) {
            if (!cardElement) return;
            cardElement.classList.remove("matched-highlight", "word-card", "hidden");
            cardElement.style.backgroundImage = "none";
            cardElement.replaceChildren();
            cardElement.classList.add("removed");
        }

        const storedSetupMode = sessionStorage.getItem("game_setup_mode");
        const storedTheme = sessionStorage.getItem("game_setup_theme");
        const storedSetupPhase = sessionStorage.getItem("game_setup_phase");
        if (modeUsesTheme(storedSetupMode)) {
            showThemeSetupStatus(storedTheme || "theme", storedSetupPhase || "drawing_cards");
            renderThemeProgress();
        }

        // Pyydä aina nykyinen ruudukko yhteyden muodostuessa
        socket.emit("request_grid");

        // Älä auto-käynnistä peliä tässä näkymässä; odota odotushuoneessa aloitusta
        socket.on("player_joined", (data) => {
            console.log("[DEBUG] player_joined(game):", data.players);
            // Vain UI-päivitystä varten; varsinainen aloitus tehdään odotushuoneessa
        });

        // Kun peli käynnistyy, aseta front-flag
        socket.on("init_grid", (data) => {
            gameOverShown = false;
            if (gridRetryTimer) {
                clearTimeout(gridRetryTimer);
                gridRetryTimer = null;
            }
            try { sessionStorage.removeItem("pending_game_navigation"); } catch (e) {}
            sessionStorage.setItem("game_started", "1");
            sessionStorage.setItem("words_given", "1"); // Merkitse että kaikki sanat on jo annettu
            try {
                const activeMode = sessionStorage.getItem("game_setup_mode") || getLastRoundMode();
                sessionStorage.setItem("last_round_mode", activeMode);
                if (modeUsesTheme(activeMode)) {
                    const activeTheme = sessionStorage.getItem("game_setup_theme") || getLastRoundTheme();
                if (activeTheme) sessionStorage.setItem("last_round_theme", activeTheme);
            } else {
                sessionStorage.removeItem("last_round_theme");
            }
        } catch (e) {}
        try { sessionStorage.removeItem("game_setup_mode"); } catch (e) {}
        try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
        try { sessionStorage.removeItem("game_setup_phase"); } catch (e) {}
        document.getElementById("grid").style.display = "";
            document.getElementById("players").style.display = "";
            hideRestartChoices();
            hideSetupStatus();
            clearThemeProgress();
            updateRoundActionsVisibility();

            console.log("[DEBUG] init_grid saapui! Kortteja:", data.cards.length);
            cards = data.cards;
            console.log("[DEBUG] cards:", cards);
            currentTurn = data.turn;
            sessionStorage.setItem("players", JSON.stringify(data.players));
            matched = new Set();
            currentTranslationHint = null;
            drawGrid();
            updatePlayers();
            renderTranslationHint();
        });

        // Jos palvelimella ei ole ruudukkoa (esim. peliä ei ole vielä aloitettu), ei tehdä mitään.
        // Aloitus tapahtuu odotushuoneessa, tai käyttäjä voi palata sinne.
        socket.on("no_grid", (data) => {
            console.log("[DEBUG] no_grid vastaanotettu:", data && data.reason);
            const reason = (data && data.reason) || "";
            const setupMode = sessionStorage.getItem("game_setup_mode");
            const hasPendingAsk = Boolean(sessionStorage.getItem("pending_ask"));
            const gameAlreadyStarted = sessionStorage.getItem("game_started") === "1";
            const pendingGameNavigationTs = parseInt(sessionStorage.getItem("pending_game_navigation") || "0", 10);
            const navigationIsFresh = pendingGameNavigationTs && (Date.now() - pendingGameNavigationTs) < 12000;
            const manualSetupInProgress = setupMode === "manual";
            if (reason === "Pelaajia liian vähän") {
                if (navigationIsFresh || setupMode || hasPendingAsk) {
                    if (gridRetryTimer) clearTimeout(gridRetryTimer);
                    gridRetryTimer = setTimeout(() => {
                        socket.emit("request_grid");
                    }, 800);
                    return;
                }
                navigateTo("/waiting");
                return;
            }
            if (!gameAlreadyStarted && (manualSetupInProgress || hasPendingAsk || navigationIsFresh)) {
                if (gridRetryTimer) clearTimeout(gridRetryTimer);
                gridRetryTimer = setTimeout(() => {
                    socket.emit("request_grid");
                }, 800);
                return;
            }
            if (!gameAlreadyStarted && !setupMode && !hasPendingAsk && !navigationIsFresh) {
                navigateTo("/waiting");
                return;
            }
            if (modeUsesTheme(sessionStorage.getItem("game_setup_mode"))) {
                const theme = sessionStorage.getItem("game_setup_theme") || "theme";
                const phase = sessionStorage.getItem("game_setup_phase") || "drawing_cards";
                showThemeSetupStatus(theme, phase);
                renderThemeProgress();
            }
            updateRoundActionsVisibility();
        });

        socket.on("theme_generation_started", (data) => {
            console.log("[DEBUG] theme_generation_started:", data);
            if (data && data.theme) {
                try { sessionStorage.setItem("game_setup_theme", data.theme); } catch (e) {}
            }
            try { sessionStorage.setItem("game_setup_mode", (data && data.mode) || "theme"); } catch (e) {}
            try { sessionStorage.setItem("game_setup_phase", (data && data.phase) || "drawing_cards"); } catch (e) {}
            navigateTo("/waiting");
        });

        socket.on("theme_word_accepted", (data) => {
            console.log("[DEBUG] theme_word_accepted:", data);
            if (data && data.word) {
                addAcceptedThemeWord(data.word);
            }
        });

        socket.on("theme_selection_updated", (data) => {
            console.log("[DEBUG] theme_selection_updated(game):", data);
            if (!data || !data.active) {
                return;
            }
            try { sessionStorage.setItem("game_setup_mode", (data.mode || sessionStorage.getItem("last_round_mode") || "theme")); } catch (e) {}
            if (data.theme) {
                try { sessionStorage.setItem("game_setup_theme", data.theme); } catch (e) {}
            }
            try { sessionStorage.removeItem("game_started"); } catch (e) {}
            navigateTo("/waiting");
        });

        socket.on("game_setup_error", (data) => {
            const reason = localizeServerMessage((data && data.reason) || t("game_setup_failed"));
            console.error("[DEBUG] game_setup_error:", reason);
            const failedMode = sessionStorage.getItem("game_setup_mode");
            const failedTheme = sessionStorage.getItem("game_setup_theme") || "";
            if (failedMode === "theme" || failedMode === "spanish") {
                try {
                    sessionStorage.setItem("queued_next_round", JSON.stringify({ mode: failedMode, theme: failedTheme }));
                } catch (e) {}
            }
            try { sessionStorage.removeItem("game_setup_mode"); } catch (e) {}
            try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}
            hideSetupStatus();
            clearThemeProgress();
            alert(reason);
            navigateTo("/waiting");
        });

        socket.on("update_turn", (data) => {
            console.log("[DEBUG] Vuoro vaihtui:", data.turn);
            currentTurn = data.turn;
            updatePlayers();
        });

        socket.on("reveal_card", (data) => {
            console.log("[DEBUG] Paljastetaan kortti:", data);
            const card = document.getElementById(`card-${data.index}`);
            if (card) {
                const cardData = data.card || cards[data.index];
                revealCardElement(card, cardData);
                showTranslationHintForCard(cardData, data.index);
            }
        });

        socket.on("hide_cards", (data) => {
            console.log("[DEBUG] Piilotetaan kortit:", data.indices);
            data.indices.forEach(i => {
                const card = document.getElementById(`card-${i}`);
                if (card && !matched.has(i)) {
                    hideCardElement(card);
                }
            });
            clearTranslationHint(data.indices || []);
        });

        socket.on("pair_found", (data) => {
            console.log("[DEBUG] Pari löytyi:", data.word);
            data.indices.forEach(i => matched.add(i));
            data.indices.forEach((i) => {
                const card = document.getElementById(`card-${i}`);
                if (card) {
                    card.classList.add("matched-highlight");
                    setTimeout(() => {
                        removeMatchedCardElement(card);
                    }, 3000);
                }
            });
            showWordMessage(data.word);
            clearTranslationHint(data.indices || []);
        });

        socket.on("game_over", (data) => {
            if (gameOverShown) {
                console.log("[DEBUG] game_over ohitettu, tulosnakyma on jo auki.");
                return;
            }
            gameOverShown = true;
            console.log("[DEBUG] Peli päättyi, näytetään tulokset.");
            persistSummary(data);
            clearTranslationHint();
            document.getElementById("grid").style.display = "none";
            document.getElementById("players").style.display = "none";
            updateRoundActionsVisibility();
            themeProgress.style.display = "none";
            const oldResults = document.getElementById("results");
            if (oldResults) oldResults.remove();

            const results = document.createElement("div");
            results.id = "results";

            const points = data.points || {};
            const wins = data.round_win || {};

            const canChooseNextRound = canQueueNextRound();
            const surrenderedBy = data.surrendered_by;
            const surrenderedLine = surrenderedBy
                ? `<div class="results-section" style="font-size:18px; color:#ffd8d8;">${t("surrendered_round", { name: surrenderedBy })}</div>`
                : "";
            results.innerHTML = `
                <div class="results-section">
                    <div class="results-heading">${t("game_over", { winner: data.winner })}</div>
                    <br>
                    <span style="font-size:20px;">${t("points")}</span><br>
                    ${Object.entries(points).map(([name, pts]) => `${name}: ${pts} ${t("pairs_suffix")}`).join("<br>")}
                </div>
                ${surrenderedLine}
                <div class="results-section results-subheading">
                    ${t("round_wins")}<br>
                    ${Object.entries(wins).map(([name, w]) => `${name}: ${w} ${t("wins_suffix")}`).join("<br>")}
                </div>
                <br>
                <div class="results-cta">
                    ${canChooseNextRound ? t("new_round_with") : t("new_round_waiting")}
                </div>
                <div class="results-actions" style="${canChooseNextRound ? "" : "display:none;"}">
                    <button id="restart-manual-btn" class="results-btn mode">${t("enter_words")}</button>
                    <button id="restart-theme-btn" class="results-btn mode">${t("enter_theme")}</button>
                    <button id="restart-spanish-btn" class="results-btn mode">${t("study_spanish")}</button>
                </div>
                <div class="results-actions">
                    <button id="end-game-btn" class="results-btn end">${t("exit_game")}</button>
                </div>
            `;
            document.body.appendChild(results);
            document.getElementById("restart-manual-btn")?.addEventListener("click", () => queueNextRound("manual"));
            document.getElementById("restart-theme-btn")?.addEventListener("click", () => queueNextRound("theme"));
            document.getElementById("restart-spanish-btn")?.addEventListener("click", () => queueNextRound("spanish"));
            document.getElementById("end-game-btn")?.addEventListener("click", endGame);

            const winnerMessage = document.getElementById("winner-message");
            if (winnerMessage) winnerMessage.style.display = "none";
        });

        socket.on("round_surrender_failed", () => {
            alert(t("surrender_failed"));
        });

        // Sanojen kysely Pixabayn käyttöön
        socket.on("ask_for_word", (data) => {
            console.log("[DEBUG] ask_for_word vastaanotettu:", data);
            if (sessionStorage.getItem("words_given")) {
                console.log("[DEBUG] Ei näytetä promptia, sanat jo annettu tässä selaimessa.");
                return;
            }
            // Estä duplikaattipromptit samalle parille
            const lastPair = parseInt(sessionStorage.getItem("last_asked_pair") || "0", 10);
            if (Number(data.pair) <= lastPair) {
                console.log("[DEBUG] Ohitetaan duplikaatti ask_for_word. lastPair=", lastPair, "incoming=", data.pair);
                return;
            }
            if (myName !== data.player) {
                showSetupStatus(t("setup_manual", { name: data.player || "" }));
                return;
            }
            if (myName === data.player) {
                let sana = prompt(t("prompt_word", { pair: data.pair }));
                console.log("[DEBUG] Annettiin sana:", sana);
                if (sana) {
                    socket.emit("word_given", {word: sana});
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] Lähetettiin word_given palvelimelle:", sana);
                }
            }
        });

        socket.on("word_failed", (data) => {
            console.log("[DEBUG] word_failed vastaanotettu:", data);
            if (myName === data.player) {
                alert(t("pixabay_retry"));
                let sana = prompt(t("prompt_word_retry", { pair: data.pair }));
                if (sana && sana.trim().length > 0) {
                    socket.emit("word_given", { word: sana.trim() });
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] Lähetettiin word_given uudestaan:", sana);
                } else {
                    // Käyttäjä perui – salli saman parin asken tulla uudelleen (pieni viive 300 ms)
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair - 1)); } catch (e) {}
                    setTimeout(() => {
                        socket.emit("ask_for_word", { player: myName, pair: data.pair });
                        console.log("[DEBUG] Käyttäjä perui, pyydettiin ask_for_word uudestaan parille (300ms viive):", data.pair);
                    }, 300);
                }
            }
        });

        // Jos odotushuoneessa tuli ensimmäinen ask_for_word jo ennen kuin tämä sivu ehti avautua,
        // käsitellään se tässä talletetusta sessionStoragesta.
        (function handlePendingAsk() {
            let raw = null;
            try { raw = sessionStorage.getItem("pending_ask"); } catch (e) {}
            if (!raw) return;
            try { sessionStorage.removeItem("pending_ask"); } catch (e) {}
            let data = null;
            try { data = JSON.parse(raw); } catch (e) {}
            if (!data) return;
            console.log("[DEBUG] Käsitellään pending_ask pelisivulla:", data);
            if (sessionStorage.getItem("words_given")) return; // jos jo merkitty valmiiksi
            if (myName !== data.player) {
                showSetupStatus(t("setup_manual", { name: data.player || "" }));
                return;
            }
            if (myName === data.player) {
                let sana = prompt(t("prompt_word", { pair: data.pair }));
                console.log("[DEBUG] (pending) Annettiin sana:", sana);
                if (sana) {
                    socket.emit("word_given", {word: sana});
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] (pending) Lähetettiin word_given palvelimelle:", sana);
                }
            }
        })();

        function restartGame() {
            queueNextRound(getLastRoundMode());
        }

        // Tyhjennä front-flag kun peli päättyy tai käyttäjä palaa etusivulle
        function endGame() {
            if (gridRetryTimer) {
                clearTimeout(gridRetryTimer);
                gridRetryTimer = null;
            }
            socket.emit("leave_game", {
                username: myName,
                reconnect_token: getReconnectToken()
            });
            clearVolatileGameState();
            console.log("[DEBUG] Peli lopetetaan.");
            setTimeout(() => {
                try { socket.disconnect(); } catch (_) {}
                window.location.href = "/summary";
            }, 120);
        }

        surrenderRoundBtn.addEventListener("click", () => {
            if (!confirm(t("surrender_round_confirm"))) {
                return;
            }
            socket.emit("surrender_round", {
                username: myName,
                reconnect_token: getReconnectToken()
            });
        });
        exitGameBtn.addEventListener("click", () => {
            endGame();
        });

        socket.on("game_aborted", (data) => {
            if (gridRetryTimer) {
                clearTimeout(gridRetryTimer);
                gridRetryTimer = null;
            }
            const reason = (data && data.reason) || "Peli keskeytettiin.";
            alert(reason);
            navigateTo("/waiting");
        });

        function drawGrid() {
            console.log("[DEBUG] Piirretään ruudukko...");
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            updateRoundActionsVisibility();

            cards.forEach((card, index) => {
                const div = document.createElement("div");
                div.classList.add("card", "hidden");
                div.id = `card-${index}`;
                div.addEventListener("click", () => {
                    console.log(`[DEBUG] Klikattiin korttia: ${index}`);
                    if (myName === currentTurn && !matched.has(index)) {
                        socket.emit("card_clicked", {
                            index,
                            username: myName,
                            reconnect_token: getReconnectToken()
                        });
                    }
                });
                hideCardElement(div);
                grid.appendChild(div);
            });
        }

        function updatePlayers() {
            const players = JSON.parse(sessionStorage.getItem("players")) || [];
            const playersDiv = document.getElementById("players");
            playersDiv.innerHTML = "";

            players.forEach(name => {
                const span = document.createElement("span");
                span.textContent = name + " ";
                if (name === currentTurn) {
                    span.classList.add("active");
                }
                playersDiv.appendChild(span);
            });
        }

        function showWordMessage(word) {
            const toast = document.getElementById("toast");
            toast.textContent = t("found_word", { word });
            toast.style.display = "block";
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => {
                toast.style.display = "none";
            }, 5000);
        }

        window.addEventListener("resize", () => {
            document.querySelectorAll(".card-word-text").forEach((textElement) => {
                fitWordText(textElement, textElement.parentElement);
            });
        });
    </script>
</body>
</html>
