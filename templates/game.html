<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <title>Memory Game - Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        h1 {
            display: none;
        }
        .game-topbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: min(960px, calc(100% - 18px));
            margin: 4px auto 6px;
            flex-wrap: wrap;
        }
        #players {
            font-size: 14px;
            line-height: 1.2;
        }
        .players-status-label {
            display: block;
            width: 100%;
            margin-bottom: 6px;
            font-size: 11px;
            letter-spacing: 0.04em;
            text-align: center;
            color: #6a7a6a;
        }
        .player-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 8px;
        }
        .player-stone {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.24);
            flex: 0 0 auto;
        }
        .player-stone.white {
            background: #ffffff;
            border-color: #a0a0a0;
        }
        .player-stone.black {
            background: #1a1a1a;
            border-color: #666666;
        }
        #roundActions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .round-action-btn {
            border: none;
            border-radius: 999px;
            padding: 9px 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.18s ease, transform 0.18s ease;
        }
        .round-action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .round-action-btn.surrender {
            background: #7b2b2b;
            color: #fff6f6;
        }
        .round-action-btn.exit {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .active {
            color: limegreen;
        }
        #grid {
            --grid-columns: 4;
            --grid-gap: 12px;
            --grid-pad-x: 8px;
            --grid-max-width: 720px;
            display: grid;
            width: min(calc(100vw - 18px), var(--grid-max-width));
            margin: 0 auto;
            grid-template-columns: repeat(var(--grid-columns), minmax(0, 1fr));
            gap: var(--grid-gap);
            justify-content: center;
            padding: 8px var(--grid-pad-x) 8px;
            box-sizing: border-box;
        }
        #translation-hint {
            max-width: 820px;
            margin: 2px auto 8px;
            padding: 8px 10px;
            display: none;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            transition: border-color 0.3s, background 0.3s;
        }
        #translation-hint.pair-found {
            background: rgba(71, 212, 92, 0.08);
            border-color: rgba(71, 212, 92, 0.4);
        }
        #translation-hint-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #7cf58a;
            margin-bottom: 8px;
            display: none;
        }
        #translation-hint.pair-found #translation-hint-label {
            display: block;
        }
        #translation-hint-grid {
            display: grid;
            gap: 8px;
        }
        .translation-col {
            min-width: 0;
            padding: 7px 9px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
        }
        .translation-col-label {
            color: #fff2a8;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .translation-col-value {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }
        @media (max-width: 1180px) {
            #grid {
                --grid-gap: 15px;
                --grid-pad-x: 7px;
                padding: 12px 7px 10px;
            }
            .card {
                border-radius: 10px;
            }
            #translation-hint {
                max-width: 640px;
                padding: 9px 10px;
            }
            .translation-col {
                padding: 7px 8px;
            }
            .translation-col-value {
                font-size: 20px;
            }
        }
        @media (max-width: 1024px) and (orientation: portrait) {
            #players {
                font-size: 13px;
            }
            .game-topbar {
                gap: 10px;
                width: min(100%, calc(100vw - 8px));
                margin: 2px auto 6px;
            }
            #grid {
                --grid-gap: 12px;
                --grid-pad-x: 4px;
                row-gap: 12px;
                width: min(calc(100vw - 8px), var(--grid-max-width));
                padding: 8px 4px 8px;
            }
            .card {
                border-radius: 12px;
                border-width: 3px;
            }
            .card-word-text {
                padding: 10px;
            }
            #translation-hint {
                max-width: calc(100vw - 12px);
                margin: 0 auto 10px;
                padding: 8px 10px;
            }
            .translation-col-value {
                font-size: 18px;
            }
        }
        @media (max-width: 820px) {
            #translation-hint {
                max-width: calc(100% - 28px);
            }
            .translation-col-value {
                font-size: 16px;
            }
        }
        body.tablet-fit .game-topbar {
            gap: 10px;
            width: min(100%, calc(100vw - 12px));
            margin: 2px auto 4px;
        }
        body.tablet-fit #players {
            font-size: 12px;
        }
        body.tablet-fit .players-status-label {
            margin-bottom: 4px;
            font-size: 10px;
        }
        body.tablet-fit #roundActions {
            gap: 8px;
        }
        body.tablet-fit .round-action-btn {
            padding: 8px 12px;
            font-size: 13px;
        }
        body.tablet-fit #solo-stats {
            gap: 12px;
            font-size: 13px;
        }
        body.tablet-fit .solo-stat-value {
            font-size: 15px;
        }
        body.tablet-fit #setup-status {
            margin-top: 6px !important;
            font-size: 15px !important;
        }
        body.tablet-fit #theme-progress {
            margin: 6px auto 8px;
            padding: 0 10px;
            font-size: 12px;
        }
        body.tablet-fit #grid {
            --grid-gap: 10px;
            --grid-pad-x: 4px;
            width: min(calc(100vw - 8px), var(--grid-max-width));
            padding: 6px 4px 6px;
        }
        body.tablet-fit .card {
            border-radius: 10px;
        }
        body.tablet-fit .card-word-text {
            padding: 10px;
        }
        body.tablet-fit .card-audio-icon {
            font-size: clamp(36px, 5.2vw, 56px);
        }
        body.tablet-fit #image-pair-tracker {
            margin: 0 auto 8px;
            padding: 0 10px;
        }
        body.tablet-fit #image-pair-tracker-label {
            margin-bottom: 6px;
            font-size: 12px;
        }
        body.tablet-fit .image-pair-chip {
            padding: 7px 10px;
            font-size: 13px;
        }
        body.tablet-fit #translation-hint {
            max-width: calc(100vw - 14px);
            margin: 0 auto 8px;
            padding: 7px 8px;
        }
        body.tablet-fit .translation-col {
            padding: 6px 8px;
        }
        body.tablet-fit .translation-col-value {
            font-size: 17px;
        }
        body.tablet-fit #gomoku-wrap {
            padding: 2px 4px 6px !important;
        }
        body.tablet-fit #gomoku-board {
            width: var(--gomoku-board-css-size, calc(100vw - 8px));
            max-width: none;
            height: auto;
        }
        body.tablet-fit #gomoku-rematch-panel {
            width: min(700px, calc(100% - 14px));
            margin: 8px auto 10px;
        }
        body.tablet-fit .gomoku-rematch-card {
            padding: 14px 16px;
        }
        body.tablet-fit .gomoku-rematch-title {
            font-size: 20px;
            margin-bottom: 10px;
        }
        body.tablet-fit #results {
            width: min(720px, calc(100% - 20px));
            margin: 16px auto 0;
            padding: 22px 18px 24px;
            font-size: 20px;
        }
        body.tablet-fit .results-heading {
            font-size: 24px;
        }
        body.tablet-fit .results-subheading {
            font-size: 19px;
        }
        body.tablet-fit .results-btn {
            padding: 10px 15px;
            font-size: 16px;
        }
        body.tablet-fit .footer-credit {
            margin: 6px 0 10px;
            font-size: 11px;
        }
        #theme-progress {
            display: none;
            max-width: 760px;
            margin: 8px auto 12px;
            padding: 0 20px;
            color: #bfc7cf;
            font-size: 13px;
            line-height: 1.7;
        }
        #theme-progress strong {
            color: #fff;
            font-size: 13px;
            margin-right: 8px;
        }
        #theme-progress-list {
            display: inline;
        }
        #image-pair-tracker {
            display: none;
            max-width: 860px;
            margin: 0 auto 12px;
            padding: 0 14px;
            box-sizing: border-box;
        }
        #image-pair-tracker-label {
            color: #fff2a8;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        #image-pair-tracker-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .image-pair-chip {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f4f4f4;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.1;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }
        .image-pair-chip.found {
            background: rgba(113, 240, 161, 0.14);
            border-color: rgba(113, 240, 161, 0.8);
            color: #b7ffca;
            box-shadow: 0 0 0 2px rgba(113, 240, 161, 0.28);
        }
        button.image-pair-chip {
            cursor: pointer;
            font-family: inherit;
        }
        button.image-pair-chip:hover:not(:disabled) {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.25);
        }
        button.image-pair-chip:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .card {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #444;
            border: 2px solid #111;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-sizing: border-box;
        }
        .card.word-card {
            background: linear-gradient(160deg, #1f3528, #122018);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card.audio-card {
            background:
                radial-gradient(circle at top, rgba(255, 233, 176, 0.12), transparent 48%),
                linear-gradient(160deg, #2b2237, #171223);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-word-text {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            color: #fff;
            font-weight: 700;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
        }
        .card-audio-icon {
            font-size: clamp(42px, 6vw, 64px);
            line-height: 1;
            color: #fff2c9;
            text-shadow: 0 0 18px rgba(255, 211, 97, 0.22);
            transform: translateY(-2px);
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card.matched-highlight {
            box-shadow: 0 0 0 5px rgba(113, 240, 161, 0.98), 0 0 28px rgba(113, 240, 161, 0.6);
            transform: scale(1.03);
        }
        .card.revealed-first {
            box-shadow: 0 0 0 4px rgba(255, 216, 92, 0.98), 0 0 18px rgba(255, 216, 92, 0.32);
            outline: 2px solid rgba(255, 216, 92, 0.92);
            outline-offset: -2px;
        }
        .card.revealed-audio-pending {
            box-shadow: 0 0 0 4px rgba(255, 216, 92, 0.98), 0 0 18px rgba(255, 216, 92, 0.32);
            outline: 2px solid rgba(255, 216, 92, 0.92);
            outline-offset: -2px;
        }
        .card.revealed-second {
            box-shadow: 0 0 0 4px rgba(255, 102, 102, 0.98), 0 0 18px rgba(255, 102, 102, 0.32);
            outline: 2px solid rgba(255, 102, 102, 0.92);
            outline-offset: -2px;
        }
        .card.removed {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: none;
            box-shadow: none;
        }
        .hidden {
            background-image: none !important;
        }
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 18px;
            border: 1px solid #2ecc71;
            z-index: 9999;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
            display: none;
        }
        #results {
            width: min(760px, calc(100% - 32px));
            margin: 24px auto 0;
            padding: 28px 24px 30px;
            color: #f3f1c7;
            font-size: 24px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(120, 214, 146, 0.12), transparent 45%),
                linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        .results-section {
            margin-bottom: 20px;
        }
        .results-heading {
            color: #fff4a8;
            font-size: 28px;
            font-weight: 700;
        }
        .results-subheading {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }
        .results-cta {
            color: white;
            font-size: 20px;
            margin-bottom: 16px;
        }
        .results-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .results-btn {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease, background-color 0.18s ease;
        }
        .results-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .results-btn.mode {
            background-color: limegreen;
            color: #0c150e;
        }
        .results-btn.end {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .footer-credit {
            margin: 8px 0 16px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
        #solo-stats {
            display: none;
            justify-content: center;
            gap: 16px;
            margin: 0;
            font-size: 15px;
            color: #b0c8b0;
        }
        #solo-stats.active { display: flex; }
        .solo-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .solo-stat-label {
            color: #7a9e7a;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .solo-stat-value {
            font-weight: 700;
            font-size: 17px;
            color: #e8f5e8;
        }
        body {
            --bg-top: #11151a;
            --bg-bottom: #090c10;
            --bg-glow: rgba(122, 184, 245, 0.08);
            --text-main: #f4f7fb;
            --text-muted: #c8d2db;
            --text-soft: #9aa9b7;
            --heading-color: #fff1bb;
            --panel-bg: rgba(255,255,255,0.05);
            --panel-border: rgba(255,255,255,0.08);
            --control-bg: rgba(255,255,255,0.06);
            --control-border: rgba(255,255,255,0.12);
            --control-text: #d9e3ee;
            --accent: #8fd5ee;
            --accent-strong: #5baaca;
            --accent-soft: rgba(143, 213, 238, 0.16);
            --accent-text: #071820;
            --danger: #9a4141;
            --danger-text: #fff6f6;
            --success-ring: rgba(113, 240, 161, 0.98);
            --warning-ring: rgba(255, 216, 92, 0.98);
            --error-ring: rgba(255, 102, 102, 0.98);
            --card-back: #414d58;
            --word-card: linear-gradient(160deg, #203747, #121e28);
            --font-body: "Trebuchet MS", "Segoe UI", sans-serif;
            --font-display: "Georgia", "Times New Roman", serif;
            background:
                radial-gradient(circle at top, var(--bg-glow), transparent 38%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
        }
        body[data-ui-style="cozy"] {
            --bg-top: #241710;
            --bg-bottom: #110c08;
            --bg-glow: rgba(245, 186, 116, 0.16);
            --text-main: #fff4e8;
            --text-muted: #e8d4c0;
            --text-soft: #c2a690;
            --heading-color: #ffe1b4;
            --panel-bg: rgba(71, 41, 24, 0.58);
            --panel-border: rgba(255, 214, 156, 0.15);
            --control-bg: rgba(255, 250, 239, 0.07);
            --control-border: rgba(255, 214, 156, 0.18);
            --control-text: #f8e8d5;
            --accent: #f2ba74;
            --accent-strong: #de8d47;
            --accent-soft: rgba(242, 186, 116, 0.18);
            --accent-text: #2a1708;
            --danger: #8c3b3b;
            --card-back: #655244;
            --word-card: linear-gradient(160deg, #5a3e29, #2b1c12);
            --font-body: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
            --font-display: "Palatino Linotype", "Book Antiqua", serif;
        }
        body[data-ui-style="cabinet"] {
            --bg-top: #171311;
            --bg-bottom: #090707;
            --bg-glow: rgba(203, 160, 92, 0.13);
            --text-main: #f1e8db;
            --text-muted: #d8c6b1;
            --text-soft: #ab9885;
            --heading-color: #f0ddb5;
            --panel-bg: rgba(39, 28, 22, 0.66);
            --panel-border: rgba(214, 182, 122, 0.15);
            --control-bg: rgba(255, 248, 235, 0.05);
            --control-border: rgba(214, 182, 122, 0.18);
            --control-text: #e7ddcf;
            --accent: #d9b36f;
            --accent-strong: #b67d36;
            --accent-soft: rgba(217, 179, 111, 0.18);
            --accent-text: #24170a;
            --danger: #7a3b32;
            --card-back: #5a4639;
            --word-card: linear-gradient(160deg, #4a392b, #221911);
            --font-body: "Book Antiqua", "Palatino Linotype", serif;
            --font-display: "Georgia", "Times New Roman", serif;
        }
        body[data-ui-style="minimal"] {
            --bg-top: #0d1116;
            --bg-bottom: #06080b;
            --bg-glow: rgba(184, 197, 214, 0.1);
            --text-main: #eef4f8;
            --text-muted: #c4d1da;
            --text-soft: #92a3af;
            --heading-color: #f5f8fb;
            --panel-bg: rgba(255,255,255,0.035);
            --panel-border: rgba(165, 193, 210, 0.12);
            --control-bg: rgba(255,255,255,0.04);
            --control-border: rgba(165, 193, 210, 0.16);
            --control-text: #dce7ee;
            --accent: #b6c5d6;
            --accent-strong: #8498ae;
            --accent-soft: rgba(182, 197, 214, 0.16);
            --accent-text: #101923;
            --danger: #7a4b4b;
            --card-back: #39444f;
            --word-card: linear-gradient(160deg, #29323a, #151b20);
            --font-body: "Verdana", "Geneva", sans-serif;
            --font-display: "Trebuchet MS", "Gill Sans", sans-serif;
        }
        h1 {
            color: var(--heading-color);
            font-family: var(--font-display);
            letter-spacing: 0.03em;
        }
        #players,
        #setup-status,
        #theme-progress,
        .footer-credit,
        .results-cta,
        .results-subheading,
        #solo-stats {
            color: var(--text-muted);
        }
        .translation-col,
        #translation-hint,
        .image-pair-chip,
        #results {
            background: var(--panel-bg);
            border-color: var(--panel-border);
        }
        .translation-col-label,
        #image-pair-tracker-label,
        .results-heading {
            color: var(--heading-color);
        }
        .image-pair-chip.found {
            background: var(--accent-soft);
            border-color: rgba(255,255,255,0.14);
            color: var(--accent);
            box-shadow: none;
        }
        .card {
            background-color: var(--card-back);
            border-color: rgba(0,0,0,0.24);
        }
        .card.word-card {
            background: var(--word-card);
            border-color: var(--panel-border);
        }
        .card.matched-highlight {
            box-shadow: 0 0 0 5px var(--success-ring), 0 0 28px rgba(113, 240, 161, 0.45);
        }
        .card.revealed-first {
            box-shadow: 0 0 0 4px var(--warning-ring), 0 0 18px rgba(255, 216, 92, 0.28);
        }
        .card.revealed-audio-pending {
            box-shadow: 0 0 0 4px var(--warning-ring), 0 0 18px rgba(255, 216, 92, 0.28);
        }
        .card.revealed-second {
            box-shadow: 0 0 0 4px var(--error-ring), 0 0 18px rgba(255, 102, 102, 0.28);
        }

            background: var(--control-bg);
            color: var(--control-text);
            border: 1px solid var(--control-border);
        }
        .round-action-btn.surrender {
            background: var(--danger);
            color: var(--danger-text);
        }
        .results-btn.mode {
            background: linear-gradient(180deg, var(--accent), var(--accent-strong));
            color: var(--accent-text);
        }
        #toast {
            border-color: var(--accent);
        }
        .solo-stat-label {
            color: var(--text-soft);
        }
        .solo-stat-value {
            color: var(--text-main);
        }
        body[data-ui-motion="reduced"] *,
        body[data-ui-motion="reduced"] *::before,
        body[data-ui-motion="reduced"] *::after {
            animation: none !important;
            transition: none !important;
            scroll-behavior: auto !important;
        }
        #gomoku-wrap {
            user-select: none;
            padding: 4px 8px 8px !important;
            overflow: auto;
        }
        #gomoku-board {
            display: block;
            width: var(--gomoku-board-css-size, min(96vw, calc(100vh - 112px)));
            max-width: none;
            height: auto;
            margin: 0 auto;
            cursor: pointer;
        }
        .gomoku-click { fill: rgba(0, 0, 0, 0.001); pointer-events: all; }
        .gomoku-stone { transition: opacity 0.2s; }
        .gomoku-win-stone { filter: drop-shadow(0 0 6px gold); }
        .stone-expiring { pointer-events: none; }
        #gomoku-rematch-panel {
            display: none;
            width: min(720px, calc(100% - 18px));
            margin: 10px auto 12px;
            text-align: left;
        }
        .gomoku-rematch-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 12px;
        }
        .gomoku-rematch-title {
            font-size: 22px;
            font-weight: 700;
            color: #7cf58a;
            text-align: center;
            margin-bottom: 12px;
        }
        .gomoku-rematch-score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
        }
        .gomoku-rematch-score:last-child {
            border-bottom: none;
        }
        .gomoku-rematch-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a7a6a;
            margin-bottom: 10px;
        }
        .gomoku-rematch-vote {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
        }
        .gomoku-rematch-vote.is-ready {
            background: rgba(124, 245, 138, 0.08);
            border: 1px solid rgba(124, 245, 138, 0.2);
        }
        .gomoku-rematch-vote.is-ready span:last-child {
            color: #7cf58a;
            font-weight: 700;
        }
        .gomoku-rematch-status-msg {
            font-size: 13px;
            color: #b9c5b9;
            text-align: center;
            min-height: 18px;
            margin-top: 8px;
        }
        .gomoku-rematch-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .gomoku-rematch-btn {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .gomoku-rematch-btn.primary {
            background: limegreen;
            color: #0c150e;
        }
        .gomoku-rematch-btn.secondary {
            background: rgba(255,255,255,0.07);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .gomoku-rematch-btn:disabled {
            opacity: 0.45;
            cursor: default;
        }
        #major-minor-wrap {
            max-width: 720px;
            margin: 26px auto 10px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            background: rgba(15, 22, 20, 0.92);
            box-shadow: 0 18px 45px rgba(0,0,0,0.26);
            text-align: center;
        }
        .major-minor-title {
            margin: 0 0 8px;
            font-size: 34px;
            color: #fffbe8;
        }
        .major-minor-score {
            color: #7cf58a;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 18px;
        }
        .major-minor-listen {
            border: none;
            border-radius: 999px;
            padding: 14px 26px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            background: #66df76;
            color: #07110b;
            margin-bottom: 18px;
        }
        .major-minor-choices {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-top: 14px;
        }
        .major-minor-errors {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .major-minor-error-dot {
            font-size: 22px;
            line-height: 1;
            opacity: 0.25;
        }
        .major-minor-error-dot.filled {
            opacity: 1;
        }
        .major-minor-progress {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .major-minor-progress-item {
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .major-minor-progress-item.filled {
            background: rgba(255,255,255,0.14);
            color: #fff;
        }
        .major-minor-progress-item.empty {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.28);
        }
        .major-minor-progress-item.correct {
            background: rgba(140,255,152,0.2);
            color: #8cff98;
            border-color: rgba(140,255,152,0.35);
        }
        .major-minor-progress-item.wrong {
            background: rgba(255,176,167,0.2);
            color: #ffb0a7;
            border-color: rgba(255,176,167,0.35);
        }
        .major-minor-progress-item.playing {
            animation: mm-pulse 0.55s ease-in-out infinite alternate;
        }
        @keyframes mm-pulse {
            from { opacity: 0.55; transform: scale(0.97); }
            to   { opacity: 1;    transform: scale(1.04); }
        }
        .major-minor-tap-row {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .major-minor-choice {
            min-width: 132px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 999px;
            padding: 14px 28px;
            background: rgba(255,255,255,0.07);
            color: #f5f5ec;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
        }
        .major-minor-choice:hover,
        .major-minor-choice:focus-visible {
            background: rgba(124,245,138,0.18);
            outline: none;
        }
        .major-minor-choice:disabled {
            opacity: 0.45;
            cursor: default;
        }
        .major-minor-undo {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 999px;
            color: rgba(255,255,255,0.55);
            font-size: 18px;
            padding: 6px 18px;
            cursor: pointer;
        }
        .major-minor-undo:hover { background: rgba(255,100,80,0.18); color: #ffb0a7; }
        .major-minor-feedback {
            margin-top: 18px;
            color: #f5f5ec;
            font-size: 18px;
            line-height: 1.45;
        }
        .major-minor-feedback.good { color: #8cff98; }
        .major-minor-feedback.bad { color: #ffb0a7; }
        .major-minor-played {
            display: block;
            color: #fff2a8;
            font-size: 15px;
            margin-top: 6px;
        }
        .major-minor-history {
            margin-top: 22px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.09);
        }
        .major-minor-history:empty { display: none; }
        .major-minor-history-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.32);
            margin-bottom: 8px;
            text-align: center;
        }
        .major-minor-history-pills {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .major-minor-history-pill {
            padding: 5px 13px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }
        .major-minor-history-pill.correct { background: rgba(140,255,152,0.15); color: #8cff98; border: 1px solid rgba(140,255,152,0.25); }
        .major-minor-history-pill.wrong   { background: rgba(255,176,167,0.15); color: #ffb0a7; border: 1px solid rgba(255,176,167,0.25); }
        .major-minor-history-correct-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .major-minor-history-correct-pill {
            padding: 3px 11px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.42);
            border: 1px solid rgba(255,255,255,0.1);
        }

            if (self.crypto && typeof self.crypto.randomUUID === "function") {

            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {

                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}

                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function createGameAudio(src) {

        function isAutoplayBlocked(error) {
            const name = String((error && error.name) || "");
            const message = String((error && error.message) || "");
            return name === "NotAllowedError"
                || /autoplay|user gesture|didn't interact|play\(\) failed/i.test(message);
        }

        function disarmAudioUnlockListeners() {
            if (!audioUnlockListenersArmed) return;
            AUDIO_UNLOCK_EVENTS.forEach((eventName) => {
                window.removeEventListener(eventName, handleAudioUnlockInteraction, true);
            });
            audioUnlockListenersArmed = false;
        }

        function showAudioUnlockPrompt() {
            const now = Date.now();
            if (now - lastAudioUnlockPromptAt < 2500) return;
            lastAudioUnlockPromptAt = now;
            showToast(t("audio_enable_prompt"), 3500);
        }

        function markAudioPlaybackUnlocked() {
            audioPlaybackUnlocked = true;
            disarmAudioUnlockListeners();
        }

        function armAudioUnlockListeners() {
            if (audioPlaybackUnlocked || audioUnlockListenersArmed) return;
            AUDIO_UNLOCK_EVENTS.forEach((eventName) => {
                window.addEventListener(eventName, handleAudioUnlockInteraction, true);
            });
            audioUnlockListenersArmed = true;
        }

        function primeAudioPlayback() {
            const probe = createGameAudio(SILENT_AUDIO_DATA_URI);
            probe.muted = true;
            probe.volume = 0;
            try {
                const playPromise = probe.play();
                if (playPromise && typeof playPromise.then === "function") {
                    playPromise.then(() => {
                        try {
                            probe.pause();
                            probe.currentTime = 0;
                        } catch (_) {}
                        markAudioPlaybackUnlocked();
                    }).catch(() => {});
                    return;
                }
                markAudioPlaybackUnlocked();
            } catch (_) {}
        }

        function handleAudioUnlockInteraction() {
            if (audioPlaybackUnlocked) {
                disarmAudioUnlockListeners();
                return;
            }
            primeAudioPlayback();
        }

        function safePlayAudio(audio, onFailure) {
            if (!audio) {
                if (typeof onFailure === "function") onFailure();
                return;
            }
            try {
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.then === "function") {
                    playPromise.then(() => {
                        markAudioPlaybackUnlocked();
                    }).catch((error) => {
                        if (isAutoplayBlocked(error)) {
                            audioPlaybackUnlocked = false;
                            armAudioUnlockListeners();
                            showAudioUnlockPrompt();
                        }
                        if (typeof onFailure === "function") onFailure(error);
                    });
                    return;
                }
                markAudioPlaybackUnlocked();
            } catch (error) {
                if (isAutoplayBlocked(error)) {
                    audioPlaybackUnlocked = false;
                    armAudioUnlockListeners();
                    showAudioUnlockPrompt();
                }
                if (typeof onFailure === "function") onFailure(error);
            }
        }

            if (majorMinorActiveAudio) {
                try { majorMinorActiveAudio.pause(); majorMinorActiveAudio.currentTime = 0; } catch (_) {}
                majorMinorActiveAudio = null;
            }
            const sequence = [...majorMinorState.audioSequence];
            const playNext = () => {
                const src = sequence.shift();
                if (!src) {
                    majorMinorActiveAudio = null;
                    return;
                }
                const audio = createGameAudio(src);
                majorMinorActiveAudio = audio;
                audio.onended = () => setTimeout(playNext, 160);
                safePlayAudio(audio, () => setTimeout(playNext, 160));
            };
            playNext();
        }

        function renderMajorMinorChoices() {
            const choicesEl = document.getElementById("majorMinorChoices");
            if (!choicesEl || !majorMinorState) return;
            choicesEl.replaceChildren();
            const { currentInput = [], sequenceLength = 1, answering = false, errors = 0, playback } = majorMinorState;

            // Error indicators

            errorsRow.className = "major-minor-errors";
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement("span");

                dot.textContent = "❌";

            choicesEl.appendChild(errorsRow);

            // --- PLAYBACK REVIEW MODE ---
            if (playback) {
                const reviewRow = document.createElement("div");
                reviewRow.className = "major-minor-progress";
                playback.correctAnswer.forEach((q, i) => {
                    const pill = document.createElement("span");
                    const playerGotIt = playback.playerInput[i] === q;
                    const isPlaying = i === playback.playingIndex;
                    pill.className = "major-minor-progress-item filled " + (playerGotIt ? "correct" : "wrong") + (isPlaying ? " playing" : "");
                    pill.textContent = playback.playedLabels[i] || (q === "major" ? t("major_minor_major") : t("major_minor_minor"));
                    reviewRow.appendChild(pill);
                });
                choicesEl.appendChild(reviewRow);

                if (playback.done) {
                    const nextRow = document.createElement("div");
                    nextRow.style.cssText = "display:flex;justify-content:center;margin-top:14px;";
                    const nextBtn = document.createElement("button");
                    nextBtn.type = "button";

            // Sequence progress
            const progressRow = document.createElement("div");
            progressRow.className = "major-minor-progress";
            for (let i = 0; i < sequenceLength; i++) {
                const pill = document.createElement("span");
                const isFilled = i < currentInput.length;
                pill.className = "major-minor-progress-item " + (isFilled ? "filled" : "empty");
                pill.textContent = isFilled
                    ? (currentInput[i] === "major" ? t("major_minor_major") : t("major_minor_minor"))
                    : "?";
                progressRow.appendChild(pill);
            }
            choicesEl.appendChild(progressRow);

            // Backspace button — visible whenever a pill is filled and not yet confirmed to server
            if (currentInput.length > 0 && (!answering || majorMinorState.pendingSubmit)) {
                const backRow = document.createElement("div");
                backRow.style.cssText = "display:flex;justify-content:center;margin-top:4px;";
                const backBtn = document.createElement("button");
                backBtn.type = "button";
                backBtn.className = "major-minor-undo";
                backBtn.textContent = "⌫";
                backBtn.title = t("major_minor_undo");
                backBtn.addEventListener("click", () => {
                    if (!majorMinorState) return;
                    if (majorMinorSubmitTimer) { clearTimeout(majorMinorSubmitTimer); majorMinorSubmitTimer = null; }
                    majorMinorState.currentInput.pop();
                    majorMinorState.answering = false;
                    majorMinorState.pendingSubmit = false;
                    renderMajorMinorChoices();
                });
                backRow.appendChild(backBtn);
                choicesEl.appendChild(backRow);
            }

            // Tap buttons — hidden while pending submit or already answered
            if (!answering && currentInput.length < sequenceLength) {
                const tapRow = document.createElement("div");
                tapRow.className = "major-minor-tap-row";
                ["major", "minor"].forEach(quality => {
                    const btn = document.createElement("button");
                    btn.type = "button";
                    btn.className = "major-minor-choice";
                    btn.textContent = quality === "major" ? t("major_minor_major") : t("major_minor_minor");
                    btn.addEventListener("click", () => {
                        if (!majorMinorState || majorMinorState.answering || majorMinorState.currentInput.length >= majorMinorState.sequenceLength) return;
                        majorMinorState.currentInput.push(quality);
                        if (majorMinorState.currentInput.length >= majorMinorState.sequenceLength) {
                            // Brief undo window before sending to server
                            majorMinorState.answering = true;
                            majorMinorState.pendingSubmit = true;
                            renderMajorMinorChoices();
                            majorMinorSubmitTimer = setTimeout(() => {
                                majorMinorSubmitTimer = null;
                                if (!majorMinorState || !majorMinorState.pendingSubmit) return;
                                majorMinorState.pendingSubmit = false;
                                socket.emit("major_minor_answer", {
                                    reconnect_token: getReconnectToken(),
                                    username: myName,
                                    answer: majorMinorState.currentInput.join("-")
                                });
                            }, 700);
                        } else {
                            renderMajorMinorChoices();
                        }
                    });
                    tapRow.appendChild(btn);
                });
                choicesEl.appendChild(tapRow);
            }
        }

        function startMajorMinorPlayback(correctAnswer, playerInput, playedLabels, audioSequence) {
            if (!majorMinorState) return;
            majorMinorState.playback = { correctAnswer, playerInput, playedLabels, audioSequence, playingIndex: -1, done: false };
            renderMajorMinorChoices();
            const tempo = parseFloat(localStorage.getItem("chord_progression_tempo") || "2.0");
            let i = 0;
            function playNext() {
                if (!majorMinorState || !majorMinorState.playback) return;
                if (i >= audioSequence.length) {
                    majorMinorState.playback.done = true;
                    renderMajorMinorChoices();
                    return;
                }
                majorMinorState.playback.playingIndex = i;
                renderMajorMinorChoices();
                const audio = createGameAudio(audioSequence[i]);
                i++;
                const gap = () => setTimeout(playNext, Math.max(160, (tempo - (audio.duration || 1.5)) * 1000));
                audio.addEventListener("ended", gap);
                safePlayAudio(audio, () => setTimeout(playNext, 500));
            }
            playNext();
        }

        function fitWordText(textElement, cardElement) {

            while (
                fontSize > minFontSize &&

        function stopChordPreview() {
            const hadActivePreview = Boolean(activeChordPreview.reference || activeChordPreview.target || audioRevealLock);
            if (hadActivePreview) {
                console.debug("[CHORD_PREVIEW]", "stop", {
                    token: activeChordPreview.token,
                    hasReference: Boolean(activeChordPreview.reference),
                    hasTarget: Boolean(activeChordPreview.target),
                    audioRevealLock
                });
            }
            audioRevealLock = false;
            if (activeChordPreview.pauseTimer) {
                clearTimeout(activeChordPreview.pauseTimer);
                activeChordPreview.pauseTimer = null;
            }
            [activeChordPreview.reference, activeChordPreview.target].forEach((audio) => {
                if (!audio) return;
                try {
                    audio.pause();
                    audio.currentTime = 0;
                } catch (_) {}
            });
            activeChordPreview.reference = null;
            activeChordPreview.target = null;
            activeChordPreview.token += 1;
        }

        function logChordPreview(event, data = {}) {
            console.debug("[CHORD_PREVIEW]", event, {
                at: Math.round(performance.now()),
                ...data
            });
        }

        function playChordPreview(cardData, index) {
            const playableChordCard = cardData && (
                cardData.card_type === "audio" ||
                (cardData.card_type === "word" && cardData.chord_label)
            );
            if (!playableChordCard) return;
            if (!cardData.audio && !(cardData.audio_sequence && cardData.audio_sequence.length)) return;
            stopChordPreview();
            audioRevealLock = true;
            const previewToken = activeChordPreview.token;
            const shouldShowChordExample = cardData.card_type === "word" && cardData.chord_example && cardData.audio_sequence && cardData.audio_sequence.length;

            if (shouldShowChordExample) {
                currentTranslationHint = null;
                translationHintGrid.style.gridTemplateColumns = "1fr";
                const exCell = document.createElement("div");
                exCell.className = "translation-col";
                const exValue = document.createElement("div");
                exValue.className = "translation-col-value";
                exValue.style.fontStyle = "italic";
                exValue.textContent = cardData.chord_example;
                exCell.appendChild(exValue);
                translationHintGrid.replaceChildren(exCell);
                translationHintLabel.textContent = "";
                translationHintContainer.classList.remove("pair-found");
                translationHintContainer.style.display = "block";
            }
            const shouldNotifyServer = cardData.card_type === "audio" || Boolean(cardData.chord_label);
            logChordPreview("start", {
                index,
                token: previewToken,
                cardType: cardData.card_type,
                pairId: cardData.pair_id,
                label: cardData.chord_label || cardData.display_word || cardData.word,
                hasReference: Boolean(cardData.reference_audio),
                hasAudio: Boolean(cardData.audio),
                sequenceLength: cardData.audio_sequence ? cardData.audio_sequence.length : 0,
                shouldNotifyServer
            });

            const markPreviewFinished = (reason = "finished") => {
                if (activeChordPreview.token !== previewToken) {
                    logChordPreview("finish_skipped_stale_token", {
                        index,
                        token: previewToken,
                        currentToken: activeChordPreview.token,
                        reason
                    });
                    return;
                }
                logChordPreview("finish", { index, token: previewToken, reason, shouldNotifyServer });
                audioRevealLock = false;
                if (shouldShowChordExample) {
                    translationHintContainer.style.display = "none";
                    translationHintGrid.replaceChildren();
                }
                updateRevealedHighlights();
                if (shouldNotifyServer) {
                    socket.emit("audio_preview_finished", {
                        index,
                        username: myName,
                        reconnect_token: getReconnectToken()
                    });
                }
            };

            const playReferenceThen = (startTarget) => {
                if (!cardData.reference_audio) {
                    logChordPreview("reference_missing_start_target", { index, token: previewToken });
                    startTarget();
                    return;
                }
                const referenceAudio = createGameAudio(cardData.reference_audio);
                activeChordPreview.reference = referenceAudio;
                logChordPreview("reference_start", { index, token: previewToken, src: cardData.reference_audio });
                const startTargetAudio = (reason = "reference_done", error = null) => {
                    if (activeChordPreview.token !== previewToken) {
                        logChordPreview("reference_done_stale_token", {
                            index,
                            token: previewToken,
                            currentToken: activeChordPreview.token,
                            reason
                        });
                        return;
                    }
                    logChordPreview("reference_done_start_target", {
                        index,
                        token: previewToken,
                        reason,
                        error: error ? String(error && (error.message || error.name || error)) : ""
                    });
                    clearTimeout(refFallbackTimer);
                    activeChordPreview.reference = null;
                    startTarget();
                };
                let refFallbackTimer = setTimeout(() => {
                    if (activeChordPreview.token === previewToken) startTargetAudio("reference_initial_fallback");
                }, 4500);
                referenceAudio.onloadedmetadata = () => {
                    clearTimeout(refFallbackTimer);
                    logChordPreview("reference_metadata", {
                        index,
                        token: previewToken,
                        duration: referenceAudio.duration || null
                    });
                    refFallbackTimer = setTimeout(() => {
                        if (activeChordPreview.token === previewToken) startTargetAudio("reference_duration_fallback");
                    }, Math.round((referenceAudio.duration || 5) * 1000) + 500);
                };
                referenceAudio.onended = () => startTargetAudio("reference_ended");
                referenceAudio.onerror = () => startTargetAudio("reference_error");
                referenceAudio.onplaying = () => logChordPreview("reference_playing", { index, token: previewToken });
                safePlayAudio(referenceAudio, (error) => startTargetAudio("reference_safePlay_failure", error));
            };

            // Chord progression: play sequence of chords one after another
            if (cardData.audio_sequence && cardData.audio_sequence.length) {
                const chordMs = Math.round((parseFloat(localStorage.getItem("chord_progression_tempo") || "2.5")) * 1000);
                const playNext = (pos) => {
                    if (activeChordPreview.token !== previewToken) {
                        logChordPreview("sequence_skip_stale_token", {
                            index,
                            token: previewToken,
                            currentToken: activeChordPreview.token,
                            pos
                        });
                        return;
                    }
                    if (pos >= cardData.audio_sequence.length) { markPreviewFinished("sequence_complete"); return; }
                    const audio = createGameAudio(cardData.audio_sequence[pos]);
                    activeChordPreview.target = audio;
                    logChordPreview("sequence_target_start", { index, token: previewToken, pos, src: cardData.audio_sequence[pos] });
                    let advanced = false;
                    const advance = (reason = "sequence_target_done", error = null) => {
                        if (advanced || activeChordPreview.token !== previewToken) {
                            if (activeChordPreview.token !== previewToken) {
                                logChordPreview("sequence_target_done_stale_token", {
                                    index,
                                    token: previewToken,
                                    currentToken: activeChordPreview.token,
                                    pos,
                                    reason
                                });
                            }
                            return;
                        }
                        advanced = true;
                        clearTimeout(fallbackTimer);
                        activeChordPreview.target = null;
                        logChordPreview("sequence_target_done", {
                            index,
                            token: previewToken,
                            pos,
                            reason,
                            error: error ? String(error && (error.message || error.name || error)) : ""
                        });
                        playNext(pos + 1);
                    };
                    const fallbackTimer = setTimeout(() => advance("sequence_target_fallback"), chordMs + 500);
                    audio.onended = () => advance("sequence_target_ended");
                    audio.onerror = () => advance("sequence_target_error");
                    audio.onplaying = () => logChordPreview("sequence_target_playing", { index, token: previewToken, pos });
                    safePlayAudio(audio, (error) => advance("sequence_target_safePlay_failure", error));
                };
                playReferenceThen(() => playNext(0));
                return;
            }

            // Preload target immediately so it's ready when reference ends
            const targetAudio = createGameAudio(cardData.audio);
            activeChordPreview.target = targetAudio;
            let targetFallbackTimer = null;
            const finishTarget = (reason = "single_target_done", error = null) => {
                clearTimeout(targetFallbackTimer);
                if (activeChordPreview.token === previewToken) {
                    activeChordPreview.target = null;
                    logChordPreview("single_target_done", {
                        index,
                        token: previewToken,
                        reason,
                        error: error ? String(error && (error.message || error.name || error)) : ""
                    });
                    markPreviewFinished(reason);
                } else {
                    logChordPreview("single_target_done_stale_token", {
                        index,
                        token: previewToken,
                        currentToken: activeChordPreview.token,
                        reason
                    });
                }
            };
            targetAudio.onloadedmetadata = () => {
                if (targetFallbackTimer !== null) {
                    clearTimeout(targetFallbackTimer);
                    logChordPreview("single_target_metadata", {
                        index,
                        token: previewToken,
                        duration: targetAudio.duration || null
                    });
                    targetFallbackTimer = setTimeout(
                        () => finishTarget("single_target_duration_fallback"),
                        Math.round((targetAudio.duration || 5) * 1000) + 500
                    );
                }
            };
            targetAudio.onended = () => finishTarget("single_target_ended");
            targetAudio.onerror = () => finishTarget("single_target_error");
            targetAudio.onplaying = () => logChordPreview("single_target_playing", { index, token: previewToken });

            let targetStarted = false;
            const startTargetAudio = () => {
                if (targetStarted || activeChordPreview.token !== previewToken) {
                    logChordPreview("single_target_start_skipped", {
                        index,
                        token: previewToken,
                        currentToken: activeChordPreview.token,
                        targetStarted
                    });
                    return;
                }
                targetStarted = true;
                activeChordPreview.reference = null;
                targetFallbackTimer = setTimeout(() => finishTarget("single_target_initial_fallback"), 4500);
                logChordPreview("single_target_start", { index, token: previewToken, src: cardData.audio });
                safePlayAudio(targetAudio, (error) => finishTarget("single_target_safePlay_failure", error));
            };

            playReferenceThen(startTargetAudio);
        }

        function updateRevealedHighlights() {
            document.querySelectorAll(".card.revealed-first, .card.revealed-second, .card.revealed-audio-pending").forEach((element) => {
                element.classList.remove("revealed-first", "revealed-second", "revealed-audio-pending");
            });
            revealedOrder.forEach((index, orderIndex) => {
                const cardElement = document.getElementById(`card-${index}`);
                if (!cardElement) return;
                if (audioRevealLock && cards[index] && (cards[index].card_type === "audio" || (cards[index].card_type === "word" && cards[index].chord_label))) {
                    cardElement.classList.add("revealed-audio-pending");
                } else if (orderIndex === 0) {
                    cardElement.classList.add("revealed-first");
                } else if (orderIndex === 1) {
                    cardElement.classList.add("revealed-second");
                }
            });
        }

        function revealCardElement(cardElement, cardData) {
            if (!cardElement || !cardData) return;
            cardElement.classList.remove("hidden", "removed", "matched-highlight", "revealed-first", "revealed-second", "revealed-audio-pending");
            cardElement.replaceChildren();
            cardElement.style.backgroundImage = "none";
            cardElement.classList.toggle("word-card", cardData.card_type === "word");
            cardElement.classList.toggle("audio-card", cardData.card_type === "audio");
            if (cardData.card_type === "word") {
                const text = document.createElement("div");
                text.className = "card-word-text";
                text.textContent = cardData.text || cardData.word || "";
                cardElement.appendChild(text);
                fitWordText(text, cardElement);
                return;
            }
            if (cardData.card_type === "audio") {
                const icon = document.createElement("div");
                icon.className = "card-audio-icon";
                icon.textContent = "♪";
                cardElement.appendChild(icon);
                return;

        function getImagePairTrackerEntries() {
            const pairs = new Map();
            (imagePairTrackerEntries || []).forEach((entry) => {
                if (!entry) return;
                let key = entry.key || null;
                if (entry.pair_id != null) {
                    key = `pair-${entry.pair_id}`;
                } else if (key != null && /^\d+$/.test(String(key))) {
                    key = `pair-${key}`;
                }
                const label = entry.label || "";
                const indices = Array.isArray(entry.indices) ? [...entry.indices] : [];
                if (!key || !label) return;
                pairs.set(key, { key, label, indices });
            });
            cards.forEach((card, index) => {
                if (!card) return;
                const key = card.pair_id != null
                    ? `pair-${card.pair_id}`
                    : `word-${String(card.display_word || card.native_word || card.target_word || card.word || index).toLowerCase()}`;
                if (!pairs.has(key)) {
                    pairs.set(key, {
                        key,
                        label: card.display_word || card.native_word || card.target_word || card.word || "",
                        indices: []
                    });
                }
                const entry = pairs.get(key);
                const betterLabel = card.display_word || card.native_word || entry.label || card.target_word || card.word || "";
                if (betterLabel) entry.label = betterLabel;
                if (!entry.indices.includes(index)) entry.indices.push(index);
            });
            return Array.from(pairs.values()).filter((entry) => entry.label);
        }

        function getImagePairLabelForIndices(indices, fallback = "") {
            const indexSet = new Set(Array.isArray(indices) ? indices : []);
            const matchingEntry = getImagePairTrackerEntries().find((entry) =>
                Array.isArray(entry.indices) && entry.indices.some((index) => indexSet.has(index))
            );
            return (matchingEntry && matchingEntry.label) || fallback || "";
        }

        let activeTrackerPreview = null;
        function playTrackerPreview(cardData) {
            if (!cardData || cardData.card_type !== "audio") return;
            if (activeTrackerPreview) { try { activeTrackerPreview.pause(); } catch (_) {} activeTrackerPreview = null; }
            const playReferenceThen = (startTarget) => {
                if (!cardData.reference_audio) {
                    startTarget();
                    return;
                }
                const referenceAudio = createGameAudio(cardData.reference_audio);
                activeTrackerPreview = referenceAudio;
                let refDone = false;
                let refFallback = null;
                const startAfterReference = () => {
                    if (refDone) return;
                    refDone = true;
                    clearTimeout(refFallback);
                    activeTrackerPreview = null;
                    startTarget();
                };
                refFallback = setTimeout(startAfterReference, 4500);
                referenceAudio.onloadedmetadata = () => {
                    clearTimeout(refFallback);
                    setTimeout(startAfterReference, Math.round((referenceAudio.duration || 5) * 1000) + 500);
                };
                referenceAudio.onended = startAfterReference;
                referenceAudio.onerror = startAfterReference;
                safePlayAudio(referenceAudio, startAfterReference);
            };
            if (cardData.audio_sequence && cardData.audio_sequence.length) {
                const chordMs = Math.round((parseFloat(localStorage.getItem("chord_progression_tempo") || "2.5")) * 1000);
                let stopped = false;
                const playNext = (pos) => {
                    if (stopped || pos >= cardData.audio_sequence.length) return;
                    const audio = createGameAudio(cardData.audio_sequence[pos]);
                    activeTrackerPreview = audio;
                    let advanced = false;
                    const advance = () => {
                        if (advanced) return; advanced = true;
                        clearTimeout(ft);
                        activeTrackerPreview = null;
                        playNext(pos + 1);
                    };
                    const ft = setTimeout(advance, chordMs + 500);
                    audio.onended = advance;
                    audio.onerror = advance;
                    safePlayAudio(audio, advance);
                };
                playReferenceThen(() => playNext(0));
            } else if (cardData.audio) {
                playReferenceThen(() => {
                    const audio = createGameAudio(cardData.audio);
                    activeTrackerPreview = audio;
                    audio.onended = () => { activeTrackerPreview = null; };
                    safePlayAudio(audio, () => { activeTrackerPreview = null; });
                });
            }
        }

        function renderImagePairTracker() {

            imagePairTrackerLabel.textContent = t("image_pair_tracker_label");
            const entries = getImagePairTrackerEntries()
                .filter((e) => !removedPairKeys.has(e.key))
                .sort((a, b) => nashvilleSortOrder(a) - nashvilleSortOrder(b));
            if (!entries.length) {
                imagePairTracker.style.display = "none";
                imagePairTrackerList.replaceChildren();
                return;
            }
            const isChordMode = window.currentCardMode === "chords" || window.currentCardMode === "same_chords";
            const isMyTurn = isSoloMode || currentTurn === myName;
            const canPreview = isChordMode && isMyTurn && (isSoloMode || !trackerPreviewUsedThisTurn);
            const chips = entries.map((entry) => {
                const found = entry.indices.length > 0 && entry.indices.every((index) => matched.has(index));
                const clickable = canPreview && !found;
                const item = document.createElement(isChordMode && !found ? "button" : "div");
                item.className = found ? "image-pair-chip found" : "image-pair-chip";
                if (isChordMode && !found) {
                    item.type = "button";
                    item.disabled = !clickable;
                }
                item.textContent = nashvilleChipLabel(entry);
                if (clickable) {
                    item.addEventListener("click", () => {
                        if (!isSoloMode && trackerPreviewUsedThisTurn) return;
                        const audioCard = entry.indices.map(i => cards[i]).find(c => c && c.card_type === "audio");
                        if (!audioCard) return;
                        if (!isSoloMode) trackerPreviewUsedThisTurn = true;
                        renderImagePairTracker();
                        playTrackerPreview(audioCard);
                        if (!isSoloMode) socket.emit("tracker_preview", { label: nashvilleChipLabel(entry) });
                    });
                }
                if (found && !scheduledPairRemovalKeys.has(entry.key)) {
                    scheduledPairRemovalKeys.add(entry.key);
                    setTimeout(() => {
                        removedPairKeys.add(entry.key);
                        renderImagePairTracker();

                return item;

            imagePairTrackerList.replaceChildren(...chips);

        const GOMOKU_CELL = 32;
        const GOMOKU_MARGIN = 20;

        function gomokuBoardSize(size) {
            return GOMOKU_MARGIN * 2 + size * GOMOKU_CELL;
        }

        function syncGomokuBoardLayout() {
            const board = document.getElementById("gomoku-board");
            if (!board) return;
            const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
            const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
            const topbar = document.querySelector(".game-topbar");
            const footer = document.querySelector(".footer-credit");
            const topbarHeight = topbar ? topbar.getBoundingClientRect().height : 0;
            const footerHeight = footer ? footer.getBoundingClientRect().height : 0;
            const horizontalRoom = Math.max(280, viewportWidth - 8);
            const verticalRoom = Math.max(280, viewportHeight - topbarHeight - footerHeight - 18);
            const target = Math.floor(Math.min(horizontalRoom, verticalRoom, 1040));
            board.style.setProperty("--gomoku-board-css-size", `${target}px`);
        }

        function gomokuXY(idx, size) {
            const row = Math.floor(idx / size);
            const col = idx % size;
            return [
                GOMOKU_MARGIN + col * GOMOKU_CELL + GOMOKU_CELL / 2,
                GOMOKU_MARGIN + row * GOMOKU_CELL + GOMOKU_CELL / 2
            ];
        }

        function gomokuStarPoints(size) {
            if (size === 13) return [3, 6, 9];
            return [3, 9, 15];
        }

        function centerGomokuView(animated = true) {
            const wrap = document.getElementById("gomoku-wrap");
            if (!wrap || !gomokuState) return;
            const size = gomokuState.size || 19;
            const wh = gomokuState.whiteHistory || [];
            const bh = gomokuState.blackHistory || [];
            const lastW = wh.length > 0 ? wh[wh.length - 1] : -1;
            const lastB = bh.length > 0 ? bh[bh.length - 1] : -1;
            const targets = [lastW, lastB].filter((idx) => Number.isInteger(idx) && idx >= 0);
            if (!targets.length) return;

            let focusRow = Math.floor(targets[0] / size);
            let focusCol = targets[0] % size;
            if (targets.length === 2) {
                focusRow = Math.round((Math.floor(targets[0] / size) + Math.floor(targets[1] / size)) / 2);
                focusCol = Math.round(((targets[0] % size) + (targets[1] % size)) / 2);
            }

            const [x, y] = gomokuXY(focusRow * size + focusCol, size);
            const board = document.getElementById("gomoku-board");
            const logicalDim = gomokuBoardSize(size);
            const boardRect = board ? board.getBoundingClientRect() : null;
            const scale = boardRect && logicalDim ? boardRect.width / logicalDim : 1;
            const left = Math.max(0, x * scale - wrap.clientWidth / 2);
            const top = Math.max(0, y * scale - wrap.clientHeight / 2);
            wrap.scrollTo({
                left,
                top,
                behavior: animated ? "smooth" : "auto"
            });
        }

        function drawGomokuBoard() {
            const g = gomokuState;
            if (!g) return;
            syncGomokuBoardLayout();
            const now = (typeof performance !== "undefined" && typeof performance.now === "function")
                ? performance.now()
                : Date.now();
            const size = g.size;
            const dim = gomokuBoardSize(size);
            const svg = document.getElementById("gomoku-board");
            svg.setAttribute("width", dim);
            svg.setAttribute("height", dim);
            svg.setAttribute("viewBox", `0 0 ${dim} ${dim}`);
            const renderStone = (idx, color, options = {}) => {
                const [x, y] = gomokuXY(idx, size);
                const isWhite = color === "white";
                const radius = options.radius != null ? options.radius : 13;
                const opacity = options.opacity != null ? options.opacity : 1;
                const strokeWidth = options.strokeWidth != null ? options.strokeWidth : 1.5;
                const extraClass = options.extraClass || "";
                const win = Boolean(options.win);
                const baseFill = isWhite ? "url(#gomoku-white-stone)" : "url(#gomoku-black-stone)";
                const stroke = isWhite ? "#7e7f78" : "#323631";
                const lowerMassFill = isWhite ? "#7f837b" : "#090b09";
                const sideShadeFill = isWhite ? "#9da299" : "#101410";
                const rimGlowFill = isWhite ? "#fffdf6" : "#879187";
                const specularFill = isWhite ? "#fffefb" : "#cbd5c8";
                html += `<ellipse cx="${x + radius * 0.08}" cy="${y + radius * 0.98}" rx="${radius * 1.02}" ry="${radius * 0.34}" fill="#241407" opacity="${opacity * (isWhite ? 0.34 : 0.48)}"/>`;
                html += `<ellipse cx="${x + radius * 0.2}" cy="${y + radius * 0.82}" rx="${radius * 0.72}" ry="${radius * 0.22}" fill="#000000" opacity="${opacity * (isWhite ? 0.16 : 0.28)}"/>`;
                html += `<circle cx="${x}" cy="${y}" r="${radius}" fill="${baseFill}" stroke="${stroke}" stroke-width="${strokeWidth}" opacity="${opacity}" class="gomoku-stone${win ? ' gomoku-win-stone' : ''}${extraClass ? ` ${extraClass}` : ''}"/>`;
                html += `<ellipse cx="${x + radius * 0.08}" cy="${y + radius * 0.3}" rx="${radius * 0.78}" ry="${radius * 0.55}" fill="${lowerMassFill}" opacity="${opacity * (isWhite ? 0.16 : 0.26)}"/>`;
                html += `<ellipse cx="${x + radius * 0.28}" cy="${y + radius * 0.16}" rx="${radius * 0.56}" ry="${radius * 0.48}" fill="${sideShadeFill}" opacity="${opacity * (isWhite ? 0.18 : 0.3)}"/>`;
                html += `<path d="M ${x - radius * 0.58} ${y + radius * 0.08} C ${x - radius * 0.22} ${y + radius * 0.36}, ${x + radius * 0.26} ${y + radius * 0.42}, ${x + radius * 0.58} ${y + radius * 0.1}" fill="none" stroke="${isWhite ? '#6f756d' : '#050605'}" stroke-width="${radius * 0.12}" stroke-linecap="round" opacity="${opacity * (isWhite ? 0.2 : 0.26)}"/>`;
                html += `<ellipse cx="${x - radius * 0.25}" cy="${y - radius * 0.42}" rx="${radius * 0.42}" ry="${radius * 0.23}" fill="${rimGlowFill}" opacity="${opacity * (isWhite ? 0.44 : 0.18)}"/>`;
                html += `<ellipse cx="${x - radius * 0.4}" cy="${y - radius * 0.48}" rx="${radius * 0.17}" ry="${radius * 0.1}" fill="${specularFill}" opacity="${opacity * (isWhite ? 0.95 : 0.52)}"/>`;
                html += `<ellipse cx="${x - radius * 0.08}" cy="${y - radius * 0.15}" rx="${radius * 0.78}" ry="${radius * 0.72}" fill="none" stroke="${isWhite ? '#ffffff' : '#5e675e'}" stroke-width="${radius * 0.08}" stroke-opacity="${opacity * (isWhite ? 0.24 : 0.14)}"/>`;
                return { x, y, isWhite, opacity };
            };
            const renderHiddenMarker = (idx, progress = 1) => {
                const [x, y] = gomokuXY(idx, size);
                const eased = Math.max(0, Math.min(1, progress));
                const baseOpacity = 0.9 * eased;
                const radius = 12.1 - 0.45 * (1 - eased);
                html += `<ellipse cx="${x + radius * 0.1}" cy="${y + radius * 0.96}" rx="${radius * 1.0}" ry="${radius * 0.32}" fill="#151915" opacity="${0.38 * eased}"/>`;
                html += `<circle cx="${x}" cy="${y}" r="${radius}" fill="url(#gomoku-hidden-marble)" stroke="#424942" stroke-width="1.35" opacity="${baseOpacity}"/>`;
                html += `<ellipse cx="${x + radius * 0.08}" cy="${y + radius * 0.26}" rx="${radius * 0.82}" ry="${radius * 0.56}" fill="#3f4741" opacity="${0.25 * eased}"/>`;
                html += `<ellipse cx="${x + radius * 0.22}" cy="${y + radius * 0.18}" rx="${radius * 0.62}" ry="${radius * 0.44}" fill="#303831" opacity="${0.18 * eased}"/>`;

                html += `<path d="M ${x - radius * 0.45} ${y + radius * 0.24} C ${x - radius * 0.18} ${y + radius * 0.04}, ${x + radius * 0.1} ${y + radius * 0.31}, ${x + radius * 0.52} ${y + radius * 0.1}" fill="none" stroke="#2d332f" stroke-width="${radius * 0.1}" stroke-linecap="round" opacity="${0.32 * eased}"/>`;

                html += `<ellipse cx="${x - radius * 0.25}" cy="${y - radius * 0.43}" rx="${radius * 0.4}" ry="${radius * 0.22}" fill="#f1f4ee" opacity="${0.28 * eased}"/>`;

            };
            const mixColor = (from, to, progress) => {
                const t = Math.max(0, Math.min(1, progress));

            const boardInset = 12;
            const boardSize = dim - boardInset * 2;
            const boardRadius = 11;
            const woodBands = [
                { y: boardInset + boardSize * 0.10, drift: -18, width: 18, color: "#6f3c19", opacity: 0.24, highlight: "#e2ad64" },
                { y: boardInset + boardSize * 0.22, drift: 15, width: 16, color: "#a46328", opacity: 0.2, highlight: "#f0c27c" },
                { y: boardInset + boardSize * 0.35, drift: -12, width: 24, color: "#754018", opacity: 0.22, highlight: "#d89a51" },
                { y: boardInset + boardSize * 0.50, drift: 17, width: 20, color: "#b06d2e", opacity: 0.18, highlight: "#edc487" },
                { y: boardInset + boardSize * 0.64, drift: -14, width: 21, color: "#6b3915", opacity: 0.21, highlight: "#dba35d" },
                { y: boardInset + boardSize * 0.78, drift: 11, width: 17, color: "#9b5b25", opacity: 0.2, highlight: "#f2ce96" },
                { y: boardInset + boardSize * 0.90, drift: -16, width: 20, color: "#71401c", opacity: 0.23, highlight: "#d39a58" },
