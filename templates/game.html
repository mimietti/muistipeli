<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Memory Game - Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        h1 {
            display: none;
        }
        .game-topbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: min(960px, calc(100% - 18px));
            margin: 4px auto 6px;
            flex-wrap: wrap;
        }
        #players {
            font-size: 14px;
            line-height: 1.2;
        }
        #roundActions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .round-action-btn {
            border: none;
            border-radius: 999px;
            padding: 9px 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.18s ease, transform 0.18s ease;
        }
        .round-action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .round-action-btn.surrender {
            background: #7b2b2b;
            color: #fff6f6;
        }
        .round-action-btn.exit {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .active {
            color: limegreen;
        }
        #grid {
            display: grid;
            width: min(calc(100vw - 18px), 720px);
            margin: 0 auto;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            justify-content: center;
            padding: 8px 8px 8px;
            box-sizing: border-box;
        }
        #translation-hint {
            max-width: 820px;
            margin: 2px auto 8px;
            padding: 8px 10px;
            display: none;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            transition: border-color 0.3s, background 0.3s;
        }
        #translation-hint.pair-found {
            background: rgba(71, 212, 92, 0.08);
            border-color: rgba(71, 212, 92, 0.4);
        }
        #translation-hint-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #7cf58a;
            margin-bottom: 8px;
            display: none;
        }
        #translation-hint.pair-found #translation-hint-label {
            display: block;
        }
        #translation-hint-grid {
            display: grid;
            gap: 8px;
        }
        .translation-col {
            min-width: 0;
            padding: 7px 9px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
        }
        .translation-col-label {
            color: #fff2a8;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .translation-col-value {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }
        @media (max-width: 1180px) {
            #grid {
                width: min(calc(100vw - 16px), 700px);
                gap: 15px;
                padding: 12px 7px 10px;
            }
            .card {
                border-radius: 10px;
            }
            #translation-hint {
                max-width: 640px;
                padding: 9px 10px;
            }
            .translation-col {
                padding: 7px 8px;
            }
            .translation-col-value {
                font-size: 20px;
            }
        }
        @media (max-width: 1024px) and (orientation: portrait) {
            #players {
                font-size: 13px;
            }
            .game-topbar {
                gap: 10px;
                width: min(100%, calc(100vw - 8px));
                margin: 2px auto 6px;
            }
            #grid {
                width: min(calc(100vw - 8px), 760px);
                gap: 18px 16px;
                padding: 8px 4px 8px;
            }
            .card {
                border-radius: 12px;
                border-width: 3px;
            }
            .card-word-text {
                padding: 10px;
            }
            #translation-hint {
                max-width: calc(100vw - 12px);
                margin: 0 auto 10px;
                padding: 8px 10px;
            }
            .translation-col-value {
                font-size: 18px;
            }
        }
        @media (max-width: 820px) {
            #translation-hint {
                max-width: calc(100% - 28px);
            }
            .translation-col-value {
                font-size: 16px;
            }
        }
        #theme-progress {
            display: none;
            max-width: 760px;
            margin: 8px auto 12px;
            padding: 0 20px;
            color: #bfc7cf;
            font-size: 13px;
            line-height: 1.7;
        }
        #theme-progress strong {
            color: #fff;
            font-size: 13px;
            margin-right: 8px;
        }
        #theme-progress-list {
            display: inline;
        }
        #image-pair-tracker {
            display: none;
            max-width: 860px;
            margin: 0 auto 12px;
            padding: 0 14px;
            box-sizing: border-box;
        }
        #image-pair-tracker-label {
            color: #fff2a8;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        #image-pair-tracker-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .image-pair-chip {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f4f4f4;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.1;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }
        .image-pair-chip.found {
            background: rgba(113, 240, 161, 0.14);
            border-color: rgba(113, 240, 161, 0.8);
            color: #b7ffca;
            box-shadow: 0 0 0 2px rgba(113, 240, 161, 0.28);
        }
        .card {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #444;
            border: 2px solid #111;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-sizing: border-box;
        }
        .card.word-card {
            background: linear-gradient(160deg, #1f3528, #122018);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card.audio-card {
            background:
                radial-gradient(circle at top, rgba(255, 233, 176, 0.12), transparent 48%),
                linear-gradient(160deg, #2b2237, #171223);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-word-text {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            color: #fff;
            font-weight: 700;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
        }
        .card-audio-icon {
            font-size: clamp(42px, 6vw, 64px);
            line-height: 1;
            color: #fff2c9;
            text-shadow: 0 0 18px rgba(255, 211, 97, 0.22);
            transform: translateY(-2px);
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card.matched-highlight {
            box-shadow: 0 0 0 5px rgba(113, 240, 161, 0.98), 0 0 28px rgba(113, 240, 161, 0.6);
            transform: scale(1.03);
        }
        .card.revealed-first {
            box-shadow: 0 0 0 4px rgba(255, 216, 92, 0.98), 0 0 18px rgba(255, 216, 92, 0.32);
            outline: 2px solid rgba(255, 216, 92, 0.92);
            outline-offset: -2px;
        }
        .card.revealed-audio-pending {
            box-shadow: 0 0 0 4px rgba(255, 216, 92, 0.98), 0 0 18px rgba(255, 216, 92, 0.32);
            outline: 2px solid rgba(255, 216, 92, 0.92);
            outline-offset: -2px;
        }
        .card.revealed-second {
            box-shadow: 0 0 0 4px rgba(255, 102, 102, 0.98), 0 0 18px rgba(255, 102, 102, 0.32);
            outline: 2px solid rgba(255, 102, 102, 0.92);
            outline-offset: -2px;
        }
        .card.removed {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: none;
            box-shadow: none;
        }
        .hidden {
            background-image: none !important;
        }
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 18px;
            border: 1px solid #2ecc71;
            z-index: 9999;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
            display: none;
        }
        #results {
            width: min(760px, calc(100% - 32px));
            margin: 24px auto 0;
            padding: 28px 24px 30px;
            color: #f3f1c7;
            font-size: 24px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(120, 214, 146, 0.12), transparent 45%),
                linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        .results-section {
            margin-bottom: 20px;
        }
        .results-heading {
            color: #fff4a8;
            font-size: 28px;
            font-weight: 700;
        }
        .results-subheading {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }
        .results-cta {
            color: white;
            font-size: 20px;
            margin-bottom: 16px;
        }
        .results-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .results-btn {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease, background-color 0.18s ease;
        }
        .results-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .results-btn.mode {
            background-color: limegreen;
            color: #0c150e;
        }
        .results-btn.end {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .footer-credit {
            margin: 8px 0 16px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
        #solo-stats {
            display: none;
            justify-content: center;
            gap: 16px;
            margin: 0;
            font-size: 15px;
            color: #b0c8b0;
        }
        #solo-stats.active { display: flex; }
        .solo-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .solo-stat-label {
            color: #7a9e7a;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .solo-stat-value {
            font-weight: 700;
            font-size: 17px;
            color: #e8f5e8;
        }
        body {
            --bg-top: #11151a;
            --bg-bottom: #090c10;
            --bg-glow: rgba(122, 184, 245, 0.08);
            --text-main: #f4f7fb;
            --text-muted: #c8d2db;
            --text-soft: #9aa9b7;
            --heading-color: #fff1bb;
            --panel-bg: rgba(255,255,255,0.05);
            --panel-border: rgba(255,255,255,0.08);
            --control-bg: rgba(255,255,255,0.06);
            --control-border: rgba(255,255,255,0.12);
            --control-text: #d9e3ee;
            --accent: #8fd5ee;
            --accent-strong: #5baaca;
            --accent-soft: rgba(143, 213, 238, 0.16);
            --accent-text: #071820;
            --danger: #9a4141;
            --danger-text: #fff6f6;
            --success-ring: rgba(113, 240, 161, 0.98);
            --warning-ring: rgba(255, 216, 92, 0.98);
            --error-ring: rgba(255, 102, 102, 0.98);
            --card-back: #414d58;
            --word-card: linear-gradient(160deg, #203747, #121e28);
            --font-body: "Trebuchet MS", "Segoe UI", sans-serif;
            --font-display: "Georgia", "Times New Roman", serif;
            background:
                radial-gradient(circle at top, var(--bg-glow), transparent 38%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
        }
        body[data-ui-style="cozy"] {
            --bg-top: #241710;
            --bg-bottom: #110c08;
            --bg-glow: rgba(245, 186, 116, 0.16);
            --text-main: #fff4e8;
            --text-muted: #e8d4c0;
            --text-soft: #c2a690;
            --heading-color: #ffe1b4;
            --panel-bg: rgba(71, 41, 24, 0.58);
            --panel-border: rgba(255, 214, 156, 0.15);
            --control-bg: rgba(255, 250, 239, 0.07);
            --control-border: rgba(255, 214, 156, 0.18);
            --control-text: #f8e8d5;
            --accent: #f2ba74;
            --accent-strong: #de8d47;
            --accent-soft: rgba(242, 186, 116, 0.18);
            --accent-text: #2a1708;
            --danger: #8c3b3b;
            --card-back: #655244;
            --word-card: linear-gradient(160deg, #5a3e29, #2b1c12);
            --font-body: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
            --font-display: "Palatino Linotype", "Book Antiqua", serif;
        }
        body[data-ui-style="cabinet"] {
            --bg-top: #171311;
            --bg-bottom: #090707;
            --bg-glow: rgba(203, 160, 92, 0.13);
            --text-main: #f1e8db;
            --text-muted: #d8c6b1;
            --text-soft: #ab9885;
            --heading-color: #f0ddb5;
            --panel-bg: rgba(39, 28, 22, 0.66);
            --panel-border: rgba(214, 182, 122, 0.15);
            --control-bg: rgba(255, 248, 235, 0.05);
            --control-border: rgba(214, 182, 122, 0.18);
            --control-text: #e7ddcf;
            --accent: #d9b36f;
            --accent-strong: #b67d36;
            --accent-soft: rgba(217, 179, 111, 0.18);
            --accent-text: #24170a;
            --danger: #7a3b32;
            --card-back: #5a4639;
            --word-card: linear-gradient(160deg, #4a392b, #221911);
            --font-body: "Book Antiqua", "Palatino Linotype", serif;
            --font-display: "Georgia", "Times New Roman", serif;
        }
        body[data-ui-style="minimal"] {
            --bg-top: #0d1116;
            --bg-bottom: #06080b;
            --bg-glow: rgba(184, 197, 214, 0.1);
            --text-main: #eef4f8;
            --text-muted: #c4d1da;
            --text-soft: #92a3af;
            --heading-color: #f5f8fb;
            --panel-bg: rgba(255,255,255,0.035);
            --panel-border: rgba(165, 193, 210, 0.12);
            --control-bg: rgba(255,255,255,0.04);
            --control-border: rgba(165, 193, 210, 0.16);
            --control-text: #dce7ee;
            --accent: #b6c5d6;
            --accent-strong: #8498ae;
            --accent-soft: rgba(182, 197, 214, 0.16);
            --accent-text: #101923;
            --danger: #7a4b4b;
            --card-back: #39444f;
            --word-card: linear-gradient(160deg, #29323a, #151b20);
            --font-body: "Verdana", "Geneva", sans-serif;
            --font-display: "Trebuchet MS", "Gill Sans", sans-serif;
        }
        h1 {
            color: var(--heading-color);
            font-family: var(--font-display);
            letter-spacing: 0.03em;
        }
        #players,
        #setup-status,
        #theme-progress,
        .footer-credit,
        .results-cta,
        .results-subheading,
        #solo-stats {
            color: var(--text-muted);
        }
        .translation-col,
        #translation-hint,
        .image-pair-chip,
        #results,
        .settings-panel {
            background: var(--panel-bg);
            border-color: var(--panel-border);
        }
        .translation-col-label,
        #image-pair-tracker-label,
        .results-heading {
            color: var(--heading-color);
        }
        .image-pair-chip.found,
        .settings-chip.active {
            background: var(--accent-soft);
            border-color: rgba(255,255,255,0.14);
            color: var(--accent);
            box-shadow: none;
        }
        .card {
            background-color: var(--card-back);
            border-color: rgba(0,0,0,0.24);
        }
        .card.word-card {
            background: var(--word-card);
            border-color: var(--panel-border);
        }
        .card.matched-highlight {
            box-shadow: 0 0 0 5px var(--success-ring), 0 0 28px rgba(113, 240, 161, 0.45);
        }
        .card.revealed-first {
            box-shadow: 0 0 0 4px var(--warning-ring), 0 0 18px rgba(255, 216, 92, 0.28);
        }
        .card.revealed-audio-pending {
            box-shadow: 0 0 0 4px var(--warning-ring), 0 0 18px rgba(255, 216, 92, 0.28);
        }
        .card.revealed-second {
            box-shadow: 0 0 0 4px var(--error-ring), 0 0 18px rgba(255, 102, 102, 0.28);
        }
        .round-action-btn.exit,
        .results-btn.end,
        .settings-close-btn,
        .settings-chip,
        .settings-select,
        .topbar-btn {
            background: var(--control-bg);
            color: var(--control-text);
            border: 1px solid var(--control-border);
        }
        .round-action-btn.surrender {
            background: var(--danger);
            color: var(--danger-text);
        }
        .results-btn.mode {
            background: linear-gradient(180deg, var(--accent), var(--accent-strong));
            color: var(--accent-text);
        }
        #toast {
            border-color: var(--accent);
        }
        .solo-stat-label {
            color: var(--text-soft);
        }
        .solo-stat-value {
            color: var(--text-main);
        }
        .topbar {
            display: flex;
            justify-content: flex-end;
            width: min(960px, calc(100% - 24px));
            margin: 16px auto 0;
        }
        .topbar-btn,
        .settings-close-btn {
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .settings-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.16s ease;
            z-index: 1000;
        }
        .settings-modal.is-open {
            opacity: 1;
            pointer-events: auto;
        }
        .settings-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(4, 8, 10, 0.62);
            backdrop-filter: blur(8px);
        }
        .settings-panel {
            position: relative;
            width: min(560px, calc(100vw - 28px));
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.36);
            text-align: left;
        }
        .settings-panel-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 18px;
        }
        #settingsEyebrow {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-soft);
            margin-bottom: 6px;
        }
        #settingsTitle {
            margin: 0;
            font-size: 30px;
            color: var(--heading-color);
        }
        #settingsSubtitle {
            margin: 8px 0 0;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .settings-group {
            margin-top: 18px;
        }
        .settings-group-label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-soft);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .settings-choice-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .settings-chip {
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .settings-select {
            width: 100%;
            max-width: 260px;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 15px;
        }
        .settings-select option {
            background: #1a1a1a;
            color: #fff;
        }
        body.settings-open {
            overflow: hidden;
        }
        body[data-ui-motion="reduced"] *,
        body[data-ui-motion="reduced"] *::before,
        body[data-ui-motion="reduced"] *::after {
            animation: none !important;
            transition: none !important;
            scroll-behavior: auto !important;
        }
        #gomoku-wrap { user-select: none; }
        #gomoku-board { display: block; margin: 0 auto; cursor: pointer; }
        .gomoku-click { fill: rgba(0, 0, 0, 0.001); pointer-events: all; }
        .gomoku-stone { transition: opacity 0.2s; }
        .gomoku-win-stone { filter: drop-shadow(0 0 6px gold); }
    </style>
</head>
<body>
    <div class="topbar">
        <button id="settingsBtn" class="topbar-btn" type="button">Settings</button>
    </div>
    <div id="settingsModal" class="settings-modal" aria-hidden="true">
        <div class="settings-backdrop" data-close-settings></div>
        <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="settings-panel-head">
                <div>
                    <div id="settingsEyebrow">Personal settings</div>
                    <h2 id="settingsTitle">Settings</h2>
                    <p id="settingsSubtitle"></p>
                </div>
                <button id="settingsCloseBtn" class="settings-close-btn" type="button">Close</button>
            </div>
            <div class="settings-group">

        const UI_LANGS = ["en","fi","sv","de","fr","es","it","pt"];

            easy:   { en: "Forgetful",  fi: "Hajamielinen", sv: "Lätt",        de: "Leicht",      fr: "Facile",        es: "Fácil",       it: "Facile",      pt: "Fácil" },

        };
        const UI_STYLE_OPTIONS = ["classic", "cozy", "cabinet", "minimal"];
        const UI_MOTION_OPTIONS = ["normal", "reduced"];

        function getUiStyle() {
            const stored = localStorage.getItem("ui_style");
            return UI_STYLE_OPTIONS.includes(stored) ? stored : "classic";
        }

        function setUiStyle(style) {
            const next = UI_STYLE_OPTIONS.includes(style) ? style : "classic";
            localStorage.setItem("ui_style", next);
            document.body.dataset.uiStyle = next;
            syncSettingsControls();
            return next;
        }

        function getUiMotion() {
            const stored = localStorage.getItem("ui_motion");
            return UI_MOTION_OPTIONS.includes(stored) ? stored : "normal";
        }

        function setUiMotion(mode) {
            const next = UI_MOTION_OPTIONS.includes(mode) ? mode : "normal";
            localStorage.setItem("ui_motion", next);
            document.body.dataset.uiMotion = next;
            syncSettingsControls();
            return next;
        }

        function getTrackerVisibility() {
            const stored = localStorage.getItem("show_target_words");
            return stored === "hide" ? "hide" : "show";
        }

        function setTrackerVisibility(mode) {
            const next = mode === "hide" ? "hide" : "show";
            localStorage.setItem("show_target_words", next);
            syncSettingsControls();
            renderImagePairTracker();
            return next;
        }

        function syncSettingsControls() {
            const langSelect = document.getElementById("uiLangSelect");
            if (langSelect) langSelect.value = getLanguage();
            const currentStyle = getUiStyle();
            const currentMotion = getUiMotion();
            const currentTrackerVisibility = getTrackerVisibility();
            document.querySelectorAll("[data-ui-style-choice]").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.uiStyleChoice === currentStyle);
            });
            document.querySelectorAll("[data-ui-motion-choice]").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.uiMotionChoice === currentMotion);
            });
            document.querySelectorAll("[data-tracker-visibility-choice]").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.trackerVisibilityChoice === currentTrackerVisibility);
            });
        }

        function applyPersonalSettings() {
            document.body.dataset.uiStyle = getUiStyle();
            document.body.dataset.uiMotion = getUiMotion();
            syncSettingsControls();
        }

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return UI_LANGS.includes(stored) ? stored : "en";
        }

        function t(key, vars = {}) {
            const lang = getLanguage();
            let value = (translations[lang] && translations[lang][key]) || translations.en[key] || key;
            Object.entries(vars).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, String(replacement));
            });
            return value;
        }

        function getDifficultyLabel(code, lang = getLanguage()) {
            const labels = DIFFICULTY_LABELS[code] || DIFFICULTY_LABELS.easy;
            return labels[lang] || labels.en;
        }

        function localizeServerMessage(message) {
            if (!message) return t("game_setup_failed");
            if (message === "Teema puuttuu." || message === "Theme is missing.") return t("theme_missing");
            if (message === "Pixabay API key is missing. Check PIXABAY_API_KEY." || message === "Pixabay rejected the request. Check PIXABAY_API_KEY in Render and .env.") {
                return t("pixabay_config_error");
            }
            const themed = message.match(/Teemasta '(.+)' ei löytynyt tarpeeksi käyttökelpoisia sanoja\. Kokeile toista teemaa\./)
                || message.match(/Not enough usable words were found for theme "(.+)". Try another theme\./);
            if (themed) return t("theme_not_enough", { theme: themed[1] });
            return message;
        }

            if (event.key === "Escape") closeSettings();
        });

        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
                return v.toString(16);
            });
        }
        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) { try { window.name = `reconnect_token=${tok}`; } catch (_) {} }

        // Luo reconnect_token synkronisesti ennen mitään muuta (iOS-yhteensopiva)
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try { t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token"); } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        const socket = io();
        try { window.socket = socket; } catch (_) {}
        let gameOverShown = false;
        let gridRetryTimer = null;
        const surrenderRoundBtn = document.getElementById("surrenderRoundBtn");

        function stopChordPreview() {
            audioRevealLock = false;
            if (activeChordPreview.pauseTimer) {
                clearTimeout(activeChordPreview.pauseTimer);
                activeChordPreview.pauseTimer = null;
            }
            [activeChordPreview.reference, activeChordPreview.target].forEach((audio) => {
                if (!audio) return;
                try {
                    audio.pause();

                } catch (_) {}
            });
            activeChordPreview.reference = null;
            activeChordPreview.target = null;
            activeChordPreview.token += 1;

        function playChordPreview(cardData, index) {
            if (!cardData || cardData.card_type !== "audio") return;
            if (!cardData.audio && !(cardData.audio_sequence && cardData.audio_sequence.length)) return;
            stopChordPreview();
            audioRevealLock = true;
            const previewToken = activeChordPreview.token;

            const markPreviewFinished = () => {
                if (activeChordPreview.token !== previewToken) return;
                audioRevealLock = false;
                updateRevealedHighlights();
                socket.emit("audio_preview_finished", {
                    index,
                    username: myName,
                    reconnect_token: getReconnectToken()
                });
            };

            // Chord progression: play sequence of chords one after another
            if (cardData.audio_sequence && cardData.audio_sequence.length) {
                const chordMs = Math.round((parseFloat(localStorage.getItem("chord_progression_tempo") || "2.5")) * 1000);
                const playNext = (pos) => {
                    if (activeChordPreview.token !== previewToken) return;
                    if (pos >= cardData.audio_sequence.length) { markPreviewFinished(); return; }
                    const audio = new Audio(cardData.audio_sequence[pos]);
                    activeChordPreview.target = audio;
                    let advanced = false;
                    const advance = () => {
                        if (advanced || activeChordPreview.token !== previewToken) return;
                        advanced = true;
                        clearTimeout(fallbackTimer);
                        activeChordPreview.target = null;
                        playNext(pos + 1);
                    };
                    const fallbackTimer = setTimeout(advance, chordMs + 500);
                    audio.onended = advance;
                    audio.onerror = advance;
                    audio.play().catch(advance);
                };
                playNext(0);
                return;
            }

            // Preload target immediately so it's ready when reference ends
            const targetAudio = new Audio(cardData.audio);
            targetAudio.preload = "auto";
            activeChordPreview.target = targetAudio;
            targetAudio.onended = () => {
                if (activeChordPreview.token === previewToken) {
                    activeChordPreview.target = null;
                    markPreviewFinished();
                }
            };

            const startTargetAudio = () => {
                if (activeChordPreview.token !== previewToken) return;
                activeChordPreview.reference = null;
                targetAudio.play().catch(() => markPreviewFinished());
            };

            if (!cardData.reference_audio) {
                targetAudio.play().catch(() => markPreviewFinished());
                return;
            }

            const referenceAudio = new Audio(cardData.reference_audio);
            referenceAudio.preload = "auto";
            activeChordPreview.reference = referenceAudio;
            referenceAudio.onended = () => {
                if (activeChordPreview.token !== previewToken) return;
                startTargetAudio();
            };
            referenceAudio.play().catch(() => {
                if (activeChordPreview.token === previewToken) startTargetAudio();
            });
        }

        function getImagePairTrackerEntries() {
            const pairs = new Map();
            (imagePairTrackerEntries || []).forEach((entry) => {
                if (!entry) return;
                let key = entry.key || null;
                if (entry.pair_id != null) {
                    key = `pair-${entry.pair_id}`;
                } else if (key != null && /^\d+$/.test(String(key))) {
                    key = `pair-${key}`;
                }
                const label = entry.label || "";
                const indices = Array.isArray(entry.indices) ? [...entry.indices] : [];
                if (!key || !label) return;
                pairs.set(key, { key, label, indices });
            });
            cards.forEach((card, index) => {
                if (!card) return;
                const key = card.pair_id != null
                    ? `pair-${card.pair_id}`
                    : `word-${String(card.display_word || card.native_word || card.target_word || card.word || index).toLowerCase()}`;
                if (!pairs.has(key)) {
                    pairs.set(key, {
                        key,
                        label: card.display_word || card.native_word || card.target_word || card.word || "",
                        indices: []
                    });
                }
                const entry = pairs.get(key);
                const betterLabel = card.display_word || card.native_word || entry.label || card.target_word || card.word || "";
                if (betterLabel) entry.label = betterLabel;
                if (!entry.indices.includes(index)) entry.indices.push(index);
            });
            return Array.from(pairs.values()).filter((entry) => entry.label);
        }

        function getImagePairLabelForIndices(indices, fallback = "") {
            const indexSet = new Set(Array.isArray(indices) ? indices : []);
            const matchingEntry = getImagePairTrackerEntries().find((entry) =>
                Array.isArray(entry.indices) && entry.indices.some((index) => indexSet.has(index))
            );
            return (matchingEntry && matchingEntry.label) || fallback || "";
        }

        const GOMOKU_CELL = 32;
        const GOMOKU_MARGIN = 20;

        function gomokuBoardSize(size) {
            return GOMOKU_MARGIN * 2 + size * GOMOKU_CELL;
        }

        function gomokuXY(idx, size) {
            const row = Math.floor(idx / size);
            const col = idx % size;
            return [
                GOMOKU_MARGIN + col * GOMOKU_CELL + GOMOKU_CELL / 2,
                GOMOKU_MARGIN + row * GOMOKU_CELL + GOMOKU_CELL / 2
            ];
        }

        function drawGomokuBoard() {
            const g = gomokuState;
            if (!g) return;
            const size = g.size;
            const dim = gomokuBoardSize(size);
            const svg = document.getElementById("gomoku-board");
            svg.setAttribute("width", dim);
            svg.setAttribute("height", dim);
            svg.setAttribute("viewBox", `0 0 ${dim} ${dim}`);

            let html = '';
            // Board background
            html += `<rect width="${dim}" height="${dim}" fill="#dcb167" rx="4"/>`;
            // Grid lines
            for (let i = 0; i <= size; i++) {
                const x = GOMOKU_MARGIN + i * GOMOKU_CELL;
                const y = GOMOKU_MARGIN + i * GOMOKU_CELL;
                html += `<line x1="${x}" y1="${GOMOKU_MARGIN}" x2="${x}" y2="${GOMOKU_MARGIN + size * GOMOKU_CELL}" stroke="#555" stroke-width="0.8"/>`;
                html += `<line x1="${GOMOKU_MARGIN}" y1="${y}" x2="${GOMOKU_MARGIN + size * GOMOKU_CELL}" y2="${y}" stroke="#555" stroke-width="0.8"/>`;
            }
            // Star points aligned to the visible cell centers.
            const stars = [3, 9, 15];
            for (const sr of stars) {
                for (const sc of stars) {
                    const sx = GOMOKU_MARGIN + sc * GOMOKU_CELL + GOMOKU_CELL / 2;
                    const sy = GOMOKU_MARGIN + sr * GOMOKU_CELL + GOMOKU_CELL / 2;
                    html += `<circle cx="${sx}" cy="${sy}" r="3" fill="#444"/>`;
                }
            }
            // Clickable cells (invisible overlay)
            for (let i = 0; i < size * size; i++) {
                const [x, y] = gomokuXY(i, size);
                html += `<rect x="${x - GOMOKU_CELL / 2}" y="${y - GOMOKU_CELL / 2}" width="${GOMOKU_CELL}" height="${GOMOKU_CELL}" data-idx="${i}" class="gomoku-click"/>`;
            }
            // Stones — during play only the latest stone of each color is visible; after a win reveal the whole board.
            if (g.revealBoard && g.board) {
                Object.entries(g.board).forEach(([cellIdx, color]) => {
                    const numericIdx = Number(cellIdx);
                    const [x, y] = gomokuXY(numericIdx, size);
                    const isWhite = color === "white";
                    const isWin = g.winLine && g.winLine.includes(numericIdx);
                    html += `<circle cx="${x}" cy="${y}" r="13" fill="${isWhite ? 'white' : '#1a1a1a'}" stroke="${isWhite ? '#888' : '#444'}" stroke-width="1.5" class="gomoku-stone${isWin ? ' gomoku-win-stone' : ''}"/>`;
                });
            } else {
                if (g.lastWhite >= 0) {
                    const [x, y] = gomokuXY(g.lastWhite, size);
                    const isWin = g.winLine && g.winLine.includes(g.lastWhite);
                    html += `<circle cx="${x}" cy="${y}" r="13" fill="white" stroke="#888" stroke-width="1.5" class="gomoku-stone${isWin ? ' gomoku-win-stone' : ''}"/>`;
                    html += `<circle cx="${x}" cy="${y}" r="3" fill="#aaa"/>`;
                }
                if (g.lastBlack >= 0) {
                    const [x, y] = gomokuXY(g.lastBlack, size);
                    const isWin = g.winLine && g.winLine.includes(g.lastBlack);
                    html += `<circle cx="${x}" cy="${y}" r="13" fill="#1a1a1a" stroke="#444" stroke-width="1.5" class="gomoku-stone${isWin ? ' gomoku-win-stone' : ''}"/>`;
                    html += `<circle cx="${x}" cy="${y}" r="3" fill="#555"/>`;
                }
            }
            svg.innerHTML = html;
            svg.onclick = (evt) => {
                if (!gomokuState) {
                    console.warn("[DEBUG] Gomoku move blocked: state missing");
                    showToast(t("gomoku_not_ready"));
                    return;
                }
                const rect = svg.getBoundingClientRect();
                if (!rect.width || !rect.height) return;
                const scaleX = dim / rect.width;
                const scaleY = dim / rect.height;
                const localX = (evt.clientX - rect.left) * scaleX;
                const localY = (evt.clientY - rect.top) * scaleY;
                const col = Math.floor((localX - GOMOKU_MARGIN) / GOMOKU_CELL);
                const row = Math.floor((localY - GOMOKU_MARGIN) / GOMOKU_CELL);
                if (row < 0 || row >= size || col < 0 || col >= size) {
                    console.log("[DEBUG] Gomoku click outside playable board", { localX, localY, row, col });
                    return;
                }
                const idx = row * size + col;
                const debugRoomId = window.roomId || localStorage.getItem("room_id") || null;
                console.log("[DEBUG] Gomoku click", {
                    index: idx,
                    row,
                    col,
                    localX,
                    localY,
                    myName,
                    currentTurn: gomokuState.currentTurn,
                    roomId: debugRoomId,
                    lastWhite: gomokuState.lastWhite,
                    lastBlack: gomokuState.lastBlack
                });
                if (gomokuState.currentTurn !== myName) {
                    console.warn("[DEBUG] Gomoku local turn mismatch, forwarding move to server anyway", {
                        myName,
                        currentTurn: gomokuState.currentTurn
                    });
                }
                console.log("[DEBUG] Emitting gomoku_place", { index: idx, row, col });
                socket.emit("gomoku_place", { index: idx });
            };
        }

        // Kun peli käynnistyy, aseta front-flag
        socket.on("init_grid", (data) => {

        try { sessionStorage.removeItem("game_setup_mode"); } catch (e) {}
        try { sessionStorage.removeItem("game_setup_theme"); } catch (e) {}

        document.getElementById("grid").style.display = "";
            document.getElementById("players").style.display = "";

            console.log("[DEBUG] no_grid vastaanotettu:", data && data.reason, "| fresh:", pendingTs ? (Date.now() - pendingTs) + "ms" : "no timestamp");
            const reason = (data && data.reason) || "";
            const setupMode = sessionStorage.getItem("game_setup_mode");

                navigateTo("/waiting");

            });
            renderImagePairTracker();
            showPairFoundInHint(data.indices || [], data.word);
        });

        socket.on("game_over", (data) => {
            stopChordPreview();
            if (gameOverShown) {
                console.log("[DEBUG] game_over ohitettu, tulosnakyma on jo auki.");
                return;
            }
            gameOverShown = true;
            gomokuState = null;
            document.getElementById("gomoku-wrap").style.display = "none";
            console.log("[DEBUG] Peli päättyi, näytetään tulokset.");
            stopSoloTimer();
            soloStatsEl.classList.remove("active");
            persistSummary(data);
            clearTranslationHint();
            document.getElementById("grid").style.display = "none";
            imagePairTracker.style.display = "none";
            document.getElementById("players").style.display = "none";
            updateRoundActionsVisibility();
            themeProgress.style.display = "none";
            const oldResults = document.getElementById("results");
            if (oldResults) oldResults.remove();

            const results = document.createElement("div");
            results.id = "results";

            const points = data.points || {};
            const wins = data.round_win || {};

            // Solo/bot mode: navigate to leaderboard with highlight
            const isBotMode = (localStorage.getItem("play_mode") || "") === "bot";
            if (isSoloMode) {
                const username = encodeURIComponent(localStorage.getItem("username") || "");
                const cardMode = encodeURIComponent(window.currentCardMode || "images");
                const play = (window.currentGameMode === "random") ? "random" : "solo";
                const targetLang = (window.currentCardMode !== "images") ? encodeURIComponent(currentTargetLanguage || "") : "";
                const langParam = targetLang ? `&lang=${targetLang}` : "";
                let discriminatorParam = "";
                const soloTime = data.solo_time || 0;
                const mistakes = data.solo_mistakes || 0;
                discriminatorParam = `&total=${soloTime + mistakes * 3}`;
                navigateTo(`/leaderboard?highlight=${username}&mode=${cardMode}&play=${play}${langParam}${discriminatorParam}`);
                return;
            }

            try { socket.disconnect(); } catch (_) {}
            navigateTo("/summary");
            return;

            const canChooseNextRound = canQueueNextRound();
            const surrenderedBy = data.surrendered_by;
            const surrenderedLine = surrenderedBy
                ? `<div class="results-section" style="font-size:18px; color:#ffd8d8;">${t("surrendered_round", { name: surrenderedBy })}</div>`
                : "";
            results.innerHTML = `
                <div class="results-section">
                    <div class="results-heading">${t("game_over", { winner: data.winner })}</div>
                    <br>
                    <span style="font-size:20px;">${t("points")}</span><br>
                    ${Object.entries(points).map(([name, pts]) => `${name}: ${pts} ${t("pairs_suffix")}`).join("<br>")}
                </div>
                ${surrenderedLine}
                <div class="results-section results-subheading">
                    ${t("round_wins")}<br>
                    ${Object.entries(wins).map(([name, w]) => `${name}: ${w} ${t("wins_suffix")}`).join("<br>")}
                </div>
                <br>
                <div class="results-cta">
                    ${canChooseNextRound ? t("new_round_with") : t("new_round_waiting")}
                </div>
                <div class="results-actions" style="${canChooseNextRound ? "" : "display:none;"}">
                    <button id="restart-manual-btn" class="results-btn mode">${t("enter_words")}</button>
                    <button id="restart-theme-btn" class="results-btn mode">${t("enter_theme")}</button>
                    <button id="restart-random-btn" class="results-btn mode">${t("enter_random")}</button>
                    <button id="restart-lang-btn" class="results-btn mode">${getTargetLanguageLabel()}</button>
                </div>
                <div class="results-actions">
                    <button id="end-game-btn" class="results-btn end">${t("exit_game")}</button>
                </div>
            `;
            document.body.appendChild(results);
            document.getElementById("restart-manual-btn")?.addEventListener("click", () => queueNextRound("manual"));
            document.getElementById("restart-theme-btn")?.addEventListener("click", () => queueNextRound("theme"));
            document.getElementById("restart-random-btn")?.addEventListener("click", () => queueNextRound("random"));
            document.getElementById("restart-lang-btn")?.addEventListener("click", () => queueNextRound("language"));
            document.getElementById("end-game-btn")?.addEventListener("click", () => {
                // Go to summary for rematch option (don't call leave_game — room stays alive)
                try { socket.disconnect(); } catch (_) {}
                window.location.href = "/summary";
            });

            const winnerMessage = document.getElementById("winner-message");
            if (winnerMessage) winnerMessage.style.display = "none";
        });

        socket.on("round_surrender_failed", () => {
            alert(t("surrender_failed"));
        });

        // Sanojen kysely Pixabayn käyttöön
        socket.on("ask_for_word", (data) => {
            console.log("[DEBUG] ask_for_word vastaanotettu:", data);
            if (sessionStorage.getItem("words_given")) {
                console.log("[DEBUG] Ei näytetä promptia, sanat jo annettu tässä selaimessa.");
                return;
            }
            // Estä duplikaattipromptit samalle parille
            const lastPair = parseInt(sessionStorage.getItem("last_asked_pair") || "0", 10);
            if (Number(data.pair) <= lastPair) {
                console.log("[DEBUG] Ohitetaan duplikaatti ask_for_word. lastPair=", lastPair, "incoming=", data.pair);
                return;
            }
            if (myName !== data.player) {
                hideSetupStatus();
                return;
            }
            if (myName === data.player) {
                let sana = prompt(getWordPrompt(data.pair));
                console.log("[DEBUG] Annettiin sana:", sana);
                if (sana) {
                    socket.emit("word_given", {word: sana});
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] Lähetettiin word_given palvelimelle:", sana);
                }
            }
        });

        socket.on("word_failed", (data) => {
            console.log("[DEBUG] word_failed vastaanotettu:", data);
            if (myName === data.player) {
                const failMsg = data.reason === "invalid_word" ? t("word_invalid") : t("pixabay_retry");
                alert(failMsg);
                let sana = prompt(t("prompt_word_retry", { pair: data.pair }));
                if (sana && sana.trim().length > 0) {
                    socket.emit("word_given", { word: sana.trim() });
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] Lähetettiin word_given uudestaan:", sana);
                } else {
                    // Käyttäjä perui – salli saman parin asken tulla uudelleen (pieni viive 300 ms)
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair - 1)); } catch (e) {}
                    setTimeout(() => {
                        socket.emit("ask_for_word", { player: myName, pair: data.pair });
                        console.log("[DEBUG] Käyttäjä perui, pyydettiin ask_for_word uudestaan parille (300ms viive):", data.pair);
                    }, 300);
                }
            }
        });

        // Jos odotushuoneessa tuli ensimmäinen ask_for_word jo ennen kuin tämä sivu ehti avautua,
        // käsitellään se tässä talletetusta sessionStoragesta.
        (function handlePendingAsk() {
            let raw = null;
            try { raw = sessionStorage.getItem("pending_ask"); } catch (e) {}
            if (!raw) return;
            try { sessionStorage.removeItem("pending_ask"); } catch (e) {}
            let data = null;
            try { data = JSON.parse(raw); } catch (e) {}
            if (!data) return;
            console.log("[DEBUG] Käsitellään pending_ask pelisivulla:", data);
            if (sessionStorage.getItem("words_given")) return; // jos jo merkitty valmiiksi
            if (myName !== data.player) {
                hideSetupStatus();
                return;
            }
            if (myName === data.player) {
                let sana = prompt(getWordPrompt(data.pair));
                console.log("[DEBUG] (pending) Annettiin sana:", sana);
                if (sana) {
                    socket.emit("word_given", {word: sana});
                    try { sessionStorage.setItem("last_asked_pair", String(data.pair)); } catch (e) {}
                    console.log("[DEBUG] (pending) Lähetettiin word_given palvelimelle:", sana);
                }
            }
        })();

        function restartGame() {
            queueNextRound(getLastRoundMode());
        }

        // Tyhjennä front-flag kun peli päättyy tai käyttäjä palaa etusivulle
        function endGame() {
            if (gridRetryTimer) {
                clearTimeout(gridRetryTimer);
                gridRetryTimer = null;
            }
            socket.emit("leave_game", {
                username: myName,
                reconnect_token: getReconnectToken()
            });
            clearVolatileGameState();
            console.log("[DEBUG] Peli lopetetaan.");
            setTimeout(() => {
                try { socket.disconnect(); } catch (_) {}
                window.location.href = "/";
            }, 120);
        }

        surrenderRoundBtn.addEventListener("click", () => {
            const confirmMsg = isSoloMode ? t("cancel_game_confirm") : t("surrender_round_confirm");
            if (!confirm(confirmMsg)) {
                return;
            }
            socket.emit("surrender_round", {
                username: myName,
                reconnect_token: getReconnectToken()
            });
        });
        exitGameBtn.addEventListener("click", () => {
            endGame();
        });

        socket.on("game_aborted", (data) => {
            stopChordPreview();
            if (gridRetryTimer) {
                clearTimeout(gridRetryTimer);
                gridRetryTimer = null;
            }
            const reason = (data && data.reason) || "Peli keskeytettiin.";
            alert(reason);
            navigateTo("/waiting");
        });

        function drawGrid() {
            console.log("[DEBUG] Piirretään ruudukko...");
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            updateRoundActionsVisibility();

            cards.forEach((card, index) => {
                const div = document.createElement("div");
                div.classList.add("card", "hidden");
                div.id = `card-${index}`;
                div.dataset.index = String(index);
                div.addEventListener("click", () => {
                    console.log(`[DEBUG] Klikattiin korttia: ${index}`);
                    const cardData = cards[index];
                    // Re-play already-revealed audio card without affecting game state
                    if (revealedOrder.includes(index) && cardData && cardData.card_type === "audio" && !matched.has(index) && !audioRevealLock && (isSoloMode || currentTurn === myName)) {
                        if (cardData.audio_sequence && cardData.audio_sequence.length) {
                            const chordMs = Math.round((parseFloat(localStorage.getItem("chord_progression_tempo") || "2.5")) * 1000);
                            const replayToken = ++activeChordPreview.token;
                            const replayNext = (pos) => {
                                if (activeChordPreview.token !== replayToken) return;
                                if (pos >= cardData.audio_sequence.length) return;
                                const ra = new Audio(cardData.audio_sequence[pos]);
                                activeChordPreview.target = ra;
                                let adv = false;
                                const advance = () => { if (!adv && activeChordPreview.token === replayToken) { adv = true; clearTimeout(ft); replayNext(pos + 1); } };
                                const ft = setTimeout(advance, chordMs + 500);
                                ra.onended = advance; ra.onerror = advance;
                                ra.play().catch(advance);
                            };
                            replayNext(0);
                        } else {
                            const replay = new Audio(cardData.audio);
                            replay.play().catch(() => {});
                        }
                        return;
                    }
                    if ((isSoloMode || myName === currentTurn) && !matched.has(index) && !audioRevealLock) {
                        if (isSoloMode && !soloTimerStarted) {
                            startSoloTimer();
                        }
                        socket.emit("card_clicked", {
                            index,
                            username: myName,
                            reconnect_token: getReconnectToken()
                        });
                    }
                });
                hideCardElement(div);
                grid.appendChild(div);
            });
        }

        function updatePlayers() {
            const players = JSON.parse(sessionStorage.getItem("players")) || [];
            const playersDiv = document.getElementById("players");
            playersDiv.innerHTML = "";
            const isBotMode = (localStorage.getItem("play_mode") || "") === "bot";

            players.forEach(name => {
                const span = document.createElement("span");
                let displayName = name;
                if (isBotMode && name === "Muistibotti") {
                    displayName = `${name} · ${getDifficultyLabel(currentBotDifficulty)}`;
                }
                span.textContent = displayName + " ";
                if (name === currentTurn) {
                    span.classList.add("active");
                }
                playersDiv.appendChild(span);
            });
        }

        function showWordMessage(word) {
            const toast = document.getElementById("toast");
            toast.textContent = t("found_word", { word });
            toast.style.display = "block";
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => {
                toast.style.display = "none";
            }, 5000);
        }

        window.addEventListener("resize", () => {
            document.querySelectorAll(".card-word-text").forEach((textElement) => {
                fitWordText(textElement, textElement.parentElement);
            });
        });
    </script>
</body>
</html>
