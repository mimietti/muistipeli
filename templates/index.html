<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .hero {
            width: min(560px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 28px 36px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(94, 220, 135, 0.18), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }

        input[type="text"] {
            font-size: 18px;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            font-size: 18px;
            padding: 10px 20px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background-color: limegreen;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .button-row button {
            margin-top: 0;
        }

        #error {
            color: red;
            margin-top: 20px;
        }
        #languagePicker {
            margin-bottom: 28px;
            display: flex;
            justify-content: center;
        }
        .flag-toggle {
            display: inline-flex;
            gap: 10px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .flag-btn {
            width: 48px;
            height: 36px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        }
        .flag-btn:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.05);
        }
        .flag-btn.is-active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.16);
        }
        .flag-svg {
            width: 26px;
            height: 18px;
            display: block;
        }
        #lobbyStatus {
            min-height: 82px;
            margin: 22px auto 0;
            padding: 16px 18px;
            color: #ebfff0;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.24), rgba(24, 59, 35, 0.72));
            border: 1px solid rgba(126, 231, 135, 0.45);
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #lobbyStatus.is-empty {
            color: #b9c0b9;
            font-size: 17px;
            font-weight: 500;
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.08);
            box-shadow: none;
        }
        #introText {
            max-width: 470px;
            margin: 0 auto 24px;
            color: #d4ddd4;
            font-size: 16px;
            line-height: 1.6;
        }
        .footer-credit {
            margin-top: 26px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div id="languagePicker">
            <div class="flag-toggle" role="group" aria-label="Language selection">
                <button type="button" class="flag-btn" data-lang="fi" aria-label="Suomi" title="Suomi">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="18" height="11" fill="#fff"/>
                        <rect x="5" width="3" height="11" fill="#003580"/>
                        <rect y="4" width="18" height="3" fill="#003580"/>
                    </svg>
                </button>
                <button type="button" class="flag-btn" data-lang="en" aria-label="English" title="English">
                    <svg class="flag-svg" viewBox="0 0 18 11" aria-hidden="true">
                        <rect width="18" height="11" fill="#012169"/>
                        <path d="M0 0l18 11M18 0L0 11" stroke="#fff" stroke-width="2.4"/>
                        <path d="M0 0l18 11M18 0L0 11" stroke="#C8102E" stroke-width="1.2"/>
                        <path d="M9 0v11M0 5.5h18" stroke="#fff" stroke-width="3.6"/>
                        <path d="M9 0v11M0 5.5h18" stroke="#C8102E" stroke-width="2"/>
                    </svg>
                </button>
            </div>
        </div>
        <h1 id="pageTitle">Welcome to Memory Game!!!</h1>
        <p id="introText"></p>
        <input type="text" id="nameInput" placeholder="Your name" />
        <br>
        <div class="button-row">
            <button id="joinBtn" onclick="joinGame(false)">Play with another player</button>
            <button id="joinBotBtn" onclick="joinGame(true)">Play against bot</button>
            <button id="joinSoloBtn" onclick="joinGame('solo')" style="background:#5b9bd5; color:#fff;">Play solo</button>
        </div>
        <div id="lobbyStatus" class="is-empty"></div>
        <div id="error"></div>
        <div class="footer-credit">© Michael Miettinen</div>
    </div>

    <script>
        const APP_VERSION = {{ app_version|tojson }};
        const translations = {
            en: {
                page_title: "Welcome to Memory Game!!!",
                intro_text: "The game is similar to a traditional memory game where you turn over two cards at a time. In this version, you need to figure out which cards form a pair. Depending on the game type, a pair can be two different pictures connected by the same word, or a combination of a picture card and a word card.",
                join: "Play with another player",
                join_bot: "Play against bot",
                join_solo: "Play solo",
                name_placeholder: "Your name",
                language: "Language",
                enter_name_first: "Enter your name first.",
                reconnect_missing: "Reconnect token missing! Reload the page.",
                connect_error: "Could not connect to the server.",
                waiting_for_you: "{name} is waiting for you to play.",
                waiting_other_player: "Waiting for another player..."
            },
            fi: {
                page_title: "Tervetuloa muistipeliin!!!",
                intro_text: "Peli muistuttaa perinteistä muistipeliä, jossa käännetään kaksi korttia kerrallaan. Tässä pelissä pitää päätellä, mitkä kortit muodostavat parin. Pelityypistä riippuen pari voi olla kaksi eri kuvaa, joita yhdistää sama sana, tai kuva- ja sanakortin yhdistelmä.",
                join: "Pelaa toisen kanssa",
                join_bot: "Pelaa bottia vastaan",
                join_solo: "Pelaa yksin",
                name_placeholder: "Nimesi",
                language: "Kieli",
                enter_name_first: "Syötä nimi ensin.",
                reconnect_missing: "Reconnect_token puuttuu! Lataa sivu uudelleen.",
                connect_error: "Yhteyttä ei saatu palvelimeen.",
                waiting_for_you: "{name} odottaa sinua pelaamaan.",
                waiting_other_player: "Odotetaan toista pelaajaa..."
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return stored === "fi" ? "fi" : "en";
        }

        function setLanguage(lang) {
            const next = lang === "fi" ? "fi" : "en";
            localStorage.setItem("ui_language", next);
            document.documentElement.lang = next;
            return next;
        }

        function t(key, vars = {}) {
            const lang = getLanguage();
            let value = (translations[lang] && translations[lang][key]) || translations.en[key] || key;
            Object.entries(vars).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, String(replacement));
            });
            return value;
        }

        function applyTranslations() {
            document.title = t("page_title");
            document.getElementById("pageTitle").textContent = t("page_title");
            document.getElementById("introText").textContent = t("intro_text");
            document.getElementById("joinBtn").textContent = t("join");
            document.getElementById("joinBotBtn").textContent = t("join_bot");
            document.getElementById("joinSoloBtn").textContent = t("join_solo");
            document.getElementById("nameInput").placeholder = t("name_placeholder");
            document.querySelectorAll(".flag-btn").forEach((button) => {
                const active = button.dataset.lang === getLanguage();
                button.classList.toggle("is-active", active);
                button.setAttribute("aria-pressed", active ? "true" : "false");
            });
            document.querySelector(".footer-credit").textContent = `© Michael Miettinen • ${APP_VERSION}`;
            renderLobbyStatus(window.currentLobbyPlayers || []);
        }

        // Turvallinen UUID myös laitteille, joissa crypto.randomUUID puuttuu
        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            // RFC4122 v4 likimääräinen polyfill
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) {
            try {
                window.name = `reconnect_token=${tok}`;
            } catch (_) {}
        }

        // Luo reconnect_token synkronisesti ennen mitään muuta (iOS-yhteensopiva)
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try {
                t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token");
            } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        const socket = io();
        try { window.socket = socket; } catch (_) {}
        setLanguage(getLanguage());
        applyTranslations();

        function navigateTo(path) {
            try { socket.disconnect(); } catch (_) {}
            window.location.href = path;
        }

        document.querySelectorAll(".flag-btn").forEach((button) => {
            button.addEventListener("click", () => {
                setLanguage(button.dataset.lang);
                applyTranslations();
            });
        });

        function joinGame(mode = false) {
            const username = document.getElementById("nameInput").value.trim();
            if (!username) {
                document.getElementById("error").textContent = t("enter_name_first");
                return;
            }
            const reconnectToken = getReconnectToken();
            if (!reconnectToken) {
                alert(t("reconnect_missing"));
                location.reload();
                return;
            }
            localStorage.setItem("username", username);
            if (mode === "solo") {
                localStorage.setItem("bot_mode", "0");
                localStorage.setItem("play_mode", "solo");
            } else if (mode === true) {
                localStorage.setItem("bot_mode", "1");
                localStorage.setItem("play_mode", "bot");
            } else {
                localStorage.setItem("bot_mode", "0");
                localStorage.setItem("play_mode", "queue");
            }
            navigateTo("/waiting");
        }

        function browserIsInLobby(payload) {
            const reconnectToken = getReconnectToken();
            const playersInfo = (payload && payload.players_info) || [];
            return Boolean(
                reconnectToken &&
                playersInfo.some((player) => player && player.reconnect_token === reconnectToken)
            );
        }

        function renderLobbyStatus(players) {
            window.currentLobbyPlayers = Array.isArray(players) ? players : [];
            const lobbyStatus = document.getElementById("lobbyStatus");
            const myName = (localStorage.getItem("username") || "").trim();
            if (window.currentLobbyPlayers.length === 1) {
                const waitingName = window.currentLobbyPlayers[0];
                if (waitingName && waitingName !== myName) {
                    lobbyStatus.classList.remove("is-empty");
                    lobbyStatus.textContent = t("waiting_for_you", { name: waitingName });
                    return;
                }
                lobbyStatus.classList.add("is-empty");
                lobbyStatus.textContent = t("waiting_other_player");
                return;
            }
            lobbyStatus.classList.add("is-empty");
            lobbyStatus.textContent = "";
        }

        socket.on("player_joined", (data) => {
            if (browserIsInLobby(data)) {
                navigateTo("/waiting");
                return;
            }
            renderLobbyStatus(data.players || []);
        });

        socket.on("lobby_state", (data) => {
            if (browserIsInLobby(data)) {
                navigateTo("/waiting");
                return;
            }
            renderLobbyStatus((data && data.players) || []);
        });

        socket.emit("request_lobby_state");

        socket.on("connect_error", (err) => {
            console.error("[Yhteysvirhe]", err);
            document.getElementById("error").textContent = t("connect_error");
        });
    </script>
</body>
</html>
