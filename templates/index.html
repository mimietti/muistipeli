<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .hero {
            width: min(560px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 28px 36px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(94, 220, 135, 0.18), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }

        input[type="text"] {
            font-size: 18px;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            font-size: 18px;
            padding: 10px 20px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background-color: limegreen;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .button-row button {
            margin-top: 0;
        }
        .mode-btn {
            width: 88px;
            height: 72px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 12px 28px rgba(0,0,0,0.18);
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }
        .mode-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.24);
        }
        .mode-btn svg {
            width: 34px;
            height: 34px;
            fill: currentColor;
        }
        .mode-btn.multiplayer {
            background: #32cd32;
            color: #fff;
        }
        .mode-btn.bot {
            background: #2fd42f;
            color: #fff;
        }
        .mode-btn.solo {
            background: #5b9bd5;
            color: #fff;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        #error {
            color: red;
            margin-top: 20px;
        }
        #languagePicker {
            margin-bottom: 28px;
            display: flex;
            justify-content: center;
        }
        .flag-toggle {
            display: inline-flex;
            gap: 10px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .flag-btn {
            width: 48px;
            height: 36px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        }
        .flag-btn:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.05);
        }
        .flag-btn.is-active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.16);
        }
        .flag-svg {
            width: 26px;
            height: 18px;
            display: block;
        }
        #lobbyStatus {
            min-height: 82px;
            margin: 22px auto 0;
            padding: 16px 18px;
            color: #ebfff0;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.24), rgba(24, 59, 35, 0.72));
            border: 1px solid rgba(126, 231, 135, 0.45);
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #lobbyStatus.is-empty {
            color: #b9c0b9;
            font-size: 17px;
            font-weight: 500;
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.08);
            box-shadow: none;
        }
        #introText {
            max-width: 470px;
            margin: 0 auto 24px;
            color: #d4ddd4;
            font-size: 16px;
            line-height: 1.6;
        }
        .footer-credit {
            margin-top: 26px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

        const UI_LANGS = ["fi", "en", "sv", "de", "fr", "es", "it", "pt"];

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return UI_LANGS.includes(stored) ? stored : "en";
        }

        function setLanguage(lang) {
            const next = UI_LANGS.includes(lang) ? lang : "en";
            localStorage.setItem("ui_language", next);
            document.documentElement.lang = next;
            return next;
        }

        function t(key, vars = {}) {
            const lang = getLanguage();
            let value = (translations[lang] && translations[lang][key]) || translations.en[key] || key;
            Object.entries(vars).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, String(replacement));
            });
            return value;
        }

        function applyTranslations() {
            document.title = t("page_title");
            document.getElementById("pageTitle").textContent = t("page_title");
            document.getElementById("introText").textContent = t("intro_text");
            document.getElementById("nameInput").placeholder = t("name_placeholder");
            const joinBtn = document.getElementById("joinBtn");
            const joinBotBtn = document.getElementById("joinBotBtn");
            const joinSoloBtn = document.getElementById("joinSoloBtn");
            joinBtn.setAttribute("aria-label", t("join"));
            joinBtn.setAttribute("title", t("join"));
            joinBotBtn.setAttribute("aria-label", t("join_bot"));
            joinBotBtn.setAttribute("title", t("join_bot"));
            joinSoloBtn.setAttribute("aria-label", t("join_solo"));
            joinSoloBtn.setAttribute("title", t("join_solo"));
            document.getElementById("joinBtnText").textContent = t("join");
            document.getElementById("joinBotBtnText").textContent = t("join_bot");
            document.getElementById("joinSoloBtnText").textContent = t("join_solo");
            document.querySelectorAll(".flag-btn").forEach((button) => {
                const active = button.dataset.lang === getLanguage();
                button.classList.toggle("is-active", active);
                button.setAttribute("aria-pressed", active ? "true" : "false");
            });
            document.querySelector(".footer-credit").textContent = `© Michael Miettinen • ${APP_VERSION}`;
            const leaderboardLink = document.getElementById("leaderboardLink");
            if (leaderboardLink) leaderboardLink.textContent = t("best_of_best");
            renderLobbyStatus(window.currentLobbyPlayers || []);
        }

        // Turvallinen UUID myös laitteille, joissa crypto.randomUUID puuttuu
        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            // RFC4122 v4 likimääräinen polyfill
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) {
            try {
                window.name = `reconnect_token=${tok}`;
            } catch (_) {}
        }

        // Luo reconnect_token synkronisesti ennen mitään muuta (iOS-yhteensopiva)
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try {
                t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token");
            } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        const socket = io();
        try { window.socket = socket; } catch (_) {}
        setLanguage(getLanguage());
        applyTranslations();
        // Pre-fill name if remembered
        const savedName = localStorage.getItem("username");
        if (savedName) document.getElementById("nameInput").value = savedName;

        function navigateTo(path) {
            try { socket.disconnect(); } catch (_) {}
            window.location.href = path;
        }

        document.querySelectorAll(".flag-btn").forEach((button) => {
            button.addEventListener("click", () => {
                setLanguage(button.dataset.lang);
                applyTranslations();
            });
        });

        function joinGame(mode = false) {
            const username = document.getElementById("nameInput").value.trim();
            if (!username) {
                document.getElementById("error").textContent = t("enter_name_first");
                return;
            }
            const reconnectToken = getReconnectToken();
            if (!reconnectToken) {
                alert(t("reconnect_missing"));
                location.reload();
                return;
            }
            localStorage.setItem("username", username);
            if (mode === "solo") {
                localStorage.setItem("bot_mode", "0");
                localStorage.setItem("play_mode", "solo");
            } else if (mode === true) {
                localStorage.setItem("bot_mode", "1");
                localStorage.setItem("play_mode", "bot");
            } else {
                localStorage.setItem("bot_mode", "0");
                localStorage.setItem("play_mode", "queue");
            }
            navigateTo("/waiting");
        }

        function browserIsInLobby(payload) {
            const reconnectToken = getReconnectToken();
            const playersInfo = (payload && payload.players_info) || [];
            return Boolean(
                reconnectToken &&
                playersInfo.some((player) => player && player.reconnect_token === reconnectToken)
            );
        }

        function renderLobbyStatus(players) {
            window.currentLobbyPlayers = Array.isArray(players) ? players : [];
            const lobbyStatus = document.getElementById("lobbyStatus");
            const myName = (localStorage.getItem("username") || "").trim();
            if (window.currentLobbyPlayers.length === 1) {
                const waitingName = window.currentLobbyPlayers[0];
                if (waitingName && waitingName !== myName) {
                    lobbyStatus.classList.remove("is-empty");
                    lobbyStatus.textContent = t("waiting_for_you", { name: waitingName });
                    return;
                }
                lobbyStatus.classList.add("is-empty");
                lobbyStatus.textContent = t("waiting_other_player");
                return;
            }
            lobbyStatus.classList.add("is-empty");
            lobbyStatus.textContent = "";
        }

        socket.on("player_joined", (data) => {
            if (browserIsInLobby(data)) {
                navigateTo("/waiting");
                return;
            }
            renderLobbyStatus(data.players || []);
        });

        socket.on("lobby_state", (data) => {
            if (browserIsInLobby(data)) {
                navigateTo("/waiting");
                return;
            }
            renderLobbyStatus((data && data.players) || []);
        });

        socket.emit("request_lobby_state");

        socket.on("connect_error", (err) => {
            console.error("[Yhteysvirhe]", err);
            document.getElementById("error").textContent = t("connect_error");
        });
    </script>
</body>
</html>
