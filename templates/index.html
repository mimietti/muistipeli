<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 34px;
        }
        .hero {
            width: min(560px, calc(100% - 32px));
            margin: 0 auto;
            padding: 22px 24px 24px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(94, 220, 135, 0.18), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }

        input[type="text"] {
            font-size: 18px;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            font-size: 18px;
            padding: 10px 20px;
            margin-top: 14px;
            border: none;
            border-radius: 5px;
            background-color: limegreen;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .button-row button {
            margin-top: 0;
        }
        .mode-btn {
            width: 148px;
            min-height: 98px;
            padding: 10px 10px 9px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 12px 28px rgba(0,0,0,0.18);
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
            text-align: center;
        }
        .mode-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.24);
        }
        .mode-btn svg {
            width: 34px;
            height: 34px;
            fill: currentColor;
        }
        .mode-btn-label {
            font-size: 15px;
            font-weight: 800;
            line-height: 1.1;
        }
        .mode-btn-desc {
            font-size: 11px;
            line-height: 1.25;
            max-width: 118px;
            color: rgba(255,255,255,0.84);
            font-weight: 500;
        }
        .mode-btn.multiplayer {
            background: #32cd32;
            color: #fff;
        }
        .mode-btn.bot {
            background: #2fd42f;
            color: #fff;
        }
        .mode-btn.solo {
            background: #5b9bd5;
            color: #fff;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        #error {
            color: red;
            margin-top: 14px;
        }
        #languagePicker {
            margin-bottom: 14px;
            display: flex;
            justify-content: center;
        }
        .flag-toggle {
            display: inline-flex;
            gap: 10px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .flag-btn {
            width: 48px;
            height: 36px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        }
        .flag-btn:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.05);
        }
        .flag-btn.is-active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.16);
        }
        .flag-svg {
            width: 26px;
            height: 18px;
            display: block;
        }
        #lobbyStatus {
            min-height: 82px;
            margin: 22px auto 0;
            padding: 16px 18px;
            color: #ebfff0;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.24), rgba(24, 59, 35, 0.72));
            border: 1px solid rgba(126, 231, 135, 0.45);
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #lobbyStatus.is-empty {
            color: #b9c0b9;
            font-size: 17px;
            font-weight: 500;
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.08);
            box-shadow: none;
        }
        .home-lobby-panel {
            width: 100%;
        }
        .home-lobby-title {
            margin: 0 0 10px;
            color: #f0fff1;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }
        .home-lobby-subtitle {
            margin: 0 0 12px;
            color: #d7e5d8;
            font-size: 14px;
            font-weight: 500;
        }
        .home-lobby-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .home-lobby-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: left;
        }
        .home-lobby-main {
            min-width: 0;
            flex: 1;
        }
        .home-lobby-name {
            display: block;
            color: #fff7d9;
            font-size: 18px;
            font-weight: 800;
        }
        .home-lobby-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 7px;
        }
        .home-lobby-chip {
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            color: #dbe7dc;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        .home-lobby-join {
            flex: 0 0 auto;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(126, 231, 135, 0.45);
            background: rgba(36, 90, 49, 0.7);
            color: #dfffe4;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .home-lobby-join:hover {
            background: rgba(48, 112, 63, 0.86);
        }
        #pageTitle {
            margin: 0 auto 8px;
            color: #fff4d7;
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        #introText {
            max-width: 430px;
            margin: 0 auto 10px;
            color: #d4ddd4;
            font-size: 14px;
            line-height: 1.45;
        }
        .footer-credit {
            margin-top: 18px;
            color: #8c928c;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
        .config-section {
            margin: 16px auto 0;
            max-width: 460px;
        }
        .config-title {
            margin: 0 0 10px;
            color: #dce6dc;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .card-mode-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card-mode-btn {
            min-width: 128px;
            padding: 10px 12px 9px;
            margin-top: 0;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #f2f5f2;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: none;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
        }
        .card-mode-btn:hover {
            background: rgba(255,255,255,0.08);
        }
        .card-mode-btn.is-active {
            background: rgba(94, 220, 135, 0.15);
            border-color: rgba(126, 231, 135, 0.6);
            box-shadow: 0 0 0 2px rgba(126, 231, 135, 0.18);
        }
        .card-mode-icon {
            font-size: 24px;
            line-height: 1;
        }
        .card-mode-label {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.2;
        }
        .card-mode-desc {
            font-size: 11px;
            line-height: 1.25;
            color: #aeb6ae;
            max-width: 120px;
        }
        .card-mode-btn.is-active .card-mode-desc {
            color: #d9f5db;
        }
    </style>
</head>

        <h1 id="pageTitle">Welcome to study languages in a new way or play a new kind of memory game!</h1>

        <div class="config-section">
            <div class="config-title" id="cardModeTitle">Cards</div>
            <div class="card-mode-row">
                <button type="button" class="card-mode-btn" id="indexCardModeImages" data-mode="images">

            <button id="joinBotBtn" class="mode-btn bot" type="button" onclick="joinGame(true)" aria-label="Play against bot" title="Play against bot">

            </button>
            <button id="joinSoloBtn" class="mode-btn solo" type="button" onclick="joinGame('solo')" aria-label="Play solo" title="Play solo">

                    <path d="M12 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0 2c4.418 0 8 2.239 8 5v2H4v-2c0-2.761 3.582-5 8-5Z"/>

                waiting_for_you: "{name} ti sta aspettando per giocare.",
                waiting_other_player: "In attesa di un’altra persona...",
                best_of_best: "I migliori risultati",
                release_notes: "Note di rilascio"
            },
            pt: {
                page_title: "MindMatch",
                intro_text: "Vira duas cartas e encontra o par certo: imagem + imagem, imagem + palavra ou palavra + palavra.",
                join: "Jogar com outra pessoa",
                join_bot: "Jogar contra o bot",
                join_solo: "Jogar sozinho",
                name_placeholder: "O teu nome",
                language: "Idioma",
                enter_name_first: "Escreve primeiro o teu nome.",
                reconnect_missing: "Falta o token de reconexão! Atualiza a página.",
                connect_error: "Não foi possível ligar ao servidor.",
                waiting_for_you: "{name} está à tua espera para jogar.",
                waiting_other_player: "À espera de outra pessoa...",
                best_of_best: "Os melhores resultados",
                release_notes: "Notas da versão"
            }
        };

        const UI_LANGS = ["fi", "en", "sv", "de", "fr", "es", "it", "pt"];
        const cardModeTranslations = {
            en: {
                title: "Card type",
                images: "Image pairs",
                image_word: "Image + word",
                words: "Word + word",
                images_desc: "Match two related images.",
                image_word_desc: "Match a picture with a word.",
                words_desc: "Match words that mean the same."
            },
            fi: {
                title: "Korttityyppi",
                images: "Kuvaparit",
                image_word: "Kuva + sana",
                words: "Sana + sana",
                images_desc: "Etsi kaksi toisiinsa sopivaa kuvaa.",
                image_word_desc: "Yhdistä kuva ja sana.",
                words_desc: "Yhdistä samaa tarkoittavat sanat."
            },
            sv: { title: "Korttyp", images: "Bildpar", image_word: "Bild + ord", words: "Ord + ord", images_desc: "Match two related images.", image_word_desc: "Match a picture with a word.", words_desc: "Match words that mean the same." },
            de: { title: "Kartentyp", images: "Bildpaare", image_word: "Bild + Wort", words: "Wort + Wort", images_desc: "Match two related images.", image_word_desc: "Match a picture with a word.", words_desc: "Match words that mean the same." },
            fr: { title: "Type de cartes", images: "Paires d'images", image_word: "Image + mot", words: "Mot + mot", images_desc: "Match two related images.", image_word_desc: "Match a picture with a word.", words_desc: "Match words that mean the same." },
            es: { title: "Tipo de cartas", images: "Parejas de imágenes", image_word: "Imagen + palabra", words: "Palabra + palabra", images_desc: "Match two related images.", image_word_desc: "Match a picture with a word.", words_desc: "Match words that mean the same." },
            it: { title: "Tipo di carte", images: "Coppie di immagini", image_word: "Immagine + parola", words: "Parola + parola", images_desc: "Match two related images.", image_word_desc: "Match a picture with a word.", words_desc: "Match words that mean the same." },
            pt: { title: "Tipo de cartas", images: "Pares de imagens", image_word: "Imagem + palavra", words: "Palavra + palavra", images_desc: "Match two related images.", image_word_desc: "Match a picture with a word.", words_desc: "Match words that mean the same." }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return UI_LANGS.includes(stored) ? stored : "en";
        }

        function getSelectedCardMode() {
            const stored = localStorage.getItem("preferred_card_mode");
            return ["images", "image_word", "words"].includes(stored) ? stored : "image_word";
        }

        function setSelectedCardMode(mode) {
            const next = ["images", "image_word", "words"].includes(mode) ? mode : "image_word";
            localStorage.setItem("preferred_card_mode", next);
            return next;
        }

        function setLanguage(lang) {
            const next = UI_LANGS.includes(lang) ? lang : "en";
            localStorage.setItem("ui_language", next);
            document.documentElement.lang = next;
            return next;
        }

        function t(key, vars = {}) {
            const lang = getLanguage();
            let value = (translations[lang] && translations[lang][key]) || translations.en[key] || key;
            Object.entries(vars).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, String(replacement));
            });
            return value;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function applyTranslations() {
            const lang = getLanguage();
            const cardTexts = cardModeTranslations[lang] || cardModeTranslations.en;
            document.title = t("page_title");
            document.getElementById("pageTitle").textContent = t("page_title");
            document.getElementById("introText").textContent = t("intro_text");
            document.getElementById("nameInput").placeholder = t("name_placeholder");
            document.getElementById("cardModeTitle").textContent = cardTexts.title;
            document.getElementById("indexCardModeImagesText").textContent = cardTexts.images;
            document.getElementById("indexCardModeImageWordText").textContent = cardTexts.image_word;
            document.getElementById("indexCardModeWordsText").textContent = cardTexts.words;
            document.getElementById("indexCardModeImagesDesc").textContent = cardTexts.images_desc;
            document.getElementById("indexCardModeImageWordDesc").textContent = cardTexts.image_word_desc;
            document.getElementById("indexCardModeWordsDesc").textContent = cardTexts.words_desc;
            const joinBtn = document.getElementById("joinBtn");
            const joinBotBtn = document.getElementById("joinBotBtn");
            const joinSoloBtn = document.getElementById("joinSoloBtn");
            joinBtn.setAttribute("aria-label", t("join"));
            joinBtn.setAttribute("title", t("join"));
            joinBotBtn.setAttribute("aria-label", t("join_bot"));
            joinBotBtn.setAttribute("title", t("join_bot"));
            joinSoloBtn.setAttribute("aria-label", t("join_solo"));
            joinSoloBtn.setAttribute("title", t("join_solo"));
            document.getElementById("joinBtnLabel").textContent = t("join");
            document.getElementById("joinBotBtnLabel").textContent = t("join_bot");
            document.getElementById("joinSoloBtnLabel").textContent = t("join_solo");
            document.getElementById("joinBtnDesc").textContent = t("join_desc");
            document.getElementById("joinBotBtnDesc").textContent = t("join_bot_desc");
            document.getElementById("joinSoloBtnDesc").textContent = t("join_solo_desc");
            document.getElementById("joinBtnText").textContent = t("join");
            document.getElementById("joinBotBtnText").textContent = t("join_bot");
            document.getElementById("joinSoloBtnText").textContent = t("join_solo");
            document.querySelectorAll(".flag-btn").forEach((button) => {
                const active = button.dataset.lang === getLanguage();
                button.classList.toggle("is-active", active);
                button.setAttribute("aria-pressed", active ? "true" : "false");
            });
            const releaseNotesLink = document.getElementById("releaseNotesLink");
            if (releaseNotesLink) {
                releaseNotesLink.textContent = APP_VERSION;
                releaseNotesLink.setAttribute("aria-label", t("release_notes"));
                releaseNotesLink.setAttribute("title", t("release_notes"));
            }
            const leaderboardLink = document.getElementById("leaderboardLink");
            if (leaderboardLink) leaderboardLink.textContent = t("best_of_best");
            document.querySelectorAll(".card-mode-btn").forEach((button) => {
                const active = button.dataset.mode === getSelectedCardMode();
                button.classList.toggle("is-active", active);
                button.setAttribute("aria-pressed", active ? "true" : "false");
            });
            if (window.currentLobbyBrowserRooms && window.currentLobbyBrowserRooms.length) {
                renderLobbyBrowser(window.currentLobbyBrowserRooms);
            } else {
                renderLobbyStatus(window.currentLobbyPlayers || []);
            }
        }

        // Turvallinen UUID myös laitteille, joissa crypto.randomUUID puuttuu
        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            // RFC4122 v4 likimääräinen polyfill
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) {
            try {
                window.name = `reconnect_token=${tok}`;
            } catch (_) {}
        }

        // Luo reconnect_token synkronisesti ennen mitään muuta (iOS-yhteensopiva)
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try {
                t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token");
            } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        const socket = io();
        try { window.socket = socket; } catch (_) {}
        setLanguage(getLanguage());
        applyTranslations();
        // Pre-fill name if remembered
        const savedName = localStorage.getItem("username");
        if (savedName) document.getElementById("nameInput").value = savedName;

        function navigateTo(path) {
            try { socket.disconnect(); } catch (_) {}
            window.location.href = path;
        }

        document.querySelectorAll(".flag-btn").forEach((button) => {
            button.addEventListener("click", () => {
                setLanguage(button.dataset.lang);
                applyTranslations();
            });
        });

        document.querySelectorAll(".card-mode-btn").forEach((button) => {
            button.addEventListener("click", () => {
                setSelectedCardMode(button.dataset.mode);
                applyTranslations();
            });
        });

        function joinGame(mode = false) {
            const username = requireUsername();
            if (!username) return;
            const reconnectToken = getReconnectToken();
            if (!reconnectToken) {
                alert(t("reconnect_missing"));
                location.reload();
                return;
            }
            localStorage.setItem("username", username);
            localStorage.setItem("preferred_card_mode", getSelectedCardMode());
            localStorage.removeItem("pending_direct_join_room");
            if (mode === "solo") {
                localStorage.setItem("bot_mode", "0");
                localStorage.setItem("play_mode", "solo");
            } else if (mode === true) {
                localStorage.setItem("bot_mode", "1");
                localStorage.setItem("play_mode", "bot");
            } else {
                localStorage.setItem("bot_mode", "0");
                localStorage.setItem("play_mode", "queue");
            }
            navigateTo("/waiting");
        }

        function requireUsername() {
            const username = document.getElementById("nameInput").value.trim();
            if (!username) {
                document.getElementById("error").textContent = t("enter_name_first");
                document.getElementById("nameInput").focus();
                return "";
            }
            document.getElementById("error").textContent = "";
            localStorage.setItem("username", username);
            return username;
        }

        function getQueueWordSourceLabel(mode) {
            if (mode === "manual") return t("queue_source_manual");
            if (mode === "theme") return t("queue_source_theme");
            return t("queue_source_random");
        }

        function getQueueCardModeLabel(mode) {
            const cardTexts = cardModeTranslations[getLanguage()] || cardModeTranslations.en;
            return cardTexts[mode || "image_word"] || cardTexts.image_word;
        }

        function getQueueLanguageLabel(code) {
            const labels = {
                fi: { fi: "Suomi", en: "Finnish" },
                en: { fi: "Englanti", en: "English" },
                es: { fi: "Espanja", en: "Spanish" },
                sv: { fi: "Ruotsi", en: "Swedish" },
                de: { fi: "Saksa", en: "German" },
                fr: { fi: "Ranska", en: "French" },
                it: { fi: "Italia", en: "Italian" },
                pt: { fi: "Portugali", en: "Portuguese" },
            };
            const ui = getLanguage() === "fi" ? "fi" : "en";
            return (labels[code] && labels[code][ui]) || String(code || "").toUpperCase();
        }

        function renderLobbyBrowser(rooms) {
            window.currentLobbyBrowserRooms = Array.isArray(rooms) ? rooms : [];
            const lobbyStatus = document.getElementById("lobbyStatus");
            const myName = (localStorage.getItem("username") || "").trim();
            const others = window.currentLobbyBrowserRooms.filter((room) => room && room.username !== myName);
            if (!others.length) {
                renderLobbyStatus(window.currentLobbyPlayers || []);
                return;
            }
            const langFlags = { fi: "🇫🇮", en: "🇬🇧", es: "🇪🇸", sv: "🇸🇪", de: "🇩🇪", fr: "🇫🇷", it: "🇮🇹", pt: "🇵🇹" };
            const cardIcons = { images: "🖼🖼", image_word: "🖼📝", words: "📝📝" };
            lobbyStatus.classList.remove("is-empty");
            lobbyStatus.innerHTML = `
                <div class="home-lobby-panel">
                    <div class="home-lobby-title">${t("ready_multiplayer_title")}</div>
                    <div class="home-lobby-subtitle">${t("ready_multiplayer_help")}</div>
                    <div class="home-lobby-list">
                        ${others.slice(0, 3).map((room) => {
                            const chips = [];
                            chips.push(getQueueWordSourceLabel(room.game_mode || "random"));
                            if (room.pending_theme) chips.push(`"${room.pending_theme}"`);
                            chips.push(`${cardIcons[room.card_mode] || ""} ${getQueueCardModeLabel(room.card_mode || "image_word")}`.trim());
                            if (room.target_language) chips.push(`${langFlags[room.target_language] || ""} ${getQueueLanguageLabel(room.target_language)}`.trim());
                            return `<div class="home-lobby-entry">
                                <div class="home-lobby-main">
                                    <span class="home-lobby-name">${escapeHtml(room.username || "?")}</span>
                                    <div class="home-lobby-meta">${chips.map((chip) => `<span class="home-lobby-chip">${escapeHtml(chip)}</span>`).join("")}</div>
                                </div>
                                <button class="home-lobby-join" data-room-id="${escapeHtml(room.room_id)}">${t("join_opponent")}</button>
                            </div>`;
                        }).join("")}
                    </div>
                </div>
            `;
            lobbyStatus.querySelectorAll(".home-lobby-join").forEach((button) => {
                button.addEventListener("click", () => {
                    const username = requireUsername();
                    if (!username) return;
                    localStorage.setItem("bot_mode", "0");
                    localStorage.setItem("play_mode", "queue");
                    localStorage.setItem("pending_direct_join_room", button.dataset.roomId || "");
                    navigateTo("/waiting");
                });
            });
        }

        function browserIsInLobby(payload) {
            const reconnectToken = getReconnectToken();
            const playersInfo = (payload && payload.players_info) || [];
            return Boolean(
                reconnectToken &&
                playersInfo.some((player) => player && player.reconnect_token === reconnectToken)
            );
        }

        function renderLobbyStatus(players) {
            window.currentLobbyPlayers = Array.isArray(players) ? players : [];
            const lobbyStatus = document.getElementById("lobbyStatus");
            const myName = (localStorage.getItem("username") || "").trim();
            if (window.currentLobbyPlayers.length === 1) {
                const waitingName = window.currentLobbyPlayers[0];
                if (waitingName && waitingName !== myName) {
                    lobbyStatus.classList.remove("is-empty");
                    lobbyStatus.textContent = t("waiting_for_you", { name: waitingName });
                    return;
                }
                lobbyStatus.classList.add("is-empty");
                lobbyStatus.textContent = t("waiting_other_player");
                return;
            }
            lobbyStatus.classList.add("is-empty");
            lobbyStatus.textContent = "";
        }

        socket.on("player_joined", (data) => {
            if (browserIsInLobby(data)) {
                navigateTo("/waiting");
                return;
            }
            renderLobbyStatus(data.players || []);
        });

        socket.on("lobby_state", (data) => {
            if (browserIsInLobby(data)) {
                navigateTo("/waiting");
                return;
            }
            renderLobbyStatus((data && data.players) || []);
        });

        socket.on("lobby_browser_updated", (data) => {
            renderLobbyBrowser((data && data.rooms) || []);
        });

        socket.emit("request_lobby_state");
        socket.emit("request_lobby_browser");

        socket.on("connect_error", (err) => {
            console.error("[Yhteysvirhe]", err);
            document.getElementById("error").textContent = t("connect_error");
        });
    </script>
</body>
</html>
