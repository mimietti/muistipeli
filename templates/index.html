<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        input[type="text"] {
            font-size: 18px;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            font-size: 18px;
            padding: 10px 20px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background-color: limegreen;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }

        #error {
            color: red;
            margin-top: 20px;
        }
        #languagePicker {
            margin-bottom: 28px;
            color: #ddd;
            font-size: 16px;
        }
        #languagePicker select {
            margin-left: 8px;
            font-size: 15px;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
        }
    </style>
</head>
<body>
    <div id="languagePicker">
        <label for="languageSelect" id="languageLabel">Language</label>
        <select id="languageSelect">
            <option value="en">English</option>
            <option value="fi">Suomi</option>
        </select>
    </div>
    <h1 id="pageTitle">Welcome to Memory Game!!!</h1>
    <input type="text" id="nameInput" placeholder="Your name" />
    <br>
    <button id="joinBtn" onclick="joinGame()">Join game</button>
    <br>
    <button id="showTokenBtn" style="background-color:#2d7dd2; margin-left: 8px;">Show reconnect token</button>
    <div id="tokenInfo" style="margin-top:16px; font-size:14px; color:#ccc;"></div>
    <div id="error"></div>

    <script>
        const translations = {
            en: {
                page_title: "Welcome to Memory Game!!!",
                join: "Join game",
                show_token: "Show reconnect token",
                name_placeholder: "Your name",
                language: "Language",
                enter_name_first: "Enter your name first.",
                reconnect_missing: "Reconnect token missing! Reload the page.",
                copied_clipboard: "(Copied to clipboard)",
                username_label: "username",
                channel_label: "channel",
                reconnect_label: "reconnect_token",
                unknown_channel: "unknown",
                connect_error: "Could not connect to the server."
            },
            fi: {
                page_title: "Tervetuloa muistipeliin!!!",
                join: "Liity peliin",
                show_token: "Näytä reconnect_token",
                name_placeholder: "Nimesi",
                language: "Kieli",
                enter_name_first: "Syötä nimi ensin.",
                reconnect_missing: "Reconnect_token puuttuu! Lataa sivu uudelleen.",
                copied_clipboard: "(Kopioitu leikepöydälle)",
                username_label: "username",
                channel_label: "kanava",
                reconnect_label: "reconnect_token",
                unknown_channel: "tuntematon",
                connect_error: "Yhteyttä ei saatu palvelimeen."
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return stored === "fi" ? "fi" : "en";
        }

        function setLanguage(lang) {
            const next = lang === "fi" ? "fi" : "en";
            localStorage.setItem("ui_language", next);
            document.documentElement.lang = next;
            return next;
        }

        function t(key) {
            const lang = getLanguage();
            return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
        }

        function applyTranslations() {
            document.title = t("page_title");
            document.getElementById("languageLabel").textContent = t("language");
            document.getElementById("pageTitle").textContent = t("page_title");
            document.getElementById("joinBtn").textContent = t("join");
            document.getElementById("showTokenBtn").textContent = t("show_token");
            document.getElementById("nameInput").placeholder = t("name_placeholder");
            document.getElementById("languageSelect").value = getLanguage();
        }

        // Turvallinen UUID myös laitteille, joissa crypto.randomUUID puuttuu
        function safeUUID() {
            if (self.crypto && typeof self.crypto.randomUUID === "function") {
                try { return self.crypto.randomUUID(); } catch (_) {}
            }
            // RFC4122 v4 likimääräinen polyfill
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getNameToken() {
            try {
                const m = String(window.name || '').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                return m ? m[1] : null;
            } catch (_) { return null; }
        }
        function setNameToken(tok) {
            try {
                window.name = `reconnect_token=${tok}`;
            } catch (_) {}
        }

        // Luo reconnect_token synkronisesti ennen mitään muuta (iOS-yhteensopiva)
        (function ensureReconnectToken() {
            let token = null;
            try { token = localStorage.getItem("reconnect_token"); } catch (_) {}
            if (!token) { try { token = sessionStorage.getItem("reconnect_token"); } catch (_) {} }
            if (!token) { token = getNameToken(); }
            if (!token) {
                token = safeUUID();
                let stored = false;
                try { localStorage.setItem("reconnect_token", token); stored = true; } catch (_) {}
                if (!stored) { try { sessionStorage.setItem("reconnect_token", token); stored = true; } catch (_) {} }
                if (!stored) { setNameToken(token); stored = true; }
                if (!stored) { window._reconnect_token = token; }
                console.log("DEBUG: created reconnect_token:", token);
            } else {
                console.log("DEBUG: reconnect_token already present:", token);
            }
        })();

        function getReconnectToken() {
            let t = null;
            try {
                t = localStorage.getItem("reconnect_token") || sessionStorage.getItem("reconnect_token");
            } catch (_) {}
            if (!t) t = getNameToken();
            if (!t) t = window._reconnect_token;
            if (!t) { t = safeUUID(); setNameToken(t); }
            window.reconnect_token = t;
            console.log("DEBUG: getReconnectToken() returns:", t, ", typeof:", typeof t);
            return t;
        }

        const socket = io();
        setLanguage(getLanguage());
        applyTranslations();

        document.getElementById("languageSelect").addEventListener("change", (event) => {
            setLanguage(event.target.value);
            applyTranslations();
        });

        function joinGame() {
            const username = document.getElementById("nameInput").value.trim();
            if (!username) {
                document.getElementById("error").textContent = t("enter_name_first");
                return;
            }
            const reconnectToken = getReconnectToken();
            if (!reconnectToken) {
                alert(t("reconnect_missing"));
                location.reload();
                return;
            }
            localStorage.setItem("username", username);
            const joinPayload = { username: username, reconnect_token: reconnectToken };
            console.log("DEBUG: join-payload:", JSON.stringify(joinPayload));
            socket.emit("join", joinPayload);
        }

        // Apurit tokenin kanavan tunnistamiseen ja näyttöön
        function detectTokenChannel(token) {
            try { if (localStorage.getItem("reconnect_token") === token) return "localStorage"; } catch(_) {}
            try { if (sessionStorage.getItem("reconnect_token") === token) return "sessionStorage"; } catch(_) {}
            try {
                const m = String(window.name||'').match(/(?:^|;)reconnect_token=([A-Za-z0-9-]+)/);
                if (m && m[1] === token) return "window.name";
            } catch(_) {}
            if (window._reconnect_token === token) return "window._reconnect_token";
            return t("unknown_channel");
        }

        document.getElementById('showTokenBtn').addEventListener('click', () => {
            const token = getReconnectToken();
            const channel = detectTokenChannel(token);
            const user = (function(){ try { return localStorage.getItem('username')||''; } catch(_) { return ''; }})();
            const info = `${t("reconnect_label")}: ${token}\n${t("channel_label")}: ${channel}${user?`\n${t("username_label")}: ${user}`:''}`;
            console.log("DEBUG:", info.replace(/\n/g, " | "));
            const div = document.getElementById('tokenInfo');
            div.textContent = info;
            try {
                navigator.clipboard.writeText(info);
                div.textContent += `\n${t("copied_clipboard")}`;
            } catch(_) {}
        });

        socket.on("player_joined", (data) => {
            const myName = localStorage.getItem("username");
            if (data.players.includes(myName)) {
                window.location.href = "/waiting";
            }
        });

        socket.on("connect_error", (err) => {
            console.error("[Yhteysvirhe]", err);
            document.getElementById("error").textContent = t("connect_error");
        });
    </script>
</body>
</html>
