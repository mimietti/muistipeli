<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0 0 48px;
        }
        .shell {
            width: min(560px, calc(100% - 32px));
            margin: 48px auto 0;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 6px;
        }
        .winner-line {
            font-size: 22px;
            font-weight: 700;
            color: #7cf58a;
            margin-bottom: 24px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px 18px;
            margin-bottom: 16px;
            text-align: left;
        }
        .card-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a7a6a;
            margin-bottom: 12px;
        }
        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
        }
        .score-row:last-child {
            border-bottom: none;
        }
        .score-name {
            font-weight: 700;
        }
        .score-val {
            color: #7cf58a;
            font-weight: 700;
        }
        .rematch-status {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 56px;
        }
        .player-vote {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 15px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
        }
        .player-vote.is-ready {
            background: rgba(124, 245, 138, 0.08);
            border: 1px solid rgba(124, 245, 138, 0.2);
        }
        .player-vote-name {
            font-weight: 700;
        }
        .player-vote-state {
            color: #b9c5b9;
        }
        .player-vote.is-ready .player-vote-state {
            color: #7cf58a;
            font-weight: 700;
        }
        .status-msg {
            font-size: 13px;
            color: #6a7a6a;
            margin-top: 10px;
            min-height: 20px;
            text-align: center;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: default;
        }
        .btn-primary {
            background: limegreen;
            color: #0c150e;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.07);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .footer {
            margin-top: 32px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <h1 id="pageTitle">Summary</h1>
        <div id="winnerLine" class="winner-line"></div>

        <div class="card">
            <div class="card-title" id="scoreTitle">Points this round</div>
            <div id="scoreList"></div>
        </div>

        <div class="card">
            <div class="card-title" id="winsTitle">Total wins</div>
            <div id="winsList"></div>
        </div>

        <div class="card" id="rematchCard">
            <div class="card-title" id="rematchTitle">Play the next round?</div>
            <div id="rematchStatus" class="rematch-status"></div>
            <div id="statusMsg" class="status-msg"></div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="rematchBtn">Play the next round</button>
            <button class="btn btn-secondary" id="exitBtn">Back to start</button>
        </div>

        <div class="footer" id="footerCredit">© Michael Miettinen • {{ app_version }}</div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const APP_VERSION = {{ app_version|tojson }};
        const T = {
            en: {
                title: "Summary",
                winner: "{name} wins!",
                draw_label: "Tie",
                draw: "It's a draw!",
                score_title: "Points this round",
                wins_title: "Total wins",
                rematch_title: "Play the next round?",
                rematch_btn: "Play the next round",
                exit_btn: "Back to start",
                pairs: "pairs",
                wins: "win",
                wins_plural: "wins",
                you_ready: "You want to play the next round.",
                waiting_other: "Waiting for {name}.",
                both_ready: "Both players are ready. Opening the next round...",
                room_ended: "Game session has ended.",
                ready: "Wants a new round",
                waiting: "Has not chosen yet",
                opponent_left: "Opponent has left the game.",
                opponent_reconnecting: "Waiting for {name} to reconnect…",
                opponent_returned: "{name} is back.",
                draw_count: "draw",
                draw_count_plural: "draws",
            },
            fi: {
                title: "Yhteenveto",
                winner: "{name} voittaa!",
                draw_label: "Tasapeli",
                draw: "Tasapeli!",
                score_title: "Pisteet tällä erällä",
                wins_title: "Erävoitot yhteensä",
                rematch_title: "Pelataanko uusi erä samoilla asetuksilla?",
                rematch_btn: "Pelaa uusi erä",
                exit_btn: "Palaa alkuun",
                pairs: "paria",
                wins: "voitto",
                wins_plural: "voittoa",
                you_ready: "Haluat pelata uuden erän.",
                waiting_other: "Odotetaan pelaajaa {name}.",
                both_ready: "Molemmat ovat valmiina. Avataan uusi erä...",
                room_ended: "Peli-istunto on päättynyt.",
                ready: "Haluaa uuden erän",
                waiting: "Ei ole vielä valinnut",
                opponent_left: "Toinen pelaaja poistui pelistä.",
                opponent_reconnecting: "Odotetaan, että {name} yhdistää uudelleen…",
                opponent_returned: "{name} palasi peliin.",
                draw_count: "tasapeli",
                draw_count_plural: "tasapeliä",
            },
        };

        function getLang() {
            const lang = localStorage.getItem("ui_language");
            return T[lang] ? lang : "en";
        }

        function t(key, vars) {
            const lang = getLang();
            let str = (T[lang] && T[lang][key]) || T.en[key] || key;
            if (vars) {
                Object.entries(vars).forEach(([k, v]) => {
                    str = str.replace(`{${k}}`, v);
                });
            }
            return str;
        }

        let result = {};
        try {
            result = JSON.parse(sessionStorage.getItem("summary_result") || "{}");
        } catch (_) {}

        const myName = localStorage.getItem("username") || "";
        const reconnectToken = localStorage.getItem("reconnect_token") || "";
        const roomId = result.room_id || "";
        const points = result.points || {};
        const roundWin = result.round_win || {};
        const roundTies = Number(result.round_ties || 0);
        const winner = result.winner || "";
        const players = Object.keys(points).length ? Object.keys(points) : Object.keys(roundWin);
        const isDrawWinner = winner === "Tasapeli" || winner === "Tie";

        const rematchBtn = document.getElementById("rematchBtn");
        const statusMsg = document.getElementById("statusMsg");

        let myVoted = false;
        let opponentLeft = false;

        function renderStaticResult() {
            document.title = t("title");
            document.getElementById("pageTitle").textContent = t("title");
            document.getElementById("scoreTitle").textContent = t("score_title");
            document.getElementById("winsTitle").textContent = t("wins_title");
            document.getElementById("rematchTitle").textContent = t("rematch_title");
            document.getElementById("rematchBtn").textContent = t("rematch_btn");
            document.getElementById("exitBtn").textContent = t("exit_btn");
            document.getElementById("footerCredit").textContent = `© Michael Miettinen • ${APP_VERSION}`;

            const winnerLine = document.getElementById("winnerLine");
            if (winner && !isDrawWinner) {
                const winnerName = winner;
                winnerLine.textContent = t("winner", { name: winnerName });
                winnerLine.style.color = winner === myName ? "#7cf58a" : "#ffd8d8";
            } else {
                winnerLine.textContent = t("draw");
                winnerLine.style.color = "#fff4a8";
            }

            const scoreList = document.getElementById("scoreList");
            scoreList.replaceChildren();
            players.forEach((name) => {
                const row = document.createElement("div");
                row.className = "score-row";
                row.innerHTML = `
                    <span class="score-name">${name}</span>
                    <span class="score-val">${points[name] ?? "–"} ${t("pairs")}</span>
                `;
                scoreList.appendChild(row);
            });

            const winsList = document.getElementById("winsList");
            winsList.replaceChildren();
            const winEntries = Object.entries(roundWin).sort((a, b) => b[1] - a[1]);
            if (winEntries.length === 0 && roundTies === 0) {
                winsList.textContent = "–";
                return;
            }
            winEntries.forEach(([name, winCount]) => {
                const row = document.createElement("div");
                row.className = "score-row";
                row.innerHTML = `
                    <span class="score-name">${name}</span>
                    <span class="score-val">${winCount} ${winCount === 1 ? t("wins") : t("wins_plural")}</span>
                `;
                winsList.appendChild(row);
            });
            if (roundTies > 0) {
                const tieRow = document.createElement("div");
                tieRow.className = "score-row";
                tieRow.innerHTML = `
                    <span class="score-name">${t("draw_label")}</span>
                    <span class="score-val">${roundTies} ${roundTies === 1 ? t("draw_count") : t("draw_count_plural")}</span>
                `;
                winsList.appendChild(tieRow);
            }
        }

        function renderRematchStatus(votes, presentPlayers) {
            const rematchStatus = document.getElementById("rematchStatus");
            rematchStatus.replaceChildren();

            if (!presentPlayers.length) {
                rematchStatus.textContent = t("opponent_left");
                statusMsg.textContent = "";
                return;
            }

            presentPlayers.forEach((name) => {
                const ready = votes.includes(name);
                const row = document.createElement("div");
                row.className = `player-vote${ready ? " is-ready" : ""}`;
                row.innerHTML = `
                    <span class="player-vote-name">${name}</span>
                    <span class="player-vote-state">${ready ? t("ready") : t("waiting")}</span>
                `;
                rematchStatus.appendChild(row);
            });

            if (myVoted) {
                const others = presentPlayers.filter((name) => name !== myName && !votes.includes(name));
                statusMsg.textContent = others.length ? `${t("you_ready")} ${t("waiting_other", { name: others[0] })}` : t("you_ready");
            } else {
                const others = presentPlayers.filter((name) => name !== myName);
                statusMsg.textContent = others.length ? t("waiting_other", { name: others[0] }) : "";
            }
        }

        renderStaticResult();

        if (!roomId) {
            document.getElementById("rematchCard").style.display = "none";
            rematchBtn.style.display = "none";
            document.getElementById("exitBtn").addEventListener("click", () => {
                window.location.href = "/";
            });
        } else {
            const socket = io();

            socket.on("connect", () => {
                socket.emit("join_summary", {
                    reconnect_token: reconnectToken,
                    username: myName,
                });
            });

            socket.on("rematch_status", (data) => {
                const votes = data.votes || [];
                const presentPlayers = data.players || [];
                opponentLeft = presentPlayers.length === 0;
                rematchBtn.disabled = myVoted || opponentLeft;
                renderRematchStatus(votes, presentPlayers);
            });

            let _summaryStatusTimer = null;
            socket.on("opponent_reconnecting", (data) => {
                const name = (data && data.username) || "";
                if (!name || name === myName) return;
                statusMsg.textContent = t("opponent_reconnecting", { name });
                if (_summaryStatusTimer) { clearTimeout(_summaryStatusTimer); _summaryStatusTimer = null; }
            });
            socket.on("opponent_returned", (data) => {
                const name = (data && data.username) || "";
                if (!name || name === myName) return;
                statusMsg.textContent = t("opponent_returned", { name });
                if (_summaryStatusTimer) clearTimeout(_summaryStatusTimer);
                _summaryStatusTimer = setTimeout(() => { statusMsg.textContent = ""; }, 3000);
            });

            socket.on("rematch_ready", () => {
                statusMsg.textContent = t("both_ready");
                rematchBtn.disabled = true;
                try {
                    sessionStorage.setItem("pending_same_settings_rematch", "1");
                } catch (_) {}
                setTimeout(() => {
                    try { socket.disconnect(); } catch (_) {}
                    window.location.href = "/waiting";
                }, 600);
            });

            socket.on("summary_error", () => {
                document.getElementById("rematchCard").style.display = "none";
                rematchBtn.style.display = "none";
                statusMsg.textContent = t("room_ended");
            });

            rematchBtn.addEventListener("click", () => {
                if (myVoted || opponentLeft) return;
                myVoted = true;
                rematchBtn.disabled = true;
                socket.emit("want_rematch", {
                    reconnect_token: reconnectToken,
                    username: myName,
                });
            });

            document.getElementById("exitBtn").addEventListener("click", () => {
                socket.emit("leave_summary", {
                    reconnect_token: reconnectToken,
                    username: myName,
                });
                try { socket.disconnect(); } catch (_) {}
                try { sessionStorage.removeItem("summary_result"); } catch (_) {}
                try { sessionStorage.removeItem("pending_same_settings_rematch"); } catch (_) {}
                try { localStorage.removeItem("memory_summary_round_wins"); } catch (_) {}
                try { localStorage.removeItem("reconnect_token"); } catch (_) {}
                window.location.href = "/";
            });
        }
    </script>
</body>
</html>
