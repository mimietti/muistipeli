<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0 0 48px;
        }
        .shell {
            width: min(520px, calc(100% - 32px));
            margin: 48px auto 0;
        }
        h1 { font-size: 32px; margin-bottom: 6px; }
        .winner-line {
            font-size: 22px;
            font-weight: 700;
            color: #7cf58a;
            margin-bottom: 24px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px 18px;
            margin-bottom: 16px;
            text-align: left;
        }
        .card-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a7a6a;
            margin-bottom: 12px;
        }
        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
        }
        .score-row:last-child { border-bottom: none; }
        .score-name { font-weight: 700; }
        .score-val { color: #7cf58a; font-weight: 700; }
        .rematch-status {
            text-align: center;
            min-height: 40px;
        }
        .player-vote {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            padding: 6px 0;
        }
        .vote-icon { font-size: 18px; }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn:disabled { opacity: 0.45; cursor: default; }
        .btn-primary {
            background: limegreen;
            color: #0c150e;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.07);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-msg {
            font-size: 13px;
            color: #6a7a6a;
            margin-top: 8px;
            min-height: 20px;
        }
        .footer { margin-top: 32px; color: #444; font-size: 12px; }
    </style>
</head>
<body>
    <div class="shell">
        <h1 id="pageTitle">Summary</h1>
        <div id="winnerLine" class="winner-line"></div>

        <div class="card" id="scoreCard">
            <div class="card-title" id="scoreTitle">Points this round</div>
            <div id="scoreList"></div>
        </div>

        <div class="card" id="winsCard">
            <div class="card-title" id="winsTitle">Total wins</div>
            <div id="winsList"></div>
        </div>

        <div class="card" id="rematchCard">
            <div class="card-title" id="rematchTitle">Play again?</div>
            <div class="rematch-status" id="rematchStatus"></div>
            <div class="status-msg" id="statusMsg"></div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="rematchBtn">▶ Play again</button>
            <button class="btn btn-secondary" id="exitBtn">← Back to start</button>
        </div>
        <div class="footer" id="footerCredit">© Michael Miettinen • {{ app_version }}</div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const APP_VERSION = {{ app_version|tojson }};
        const T = {
            en: {
                title: "Summary",
                winner: "{name} wins!",
                draw: "It's a draw!",
                score_title: "Points this round",
                wins_title: "Total wins",
                rematch_title: "Play again?",
                rematch_btn: "▶ Play again",
                exit_btn: "← Back to start",
                pairs: "pairs",
                wins: "win",
                wins_plural: "wins",
                waiting_opponent: "Waiting for {name}…",
                opponent_left: "Opponent has left the game.",
                you_voted: "You want to play again. Waiting for {name}…",
                both_voted: "Both want to play again! Starting…",
                no_room: "Game session has ended.",
                voted: "✓ wants to play",
                not_voted: "…",
            },
            fi: {
                title: "Yhteenveto",
                winner: "{name} voittaa!",
                draw: "Tasapeli!",
                score_title: "Pisteet tällä erällä",
                wins_title: "Voitot yhteensä",
                rematch_title: "Pelataanko uudelleen?",
                rematch_btn: "▶ Pelaa uudelleen",
                exit_btn: "← Palaa alkuun",
                pairs: "paria",
                wins: "voitto",
                wins_plural: "voittoa",
                waiting_opponent: "Odotetaan {name}…",
                opponent_left: "Vastustaja on poistunut pelistä.",
                you_voted: "Haluat pelata uudelleen. Odotetaan {name}…",
                both_voted: "Molemmat haluavat jatkaa! Aloitetaan…",
                no_room: "Peliistunto on päättynyt.",
                voted: "✓ haluaa pelata",
                not_voted: "…",
            },
        };

        function getLang() {
            const s = localStorage.getItem("ui_language");
            return (T[s] ? s : "en");
        }
        function t(key, vars) {
            const lang = getLang();
            let str = (T[lang] && T[lang][key]) || T.en[key] || key;
            if (vars) Object.entries(vars).forEach(([k, v]) => { str = str.replace(`{${k}}`, v); });
            return str;
        }

        // --- Read result from sessionStorage ---
        let result = {};
        try { result = JSON.parse(sessionStorage.getItem("summary_result") || "{}"); } catch (_) {}
        const myName = localStorage.getItem("username") || "";
        const reconnectToken = localStorage.getItem("reconnect_token") || "";
        const roomId = result.room_id || "";
        const points = result.points || {};
        const roundWin = result.round_win || {};
        const winner = result.winner || "";
        const players = Object.keys(points).length ? Object.keys(points) : Object.keys(roundWin);

        // --- Render static result ---
        function render() {
            document.title = t("title");
            document.getElementById("pageTitle").textContent = t("title");
            document.getElementById("rematchBtn").textContent = t("rematch_btn");
            document.getElementById("exitBtn").textContent = t("exit_btn");
            document.getElementById("scoreTitle").textContent = t("score_title");
            document.getElementById("winsTitle").textContent = t("wins_title");
            document.getElementById("rematchTitle").textContent = t("rematch_title");
            document.getElementById("footerCredit").textContent = `© Michael Miettinen • ${APP_VERSION}`;

            // Winner line
            const winnerEl = document.getElementById("winnerLine");
            if (winner) {
                const isMe = winner === myName;
                winnerEl.textContent = t("winner", { name: winner });
                winnerEl.style.color = isMe ? "#7cf58a" : "#ffd8d8";
            } else {
                winnerEl.textContent = t("draw");
                winnerEl.style.color = "#fff4a8";
            }

            // Scores
            const scoreList = document.getElementById("scoreList");
            scoreList.replaceChildren();
            players.forEach(name => {
                const row = document.createElement("div");
                row.className = "score-row";
                const nameEl = document.createElement("span");
                nameEl.className = "score-name";
                nameEl.textContent = name;
                const valEl = document.createElement("span");
                valEl.className = "score-val";
                valEl.textContent = `${points[name] ?? "–"} ${t("pairs")}`;
                row.appendChild(nameEl);
                row.appendChild(valEl);
                scoreList.appendChild(row);
            });

            // Total wins
            const winsList = document.getElementById("winsList");
            winsList.replaceChildren();
            const winEntries = Object.entries(roundWin).sort((a, b) => b[1] - a[1]);
            if (winEntries.length === 0) {
                winsList.textContent = "–";
            } else {
                winEntries.forEach(([name, w]) => {
                    const row = document.createElement("div");
                    row.className = "score-row";
                    const nameEl = document.createElement("span");
                    nameEl.className = "score-name";
                    nameEl.textContent = name;
                    const valEl = document.createElement("span");
                    valEl.className = "score-val";
                    valEl.textContent = `${w} ${w === 1 ? t("wins") : t("wins_plural")}`;
                    row.appendChild(nameEl);
                    row.appendChild(valEl);
                    winsList.appendChild(row);
                });
            }
        }
        render();

        // --- Socket for rematch ---
        let myVoted = false;
        let opponentLeft = false;
        const rematchBtn = document.getElementById("rematchBtn");
        const statusMsg = document.getElementById("statusMsg");

        function renderRematchStatus(votes, presentPlayers) {
            const rematchStatus = document.getElementById("rematchStatus");
            rematchStatus.replaceChildren();
            presentPlayers.forEach(name => {
                const row = document.createElement("div");
                row.className = "player-vote";
                const icon = document.createElement("span");
                icon.className = "vote-icon";
                icon.textContent = votes.includes(name) ? "✅" : "🕐";
                const label = document.createElement("span");
                label.textContent = name + (votes.includes(name) ? ` — ${t("voted")}` : ` — ${t("not_voted")}`);
                row.appendChild(icon);
                row.appendChild(label);
                rematchStatus.appendChild(row);
            });
            if (presentPlayers.length === 0) {
                rematchStatus.textContent = t("opponent_left");
                statusMsg.textContent = "";
            } else if (myVoted) {
                const others = presentPlayers.filter(n => n !== myName && !votes.includes(n));
                if (others.length > 0) {
                    statusMsg.textContent = t("you_voted", { name: others[0] });
                } else {
                    statusMsg.textContent = "";
                }
            } else {
                const others = presentPlayers.filter(n => n !== myName);
                if (others.length > 0) {
                    statusMsg.textContent = t("waiting_opponent", { name: others[0] });
                } else {
                    statusMsg.textContent = "";
                }
            }
        }

        if (!roomId) {
            // No room — solo/bot game or session expired
            document.getElementById("rematchCard").style.display = "none";
            rematchBtn.style.display = "none";
            statusMsg.textContent = "";
        } else {
            const socket = io();
            socket.on("connect", () => {
                socket.emit("join_summary", {
                    reconnect_token: reconnectToken,
                    username: myName,
                });
            });

            socket.on("rematch_status", (data) => {
                const votes = data.votes || [];
                const presentPlayers = data.players || [];
                if (presentPlayers.length === 0 && !myVoted) {
                    opponentLeft = true;
                    document.getElementById("rematchStatus").textContent = t("opponent_left");
                    statusMsg.textContent = "";
                    rematchBtn.disabled = true;
                } else {
                    opponentLeft = false;
                    renderRematchStatus(votes, presentPlayers);
                }
            });

            socket.on("rematch_ready", () => {
                statusMsg.textContent = t("both_voted");
                rematchBtn.disabled = true;
                setTimeout(() => {
                    try { socket.disconnect(); } catch (_) {}
                    window.location.href = "/waiting";
                }, 800);
            });

            socket.on("summary_error", () => {
                document.getElementById("rematchCard").style.display = "none";
                rematchBtn.style.display = "none";
                statusMsg.textContent = t("no_room");
            });

            rematchBtn.addEventListener("click", () => {
                if (myVoted || opponentLeft) return;
                myVoted = true;
                rematchBtn.disabled = true;
                socket.emit("want_rematch", {
                    reconnect_token: reconnectToken,
                    username: myName,
                });
            });

            document.getElementById("exitBtn").addEventListener("click", () => {
                socket.emit("leave_summary", {
                    reconnect_token: reconnectToken,
                    username: myName,
                });
                try { socket.disconnect(); } catch (_) {}
                // Clear game state on true exit
                try { sessionStorage.removeItem("summary_result"); } catch (_) {}
                try { localStorage.removeItem("memory_summary_round_wins"); } catch (_) {}
                try { localStorage.removeItem("reconnect_token"); } catch (_) {}
                window.location.href = "/";
            });
        }

        // Exit button when no room (solo/bot)
        if (!roomId) {
            document.getElementById("exitBtn").addEventListener("click", () => {
                window.location.href = "/";
            });
        }
    </script>
</body>
</html>
