<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release notes</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 48px 16px;
            text-align: center;
        }
        .card {
            width: min(720px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 28px 36px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(94, 220, 135, 0.18), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(34px, 5vw, 52px);
        }
        .version {
            color: #f3f1c7;
            font-size: 20px;
            margin-bottom: 22px;
        }
        .note {
            text-align: left;
            margin: 0 auto;
            max-width: 620px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 22px 22px 18px;
        }
        .note h2 {
            margin: 0 0 10px;
            color: #fff4a8;
            font-size: 22px;
        }
        .note p {
            margin: 0;
            line-height: 1.6;
            font-size: 18px;
            color: #f3f3f3;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #7cf58a;
            text-decoration: none;
            font-size: 17px;
        }
        .footer-credit {
            margin-top: 24px;
            color: #bcbcbc;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Release notes</h1>
        <div class="version" id="version">{{ app_version }}</div>
        <div class="note">
            <h2 id="headline">Version 0.09</h2>
            <p id="summaryText"></p>
        </div>
        <a class="back-link" id="backLink" href="/">&larr; Back to home</a>
        <div class="footer-credit">&copy; Michael Miettinen &bull; {{ app_version }}</div>
    </div>

    <script>
        const APP_VERSION = {{ app_version|tojson }};
        const supportedLangs = ["fi", "en", "sv", "de", "fr", "es", "it", "pt"];
        const translations = {
            en: {
                title: "Release notes",
                headline: "Version 0.09",
                summary: "This release makes the game clearer and smoother to play: theme and random rounds now support a new word-style choice for clearer picture words or broader vocabulary, bot play shows difficulty more clearly, and recent waiting room, tracker, and leaderboard polish makes the overall flow easier to follow.",
                back: "\u2190 Back to home"
            },
            fi: {
                title: "Julkaisutiedot",
                headline: "Versio 0.09",
                summary: "T\u00e4m\u00e4 versio tekee pelaamisesta selke\u00e4mp\u00e4\u00e4 ja sujuvampaa: teema- ja satunnaispeleihin tuli uusi sanatyylin valinta, jolla voi suosia selkeit\u00e4 kuvasanoja tai laajempaa sanavalintaa, botin vaikeusaste n\u00e4kyy nyt selvemmin, ja odotushuonetta, sanaseurantaa ja leaderboardia on hiottu helpommin ymm\u00e4rrett\u00e4viksi.",
                back: "\u2190 Takaisin etusivulle"
            },
            sv: {
                title: "Versionsinfo",
                headline: "Version 0.09",
                summary: "Den h\u00e4r versionen g\u00f6r spelet tydligare och smidigare: tema- och slumpomg\u00e5ngar har nu ett nytt ordvalsl\u00e4ge f\u00f6r tydliga bildord eller bredare ordf\u00f6rr\u00e5d, bottens sv\u00e5righetsgrad syns tydligare, och v\u00e4ntrummet, ordsp\u00e5rningen och topplistan har putsats f\u00f6r ett mer l\u00e4ttbegripligt fl\u00f6de.",
                back: "\u2190 Tillbaka till startsidan"
            },
            de: {
                title: "Versionshinweise",
                headline: "Version 0.09",
                summary: "Diese Version macht das Spiel klarer und fl\u00fcssiger: Themen- und Zufallsrunden bieten nun eine neue Wortstil-Auswahl f\u00fcr klare Bildw\u00f6rter oder ein breiteres Vokabular, der Schwierigkeitsgrad des Bots ist deutlicher sichtbar, und Warteraum, Wort-Tracker und Bestenliste wurden f\u00fcr einen leichter verst\u00e4ndlichen Ablauf verbessert.",
                back: "\u2190 Zur\u00fcck zur Startseite"
            },
            fr: {
                title: "Notes de version",
                headline: "Version 0.09",
                summary: "Cette version rend le jeu plus clair et plus fluide : les parties \u00e0 th\u00e8me et al\u00e9atoires proposent maintenant un choix de style de mots pour privil\u00e9gier des mots faciles \u00e0 illustrer ou un vocabulaire plus large, la difficult\u00e9 du bot est plus visible, et la salle d'attente, le suivi des mots et le classement ont \u00e9t\u00e9 affin\u00e9s pour un parcours plus compr\u00e9hensible.",
                back: "\u2190 Retour \u00e0 l'accueil"
            },
            es: {
                title: "Notas de la versi\u00f3n",
                headline: "Versi\u00f3n 0.09",
                summary: "Esta versi\u00f3n hace que el juego sea m\u00e1s claro y fluido: las rondas tem\u00e1ticas y aleatorias ahora ofrecen una nueva elecci\u00f3n de estilo de palabras para priorizar palabras f\u00e1ciles de ilustrar o un vocabulario m\u00e1s amplio, la dificultad del bot se muestra con m\u00e1s claridad y la sala de espera, el seguimiento de palabras y la clasificaci\u00f3n se han pulido para que todo el flujo se entienda mejor.",
                back: "\u2190 Volver al inicio"
            },
            it: {
                title: "Note di rilascio",
                headline: "Versione 0.09",
                summary: "Questa versione rende il gioco pi\u00f9 chiaro e fluido: le partite a tema e casuali ora includono una nuova scelta dello stile delle parole per privilegiare parole facili da rappresentare o un vocabolario pi\u00f9 ampio, la difficolt\u00e0 del bot \u00e8 mostrata con pi\u00f9 chiarezza e sala d'attesa, tracciamento delle parole e classifica sono stati rifiniti per un flusso pi\u00f9 facile da seguire.",
                back: "\u2190 Torna alla home"
            },
            pt: {
                title: "Notas da vers\u00e3o",
                headline: "Vers\u00e3o 0.09",
                summary: "Esta vers\u00e3o torna o jogo mais claro e fluido: as rodadas por tema e aleat\u00f3rias agora incluem uma nova escolha de estilo das palavras para priorizar palavras f\u00e1ceis de ilustrar ou um vocabul\u00e1rio mais amplo, a dificuldade do bot aparece com mais clareza e a sala de espera, o acompanhamento das palavras e o placar foram refinados para um fluxo mais f\u00e1cil de entender.",
                back: "\u2190 Voltar ao in\u00edcio"
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return supportedLangs.includes(stored) ? stored : "en";
        }

        function t(key) {
            const lang = getLanguage();
            return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
        }

        function applyTranslations() {
            document.documentElement.lang = getLanguage();
            document.title = t("title");
            document.getElementById("title").textContent = t("title");
            document.getElementById("headline").textContent = t("headline");
            document.getElementById("summaryText").textContent = t("summary");
            document.getElementById("backLink").textContent = t("back");
            document.getElementById("version").textContent = APP_VERSION;
        }

        applyTranslations();
    </script>
</body>
</html>
