<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <title>Release notes</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 48px 16px;
            text-align: center;
        }
        .card {
            width: min(720px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 28px 36px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(94, 220, 135, 0.18), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(34px, 5vw, 52px);
        }
        .version {
            color: #f3f1c7;
            font-size: 20px;
            margin-bottom: 22px;
        }
        .note {
            text-align: left;
            margin: 0 auto 14px;
            max-width: 620px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 22px 22px 18px;
        }
        .note h2 {
            margin: 0 0 10px;
            color: #fff4a8;
            font-size: 22px;
        }
        .note p {
            margin: 0;
            line-height: 1.6;
            font-size: 18px;
            color: #f3f3f3;
        }
        .note.is-history {
            background: rgba(255,255,255,0.025);
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #7cf58a;
            text-decoration: none;
            font-size: 17px;
        }
        .footer-credit {
            margin-top: 24px;
            color: #bcbcbc;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Release notes</h1>
        <div class="version" id="version">{{ app_version }}</div>
        <div class="note">
            <h2 id="headlineCurrent">Version 0.11</h2>
            <p id="summaryCurrent"></p>
        </div>
        <div class="note is-history">
            <h2 id="headlinePrevious">Version 0.10</h2>
            <p id="summaryPrevious"></p>
        </div>
        <a class="back-link" id="backLink" href="/">&larr; Back to home</a>
        <div class="footer-credit">&copy; Michael Miettinen &bull; {{ app_version }}</div>
    </div>

    <script>
        const APP_VERSION = {{ app_version|tojson }};
        const supportedLangs = ["fi", "en", "sv", "de", "fr", "es", "it", "pt"];
        const translations = {
            en: {
                title: "Release notes",
                headline_current: "Version 0.11",
                summary_current: "This release adds guitar chords as a new card type. You can now match a chord name with its sound, and chord gameplay handles audio timing more clearly.",
                headline_previous: "Version 0.10",
                summary_previous: "The previous release made multiplayer smoother: ready-made multiplayer games became easier to join, rematches became simpler with the same settings, and the end-of-round flow became more straightforward for both players.",
                back: "\u2190 Back to home"
            },
            fi: {
                title: "Julkaisutiedot",
                headline_current: "Versio 0.11",
                summary_current: "T\u00e4m\u00e4 versio tuo peliin uuden kitarasointuihin perustuvan korttityypin. Nyt voit yhdist\u00e4\u00e4 soinnun nimen ja sen \u00e4\u00e4nen, ja sointupelin \u00e4\u00e4niajoitus toimii selke\u00e4mmin.",
                headline_previous: "Versio 0.10",
                summary_previous: "Edellinen versio teki moninpelist\u00e4 sujuvamman: valmiisiin moninpeleihin oli helpompi liitty\u00e4, uusintaottelu samoilla asetuksilla oli helpompi aloittaa, ja er\u00e4n lopun flow selkeytyi molemmille pelaajille.",
                back: "\u2190 Takaisin etusivulle"
            },
            sv: {
                title: "Versionsinfo",
                headline_current: "Version 0.11",
                summary_current: "Den h\u00e4r versionen l\u00e4gger till en ny korttyp med gitarrackord. Nu kan du para ihop ett ackordnamn med dess ljud, och ljudtajmingen i ackordl\u00e4get \u00e4r tydligare.",
                headline_previous: "Version 0.10",
                summary_previous: "Den f\u00f6rra versionen gjorde flerspelarfl\u00f6det smidigare: det blev enklare att g\u00e5 med i f\u00e4rdiga matcher, tydligare att starta en revansch med samma inst\u00e4llningar och enklare att f\u00f6lja slutet av rundan f\u00f6r b\u00e5da spelarna.",
                back: "\u2190 Tillbaka till startsidan"
            },
            de: {
                title: "Versionshinweise",
                headline_current: "Version 0.11",
                summary_current: "Diese Version f\u00fcgt einen neuen Kartentyp mit Gitarrenakkorden hinzu. Jetzt kannst du einen Akkordnamen mit seinem Klang verbinden, und das Audiotiming im Akkordmodus ist klarer.",
                headline_previous: "Version 0.10",
                summary_previous: "Die vorherige Version machte den Mehrspielerfluss fl\u00fcssiger: fertigen Mehrspielerpartien konnte man leichter beitreten, Revanchen mit denselben Einstellungen klarer starten und das Rundenende wurde f\u00fcr beide Spieler geradliniger.",
                back: "\u2190 Zur\u00fcck zur Startseite"
            },
            fr: {
                title: "Notes de version",
                headline_current: "Version 0.11",
                summary_current: "Cette version ajoute un nouveau type de cartes bas\u00e9 sur des accords de guitare. Vous pouvez maintenant associer le nom d'un accord \u00e0 son son, avec une gestion audio plus claire dans ce mode.",
                headline_previous: "Version 0.10",
                summary_previous: "La version pr\u00e9c\u00e9dente a fluidifi\u00e9 le multijoueur : il est devenu plus simple de rejoindre une partie pr\u00eate, de lancer une revanche avec les m\u00eames param\u00e8tres et de suivre la fin de manche pour les deux joueurs.",
                back: "\u2190 Retour \u00e0 l'accueil"
            },
            es: {
                title: "Notas de la versi\u00f3n",
                headline_current: "Versi\u00f3n 0.11",
                summary_current: "Esta versi\u00f3n a\u00f1ade un nuevo tipo de cartas basado en acordes de guitarra. Ahora puedes relacionar el nombre de un acorde con su sonido, y la temporizaci\u00f3n del audio es m\u00e1s clara en este modo.",
                headline_previous: "Versi\u00f3n 0.10",
                summary_previous: "La versi\u00f3n anterior hizo m\u00e1s fluido el multijugador: fue m\u00e1s f\u00e1cil unirse a partidas preparadas, iniciar la revancha con los mismos ajustes y seguir un final de ronda m\u00e1s claro para ambos jugadores.",
                back: "\u2190 Volver al inicio"
            },
            it: {
                title: "Note di rilascio",
                headline_current: "Versione 0.11",
                summary_current: "Questa versione aggiunge un nuovo tipo di carte basato sugli accordi di chitarra. Ora puoi abbinare il nome di un accordo al suo suono, con una gestione audio pi\u00f9 chiara in questa modalit\u00e0.",
                headline_previous: "Versione 0.10",
                summary_previous: "La versione precedente ha reso il multigiocatore pi\u00f9 scorrevole: \u00e8 diventato pi\u00f9 facile unirsi a partite gi\u00e0 pronte, avviare la rivincita con le stesse impostazioni e seguire una fine round pi\u00f9 semplice per entrambi i giocatori.",
                back: "\u2190 Torna alla home"
            },
            pt: {
                title: "Notas da vers\u00e3o",
                headline_current: "Vers\u00e3o 0.11",
                summary_current: "Esta vers\u00e3o adiciona um novo tipo de cartas baseado em acordes de guitarra. Agora podes relacionar o nome de um acorde com o seu som, e o tempo do \u00e1udio ficou mais claro neste modo.",
                headline_previous: "Vers\u00e3o 0.10",
                summary_previous: "A vers\u00e3o anterior deixou o multijogador mais fluido: ficou mais f\u00e1cil entrar em partidas prontas, iniciar a revanche com as mesmas configura\u00e7\u00f5es e acompanhar um fim de ronda mais simples para os dois jogadores.",
                back: "\u2190 Voltar ao in\u00edcio"
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return supportedLangs.includes(stored) ? stored : "en";
        }

        function t(key) {
            const lang = getLanguage();
            return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
        }

        function applyTranslations() {
            document.documentElement.lang = getLanguage();
            document.title = t("title");
            document.getElementById("title").textContent = t("title");
            document.getElementById("headlineCurrent").textContent = t("headline_current");
            document.getElementById("summaryCurrent").textContent = t("summary_current");
            document.getElementById("headlinePrevious").textContent = t("headline_previous");
            document.getElementById("summaryPrevious").textContent = t("summary_previous");
            document.getElementById("backLink").textContent = t("back");
            document.getElementById("version").textContent = APP_VERSION;
        }

        applyTranslations();
    </script>
</body>
</html>
