<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release notes</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 48px 16px;
            text-align: center;
        }
        .card {
            width: min(720px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 28px 36px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(94, 220, 135, 0.18), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(34px, 5vw, 52px);
        }
        .version {
            color: #f3f1c7;
            font-size: 20px;
            margin-bottom: 22px;
        }
        .note {
            text-align: left;
            margin: 0 auto;
            max-width: 620px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 22px 22px 18px;
        }
        .note h2 {
            margin: 0 0 10px;
            color: #fff4a8;
            font-size: 22px;
        }
        .note p {
            margin: 0;
            line-height: 1.6;
            font-size: 18px;
            color: #f3f3f3;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #7cf58a;
            text-decoration: none;
            font-size: 17px;
        }
        .footer-credit {
            margin-top: 24px;
            color: #bcbcbc;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Release notes</h1>
        <div class="version" id="version">{{ app_version }}</div>
        <div class="note">
            <h2 id="headline">Version 0.08</h2>
            <p id="summaryText"></p>
        </div>
        <a class="back-link" id="backLink" href="/">&larr; Back to home</a>
        <div class="footer-credit">&copy; Michael Miettinen &bull; {{ app_version }}</div>
    </div>

    <script>
        const APP_VERSION = {{ app_version|tojson }};
        const supportedLangs = ["fi", "en", "sv", "de", "fr", "es", "it", "pt"];
        const translations = {
            en: {
                title: "Release notes",
                headline: "Version 0.08",
                summary: "This release improves language learning across the game: study modes now respect the selected target language more reliably, including Finnish and English, and word-based study feels more consistent across the supported UI languages.",
                back: "\u2190 Back to home"
            },
            fi: {
                title: "Julkaisutiedot",
                headline: "Versio 0.08",
                summary: "T\u00e4m\u00e4 versio parantaa kielten opiskelua koko peliss\u00e4: opiskelutilat noudattavat nyt valittua kohdekielt\u00e4 luotettavammin, my\u00f6s suomen ja englannin kanssa, ja sanapohjainen opiskelu toimii johdonmukaisemmin kaikilla tuetuilla k\u00e4ytt\u00f6liittym\u00e4kielill\u00e4.",
                back: "\u2190 Takaisin etusivulle"
            },
            sv: {
                title: "Versionsinfo",
                headline: "Version 0.08",
                summary: "Den h\u00e4r versionen f\u00f6rb\u00e4ttrar spr\u00e5kinl\u00e4rningen i hela spelet: studiel\u00e4gena f\u00f6ljer nu det valda m\u00e5lspr\u00e5ket mer p\u00e5litligt, \u00e4ven f\u00f6r finska och engelska, och ordinl\u00e4rningen fungerar mer konsekvent p\u00e5 alla st\u00f6dda gr\u00e4nssnittsspr\u00e5k.",
                back: "\u2190 Tillbaka till startsidan"
            },
            de: {
                title: "Versionshinweise",
                headline: "Version 0.08",
                summary: "Diese Version verbessert das Sprachenlernen im ganzen Spiel: Lernmodi folgen jetzt zuverl\u00e4ssiger der gew\u00e4hlten Zielsprache, auch bei Finnisch und Englisch, und das Lernen mit W\u00f6rtern funktioniert in allen unterst\u00fctzten UI-Sprachen konsistenter.",
                back: "\u2190 Zur\u00fcck zur Startseite"
            },
            fr: {
                title: "Notes de version",
                headline: "Version 0.08",
                summary: "Cette version am\u00e9liore l'apprentissage des langues dans tout le jeu : les modes d'\u00e9tude respectent d\u00e9sormais plus fid\u00e8lement la langue cible choisie, y compris le finnois et l'anglais, et l'apprentissage par les mots est plus coh\u00e9rent dans toutes les langues d'interface prises en charge.",
                back: "\u2190 Retour \u00e0 l'accueil"
            },
            es: {
                title: "Notas de la versi\u00f3n",
                headline: "Versi\u00f3n 0.08",
                summary: "Esta versi\u00f3n mejora el aprendizaje de idiomas en todo el juego: los modos de estudio respetan ahora con m\u00e1s fiabilidad el idioma objetivo seleccionado, tambi\u00e9n en fin\u00e9s e ingl\u00e9s, y el estudio con palabras funciona de forma m\u00e1s coherente en todos los idiomas de interfaz compatibles.",
                back: "\u2190 Volver al inicio"
            },
            it: {
                title: "Note di rilascio",
                headline: "Versione 0.08",
                summary: "Questa versione migliora lo studio delle lingue in tutto il gioco: le modalit\u00e0 di apprendimento rispettano ora in modo pi\u00f9 affidabile la lingua di destinazione selezionata, anche con finlandese e inglese, e lo studio basato sulle parole \u00e8 pi\u00f9 coerente in tutte le lingue dell'interfaccia supportate.",
                back: "\u2190 Torna alla home"
            },
            pt: {
                title: "Notas da vers\u00e3o",
                headline: "Vers\u00e3o 0.08",
                summary: "Esta vers\u00e3o melhora a aprendizagem de idiomas em todo o jogo: os modos de estudo passam agora a respeitar de forma mais fi\u00e1vel o idioma de destino escolhido, incluindo finland\u00eas e ingl\u00eas, e o estudo com palavras fica mais consistente em todos os idiomas de interface suportados.",
                back: "\u2190 Voltar ao in\u00edcio"
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return supportedLangs.includes(stored) ? stored : "en";
        }

        function t(key) {
            const lang = getLanguage();
            return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
        }

        function applyTranslations() {
            document.documentElement.lang = getLanguage();
            document.title = t("title");
            document.getElementById("title").textContent = t("title");
            document.getElementById("headline").textContent = t("headline");
            document.getElementById("summaryText").textContent = t("summary");
            document.getElementById("backLink").textContent = t("back");
            document.getElementById("version").textContent = APP_VERSION;
        }

        applyTranslations();
    </script>
</body>
</html>
