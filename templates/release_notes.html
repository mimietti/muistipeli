<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release notes</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 48px 16px;
            text-align: center;
        }
        .card {
            width: min(720px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 28px 36px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(94, 220, 135, 0.18), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(34px, 5vw, 52px);
        }
        .version {
            color: #f3f1c7;
            font-size: 20px;
            margin-bottom: 22px;
        }
        .note {
            text-align: left;
            margin: 0 auto 14px;
            max-width: 620px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 22px 22px 18px;
        }
        .note h2 {
            margin: 0 0 10px;
            color: #fff4a8;
            font-size: 22px;
        }
        .note p {
            margin: 0;
            line-height: 1.6;
            font-size: 18px;
            color: #f3f3f3;
        }
        .note.is-history {
            background: rgba(255,255,255,0.025);
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #7cf58a;
            text-decoration: none;
            font-size: 17px;
        }
        .footer-credit {
            margin-top: 24px;
            color: #bcbcbc;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Release notes</h1>
        <div class="version" id="version">{{ app_version }}</div>
        <div class="note">
            <h2 id="headlineCurrent">Version 0.10</h2>
            <p id="summaryCurrent"></p>
        </div>
        <div class="note is-history">
            <h2 id="headlinePrevious">Version 0.09</h2>
            <p id="summaryPrevious"></p>
        </div>
        <a class="back-link" id="backLink" href="/">&larr; Back to home</a>
        <div class="footer-credit">&copy; Michael Miettinen &bull; {{ app_version }}</div>
    </div>

    <script>
        const APP_VERSION = {{ app_version|tojson }};
        const supportedLangs = ["fi", "en", "sv", "de", "fr", "es", "it", "pt"];
        const translations = {
            en: {
                title: "Release notes",
                headline_current: "Version 0.10",
                summary_current: "This release makes multiplayer smoother: ready-made multiplayer games are easier to join, rematches are simpler to start with the same settings, and the end-of-round flow is more straightforward for both players.",
                headline_previous: "Version 0.09",
                summary_previous: "The previous release made the game clearer and smoother: theme and random rounds gained a word-style choice for clearer picture words or broader vocabulary, bot difficulty became more visible, and the waiting room, tracker, and leaderboard were polished for a clearer overall flow.",
                back: "\u2190 Back to home"
            },
            fi: {
                title: "Julkaisutiedot",
                headline_current: "Versio 0.10",
                summary_current: "T\u00e4m\u00e4 versio tekee moninpelist\u00e4 sujuvamman: valmiisiin moninpeleihin on helpompi liitty\u00e4, uusintaottelu samoilla asetuksilla on selke\u00e4mpi aloittaa, ja er\u00e4n lopun flow on yksinkertaisempi molemmille pelaajille.",
                headline_previous: "Versio 0.09",
                summary_previous: "Edellinen versio teki pelaamisesta selke\u00e4mp\u00e4\u00e4 ja sujuvampaa: teema- ja satunnaispeleihin tuli sanatyylin valinta, botin vaikeusaste n\u00e4kyi selvemmin ja odotushuonetta, sanaseurantaa sek\u00e4 leaderboardia hiottiin helpommin ymm\u00e4rrett\u00e4viksi.",
                back: "\u2190 Takaisin etusivulle"
            },
            sv: {
                title: "Versionsinfo",
                headline_current: "Version 0.10",
                summary_current: "Den h\u00e4r versionen g\u00f6r flerspelarfl\u00f6det smidigare: det \u00e4r enklare att g\u00e5 med i f\u00e4rdiga matcher, det \u00e4r tydligare att starta en revansch med samma inst\u00e4llningar och slutet av rundan \u00e4r enklare f\u00f6r b\u00e5da spelarna.",
                headline_previous: "Version 0.09",
                summary_previous: "Den f\u00f6rra versionen gjorde spelet tydligare och smidigare: tema- och slumpomg\u00e5ngar fick ett nytt ordvalsl\u00e4ge, bottens sv\u00e5righetsgrad blev tydligare och v\u00e4ntrummet, ordsp\u00e5rningen och topplistan putsades.",
                back: "\u2190 Tillbaka till startsidan"
            },
            de: {
                title: "Versionshinweise",
                headline_current: "Version 0.10",
                summary_current: "Diese Version vereinfacht den Mehrspielerfluss: fertigen Mehrspielerpartien kann man leichter beitreten, eine Revanche mit denselben Einstellungen l\u00e4sst sich klarer starten und das Rundenende ist f\u00fcr beide Spieler geradliniger.",
                headline_previous: "Version 0.09",
                summary_previous: "Die vorherige Version machte das Spiel klarer und fl\u00fcssiger: Themen- und Zufallsrunden bekamen eine Wortstil-Auswahl, der Schwierigkeitsgrad des Bots wurde sichtbarer und Warteraum, Wort-Tracker und Bestenliste wurden verbessert.",
                back: "\u2190 Zur\u00fcck zur Startseite"
            },
            fr: {
                title: "Notes de version",
                headline_current: "Version 0.10",
                summary_current: "Cette version fluidifie le multijoueur : il est plus facile de rejoindre une partie pr\u00eate, de lancer une revanche avec les m\u00eames param\u00e8tres et de suivre la fin de manche pour les deux joueurs.",
                headline_previous: "Version 0.09",
                summary_previous: "La version pr\u00e9c\u00e9dente rendait le jeu plus clair et plus fluide : les parties \u00e0 th\u00e8me et al\u00e9atoires ont gagn\u00e9 un choix de style de mots, la difficult\u00e9 du bot est devenue plus visible et la salle d'attente, le suivi des mots et le classement ont \u00e9t\u00e9 peaufin\u00e9s.",
                back: "\u2190 Retour \u00e0 l'accueil"
            },
            es: {
                title: "Notas de la versi\u00f3n",
                headline_current: "Versi\u00f3n 0.10",
                summary_current: "Esta versi\u00f3n hace m\u00e1s fluido el multijugador: es m\u00e1s f\u00e1cil unirse a partidas ya preparadas, empezar la revancha con los mismos ajustes y seguir un final de ronda m\u00e1s simple para ambos jugadores.",
                headline_previous: "Versi\u00f3n 0.09",
                summary_previous: "La versi\u00f3n anterior hizo el juego m\u00e1s claro y fluido: las rondas tem\u00e1ticas y aleatorias recibieron una opci\u00f3n de estilo de palabras, la dificultad del bot se volvi\u00f3 m\u00e1s visible y la sala de espera, el seguimiento de palabras y la clasificaci\u00f3n se pulieron.",
                back: "\u2190 Volver al inicio"
            },
            it: {
                title: "Note di rilascio",
                headline_current: "Versione 0.10",
                summary_current: "Questa versione rende il multigiocatore pi\u00f9 scorrevole: \u00e8 pi\u00f9 facile unirsi a partite gi\u00e0 pronte, avviare la rivincita con le stesse impostazioni e seguire una fine round pi\u00f9 semplice per entrambi i giocatori.",
                headline_previous: "Versione 0.09",
                summary_previous: "La versione precedente ha reso il gioco pi\u00f9 chiaro e fluido: le partite a tema e casuali hanno ricevuto una scelta dello stile delle parole, la difficolt\u00e0 del bot \u00e8 diventata pi\u00f9 visibile e sala d'attesa, tracciamento delle parole e classifica sono stati rifiniti.",
                back: "\u2190 Torna alla home"
            },
            pt: {
                title: "Notas da vers\u00e3o",
                headline_current: "Vers\u00e3o 0.10",
                summary_current: "Esta vers\u00e3o deixa o multijogador mais fluido: ficou mais f\u00e1cil entrar em partidas prontas, iniciar a revanche com as mesmas configura\u00e7\u00f5es e acompanhar um fim de rodada mais simples para os dois jogadores.",
                headline_previous: "Vers\u00e3o 0.09",
                summary_previous: "A vers\u00e3o anterior deixou o jogo mais claro e fluido: as rodadas tem\u00e1ticas e aleat\u00f3rias ganharam uma escolha de estilo das palavras, a dificuldade do bot ficou mais vis\u00edvel e a sala de espera, o acompanhamento das palavras e o placar foram refinados.",
                back: "\u2190 Voltar ao in\u00edcio"
            }
        };

        function getLanguage() {
            const stored = localStorage.getItem("ui_language");
            return supportedLangs.includes(stored) ? stored : "en";
        }

        function t(key) {
            const lang = getLanguage();
            return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
        }

        function applyTranslations() {
            document.documentElement.lang = getLanguage();
            document.title = t("title");
            document.getElementById("title").textContent = t("title");
            document.getElementById("headlineCurrent").textContent = t("headline_current");
            document.getElementById("summaryCurrent").textContent = t("summary_current");
            document.getElementById("headlinePrevious").textContent = t("headline_previous");
            document.getElementById("summaryPrevious").textContent = t("summary_previous");
            document.getElementById("backLink").textContent = t("back");
            document.getElementById("version").textContent = APP_VERSION;
        }

        applyTranslations();
    </script>
</body>
</html>
